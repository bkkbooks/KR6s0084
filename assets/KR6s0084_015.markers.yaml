  - {type: variant, offset: 520, length: 459, content: 時天水故帳下督富整。遂因忿斬輔。群胡既雪怨恥。稱善而還。共分祖尸各起塔廟。輔字世偉南陽人。張衡之後雖有才解。而酷不以理。橫殺天水太守封尚。百姓疑駭。因亂而斬焉。管蕃亦卒以傾險致敗。後少時有一人。姓李名通死而更蘇云。見祖法師在閻羅王處為王講首楞嚴經云。講竟應往忉利天。又見祭酒王浮。一云道士基公。次被鎖械。求祖懺悔。昔祖平素之日。與浮每爭邪正。浮屢屈。既意不自忍。乃作老子化胡經以誣謗佛法。殃有所歸。故死方思悔孫綽道賢論。以法祖疋稽康。論云。帛祖釁起於管蕃中散禍作於鍾會二賢。並以俊邁之氣昧其圖身之慮。栖心事外輕世招患治不異也。其【CB】【麗-CB】，共【大】其K31n1053_p0424c17共見稱如此。祖既博涉多閑。善通胡漢之語。常譯惟逮弟子本五部僧等三部經。又注首楞嚴經。又言。別譯數部小經值亂零失不知其名。祖弟法作亦少有令譽。被博士徵不就。年二十五出家。深洞佛理。關隴知名。時梁州刺史張光以作兄不肯反服輔之所殺。光又逼作令罷道。作執志堅貞以死為誓遂為光所害。春秋五十有七。注放光波若經及著顯宗論等。光字景武。江夏人。後為武都氐楊難敵所圍。發憤而死。時晉惠之世。又有優婆塞衛士度。譯出道行波若經二卷。士度本司州汲郡汲人。陸沈寒門安貧樂道。常以佛法為心當其亡日。清淨澡漱誦經千餘言。然後蓋衣尸臥奄然而卒, 宋: 生擒光斬之既雪怨恥稱善而還諸豪帥遂分祖屍骸各立寺廟而禮事焉晉太厚孫興公著遺賢論以于帛七僧方竹林七賢以祖比嵇叔夜其見稱如此初祖譯出惟逮菩薩經一部又注音楞嚴經猶傳於世其所出諸經遭值亂離故名錄空存, 元: 生擒光斬之既雪怨恥稱善而還諸豪帥遂分祖屍骸各立寺廟而禮事焉晉太厚孫興公著遺賢論以于帛七僧方竹林七賢以祖比嵇叔夜其見稱如此初祖譯出惟逮菩薩經一部又注音楞嚴經猶傳於世其所出諸經遭值亂離故名錄空存, 明: 生擒光斬之既雪怨恥稱善而還諸豪帥遂分祖屍骸各立寺廟而禮事焉晉太厚孫興公著遺賢論以于帛七僧方竹林七賢以祖比嵇叔夜其見稱如此初祖譯出惟逮菩薩經一部又注音楞嚴經猶傳於世其所出諸經遭值亂離故名錄空存}
