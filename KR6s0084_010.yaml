body:
  text: 釋僧祐撰道地經序第一道安法師沙彌十慧章句序第二嚴佛調作十法句義經序第三道安法師三十七品序第四曇無蘭作舍利弗阿毗曇序第五道摽法師僧伽羅剎經序第六未詳作者僧伽羅剎集經後記第七未詳作者婆須蜜經序第八未詳作者阿毗曇序第九道安法師阿毗曇心序第十未詳作者阿毗曇心序第十一慧遠法師三法度記第十二慧遠法師三法度記第十三出經後記八揵度阿毗曇根揵度後別記第十四未詳作者十四卷鞞婆沙序第十五道安法師六十卷毗婆沙序第十六道挻法師雜阿毗曇心序第十七未詳作者後出雜心序第十八焦鏡法師大智釋論序第十九睿法師作大智論記第二十出論後記大智論抄序第二十一慧遠法師道地經序第一釋道安夫道地者應真之玄堂升仙之奧室也無本之城杳然難陵矣無為之牆邈然難踰矣微門妙闥少窺其庭者也蓋為器也猶海與行者日酌之而不竭返精者無數而不滿其為像也含弘靜泊綿綿若存寂寥無言辨之者幾矣恍惚無行求矣漭乎其難測聖人有以見因華可以成實覩末可以達本乃為布不言之教陳無轍之軌闡止啓觀式成定諦髦彥六雙率由斯路歸精谷神於乎羡矣夫地也者苞潤施育稼穡以成鏐鐐瓊琛罔弗以載有喻止觀莫近於此故曰道地也昔在衆祜三達遐鑒八音四辨共奕敷化識病而療聲典難算至如來善逝而大訓絶五百無著遷而靈教乖於是有三藏沙門厥名衆護仰惟諸行布在群籍俯愍發進不能悉洽祖述衆經撰要約行目其次序以為一部二十七章其於行也要猶人首與可終身載不可須臾下猶氣息與可終身通不可須臾閉息閉則命殞首下則身殪若行者暫去斯法姦宄之匿入矣有開士世高者安息王元子也禪國高讓納萬乘位剋明畯德改容修道越境流化爰適此邦其所傳訓淵微優邃又折護所集者七章譯為漢文音近雅質敦兮若撲或變質從文或因質不飾皇矣世高審得厥旨夫絶愛原滅榮冀息馳騁莫先於止了癡惑達九道見身幻莫首於觀大聖以是達五根登無漏揚美化易頑俗莫先於正靡不由茲也真可謂盛德大業至矣哉行自五陰盡于成壞則是苦諦漏盡之迹也神足章者則是禪思五通之要也五十五觀者則是四非常度三結之本也人之處世曚昧未祛熙熙甘色如饗大牢由處穢海幽厄九月既生迍邅羅遘百凶尋旋老死嬰苦萬端漂溺五流莫能自返聖人深見以為苦證遊神八路長陟永安專精稽古則逸樂若此開情縱欲則酸毒若彼二道顯著宜順所從石以淬碎剝堅截剛素質精深五色炳燦由是論之可不勉哉豫生不辰值皇綱紐絶玁狁猾夏山左蕩沒避難濩澤師殞友折周爰咨謀顧靡所詢時雁門沙門支曇講鄴都沙門竺僧輔此二仁者聰明有融信而好古冒嶮遠至得與酬酢尋章察句造此訓傳怖權與進者暫可微寤蚊蚋奮翼以助隨嵐蟻壟增封嵩嶽之頂豈其能益於高猛哉探賾奧邈惟八輩難之況末學小子庶幾茲哉然天竺聖邦道岨遼遠幽見碩儒少來周化先哲既逝來聖未至進退狼跋咨嗟涕洟故作章句申己丹赤冀諸神通照我顒顒必枉靈趾燭謬正闕也沙彌十慧章句序第二嚴阿祇梨浮調所造昔在佛世經法未記言出尊口弟子誦習辭約而義博記鮮而妙深佛既泥曰微言永絶猶穀水消竭日月隕墜於是衆賢共使阿難演其所聞凡所著出十二部經其後高明各為注説章句解故或以十數有菩薩者出自安息字世高韜弘稽古靡經不綜愍俗童矇示以橋梁於是漢邦敷宣佛法凡厥所出數百萬言或以口解或以文傳唯沙彌十慧未聞深説夫十者數之終慧者道之本也物非數不定行非道不度其文郁郁其用亹亹廣彌三界近觀諸身調以不敏得充賢次學未浹聞行未中四夙羅凶咎遘和上憂長無過庭善誘之教悲窮自潛無所繫心於是發憤忘食因間歷思遂作十慧章句不敢自專事喻衆經上以達道德下以慰己志創奧博尚之賢不足留意未升堂室者可以啓矇焉十法句義經序第三道安法師夫有欲之激百轉千化搖蕩成教亦何得一端乎是故正覺因心所遷即名為經邪止名正亂止名定方圓隨器合散從俗隨器故因質而立名從俗故緣對而授藥立名無常名則神道矣授藥無常藥則感而通故矣即已不器又通其故則諸行泛然因法而結也二三至十存乎其人病有衆寡以人為目耳譬藥分劑有單有復診脈視色投藥緣疾法參相成不其然乎自佛即幽阿難所傳分為三藏纂乎前緒部別諸經小乘則為阿含四行中阿含者數之藏府也阿毗曇者數之苑藪也其在赤澤碩儒通人不學阿毗曇者蓋闕如也夫造舟而濟者其體也安粹數而立者其業也美是故般若啓卷必數了諸法平數以成經斯乃衆經之喉襟為道之樞極也可不務乎可不務乎於戲前徒不忘玄數者秋露子也于茲繼武有自來矣篤斯業者或不成也爰晉土者世高其俊也偉哉數學淵源流清抱德惠和播馨此域安雖希高迹末由也已然旋焉周焉滅焉修焉未墜地也并一不惑以成積習移志蹈遠移質緣以高尚欲疲不能也人亦有言曰聖人也者人情之積也聖由積靡爐錘之間惡可已乎經之大例皆異説同行異説者明夫一行之歸致同行者其要不可相無則行必俱行全其歸致則同處而不新不新故頓至而不惑俱行故叢萃而不迷也所謂知異知同是乃大通既同既異是謂大備也以此察之義焉廋哉義焉廋哉夫玄覽莫美乎同異而得其門者或寡矣明白莫過乎辨數而入其室者鮮矣昔嚴調撰十慧章句康僧會集六度要目每尋其迹欣有寤焉然猶有闕久行未録者今抄而第之名曰十法句義若其常行之注解若昔未集之貽後同我之倫儻可察焉三十七品經序第四沙門竺曇無蘭撰三十七品者三世諸佛之舟輿聲聞古佛亦皆乘之而得度三界衆生靡不載之故經曰大乘道之輿一切度天人然則三十七品或離或合在一增四法有四意止四神足無四意斷五法則有五根五力七法無七覺意八法而有八等則為五經也依如此比當應為七經如此則離也而諸經多合唯一增爾耳中阿鋡身意止有安般出入息事將是行四意止時有亂意起者執對行藥也又諸經三十七品文辭不同余因間戲尋省諸經撮採事備辭巧便者差次條貫伏其位使經體不毀而事有異同者得顯于義又以三昧連之乎末以具泥洹四十品五根中云四禪四諦有目無文故復屬之於後令始涉者攬之易悟不亦佳乎又以諸經之異者注于句末小安般三十七品後則次止觀律法義次三十七品後次四諦小十二門後次三向爾為泥洹四十品止觀四諦成道之行不可以相無也是故集止觀三三昧四禪四諦繫之於三十七品後欲令行者覽之易見而其行也序二百六十五字本二千六百八十五字子二千九百七十字凡五千九百二字除後六行八十字不在計中晉泰元二十一年歲在丙申六月沙門竺曇無蘭在楊州謝鎮西寺撰舍利弗阿毗曇序第五釋道摽阿毗曇秦言無比法出自八音亞聖所述作之雖簡成命曲備重微曠濟神要莫比真祇洹之微風反流之宏趣然佛後暗昧競執異津或有我有法或無我有法乖忤純風虧矇聖道有舍利弗玄哲高悟神貫翼從德備左面智參照來其人以為是非之越大猷將隱既曰像法任之益滯是以敢於佛前所聞經法親承即集先巡堤防謙抑邪流助宣法化故其為經也先立章以崇本後廣演以明義之體四焉問分也非問分也攝相應分也厚分也問者寄言扣擊明夫應會非問分者假韻默通惟宣法相攝相應分者總括自他釋非相無厚分者遠述因緣以彰性空性空彰則反迷至矣非相無則相與用矣法相宣則邪觀息矣應會明則極無遺矣四體圓足二諦義備故稱無比法也此經於先出阿毗曇雖文言融通而旨格各異又載自空以明宗極故能取貴於當時而垂軌於千載明典振於遠維四衆率爾同仰是使殉有者祛妄見之惑向化者起即隆之動苕苕焉故冥宗之貴緒也亹亹焉故歸輪之所契也此經標明曩代靈液西畛純教彌於閬風玄問扇於東嶺惟秦天王沖資睿聖冥根樹於既往實相結於皇極王德應符闡揚三寶聞茲典誥夢想思攬雖曰悠邈感之愈勤會天竺沙門曇摩崛多曇摩耶舍等義學來遊秦王既契宿心相與辨明經理起清言於名教之域散衆微於自無之境超超然誠韻外之致愔愔然覆美稱之實於是詔令傳譯然承華天哲道嗣聖躬玄味遠流妙度淵極特體明旨遂讚其事經師本雖暗誦誠宜謹備以秦弘始九年命書梵文至十年尋應令出但以經趣微遠非徒關言所契苟彼此不相悟直委之譯人者恐津梁之要未盡於善停至十六年經師漸間秦語令自宣譯皇儲親管理味言意兼了復所向盡然後筆受即復內逆止討其煩重領其指歸故令文之者修飾義之者掇潤并挍至十七年訖若乃文外之功勝契之妙誠非所階未之能詳並求之衆經考之諸論新異之美自宣之於文惟法住之實如有表裏然原其大體有無兼用微文淵富義旨顯灼斯誠有部之永塗大乘之靡趣先達之所宗後進之可仰標以近質綜不及遠情未能已猥參斯典悕感之誠脫復微序謶望賢哲以知其鄙僧伽羅剎經序第六秦言衆護未詳作者僧伽羅剎者須賴國人也佛去世後七百年生此國出家學道遊教諸邦至揵陀越土甄陀罽賓王師焉高明絶世多所述作此土修行經大道地經其所集也又著此經憲章世尊自始成道迄于淪虛行無巨細必因事而演遊化夏坐莫不曲備雖普耀本行度世諸經載佛起居至諸為密今攬斯經所寤復多矣傳其將終我若立根得力大士誠不虛者立斯樹下手授其葉而棄此身使那羅延力大象之勢無能移余如毛髮也正使就耶惟者當不燋此葉言然之後便即立終罽戒王自臨而不能動遂以巨絙象挽未始能搖即就耶惟炎葉不傷尋升兜術與彌勒大士高談彼宮將補佛處賢劫第八以建元二十年罽賓沙門僧伽跋澄齎此經本來詣長安武威太守趙文業請令出焉佛念為譯慧嵩筆受正值慕容作難於近郊然譯出不襄余與法和對檢定之十一月三十日乃了也此年出中阿含六十卷增一阿含四十六卷伐鼓擊柝之中而出斯百五卷窮通不改其恬詎非先師之故迹乎僧伽羅剎集經後記第七未詳作者大秦建元二十年十一月三十日罽賓比丘僧伽跋澄於長安石羊寺口誦此經及毗婆沙佛圖羅剎翻譯秦言未精沙門釋道安朝賢趙文業研核理趣每存妙盡遂至留連至二十一年二月九日方訖且婆須蜜經及曇摩難提口誦增一阿含并幻網經使佛念為譯人念乃學通內外才辨多奇常疑西域言繁質謂此土好華每存瑩飾文句滅其繁長安公趙郎之所深疾窮挍考定務在典骨既方俗不同許其五失胡本出此以外毫不可差五失如安公大品序所載余既預衆末聊記卷後使知釋趙為法之至婆須蜜集序第八未詳作者婆須蜜菩薩大士次繼彌勒作佛名師子如來也從釋迦文降生鞞提國為大婆羅門梵摩瑜子厥名鬱多羅父命觀佛尋侍四月具覩相表威變容止還白所見父得不還已出家學道改字須蜜佛般涅槃後遊教周妬國槃奈國高才蓋世奔逸絶塵集斯經焉於七品為一犍度盡十三揵度其所集也後四品一揵度訓釋佛偈也凡十一品十四揵度也該羅深廣與阿毗曇並興外國傍通大乘特明盡漏博涉十法百行之能事畢矣尋之漭然猶滄海之無涯可不謂之廣乎陟之瞪爾猶崑嶽之無頂可不謂之高乎寶渚極目猶夜光之珍巖岫舉睫猶天智之玉磬乎富也何過此經外國升高座者未墜於地也集斯經已入三昧定如彈指頃神升兜術彌妬路彌妬路刀利及僧伽羅剎適彼天宮斯二三君子皆次補處人也彌妬路刀利者光炎如來也僧伽羅剎者柔仁佛也茲四大士集乎一堂對揚權智賢聖默然洋洋盈耳不亦樂乎罽賓沙門僧伽跋澄以秦建元二十年轉此經一部來詣長安武威太守趙政文業者學不厭士也求令出之佛念譯傳跋澄難陀揥婆三人執胡本慧嵩筆受以三月五日出至七月十三日乃訖胡本十二千首盧也余與法和對挍修飾武威少多潤色此經説三乘為九品特善修行以止觀徑十六最悉每尋上人之高韻未嘗不忘臭味也恨窺數仞之門晚懼失其宗廟之美百官之富也阿毗曇序第九釋道安阿毗曇者秦言大法也衆祜有以見道果之至賾擬性形容執乎真像謂之大也有以道慧之至齊觀如司南察乎一相謂之法故曰大法也中阿含世尊責優陀耶曰汝致詰阿毗曇乎夫然佛以身子五法為大阿毗曇也戒定慧名無漏也佛般涅槃後迦旃延義第一也以十二部經浩博難究撰其大法為一部八揵度四十四品也其為經也富莫上焉邃莫加焉要道無行而不由可不謂之富乎至德無妙而不出可不謂之邃乎富邃洽備故故能微顯闡幽也其説智也周其説根也密其説禪也悉其説道也具周則二八用各適時密則二十迭為賓主悉則昧淨遍遊其門具則利鈍各別其所以故為高座者所咨嗟三藏者所鼓舞也其身毒來諸沙門莫不祖述此經憲章鞞婆沙詠歌有餘味者也然乃在大荒之外蔥嶺之表雖欲從之未由見也以建元十九年罽賓沙門僧迦禘婆誦此經甚利來詣長安比丘釋法和請令出之佛念譯傳慧力僧茂筆受和理其指歸自四月二十日出至十月二十三日乃訖其人檢挍譯人頗雜義辭龍蛇同淵金鍮共肆者彬彬如也和撫然恨之余亦深謂不可遂令更出夙夜匪懈四十六日而得盡定損可損者四卷焉至於事須懸解起盡之處皆為細其下胡本十五千七十二首盧四十八萬二千三百四言秦語十九萬五千二百五十言其人忘因緣一品云言數可與十門等也周攬斯經有碩人所尚者三焉以高座者尚其博以盡漏者尚其要以研機者尚其密密者龍象翹鼻鳴不造耳非人中之至恬其孰能與於此也要者八忍九斷巨細畢載非人中之至練其孰能致於此也博者衆微衆妙六八曲備非人中之至懿其熟能綜於此也其將來諸學者遊槃於其中何求而不得乎阿毗曇心序第十未詳作者釋和尚昔在關中令鳩摩羅跋提出此經其人不間晉語似偈本難譯遂隱而不傳至於斷章直云修妬路及見提婆乃知有此偈以偈檢前所出又多首尾隱沒互相涉入譯人所不能傳者彬彬然是以勸令更出以晉泰元十六年歲在單閼貞于重光其年冬於尋陽南山精舍提婆自執胡經先誦本文然後乃譯為晉語比丘道慈筆受至來年秋復重與提婆挍正以為定本時衆僧上座竺僧根支僧純等八十人地主江州刺史王凝之優婆塞西陽太守任固之為檀越並共勸佐而興立焉阿毗曇心序第十一釋慧遠阿毗曇心者三藏之要頌詠歌之微言管統衆經領其宗會故作者以心為名焉有出家開士字曰法勝淵識遠覽極深研機龍潛赤澤獨有其明其人以為阿毗曇經源流廣大難卒尋究非贍智宏才莫能畢綜是以探其幽致別撰斯部始自界品訖于問論凡二百五十偈以為要解號之曰心其頌聲也擬象天樂若雲籥自發儀形群品觸物有寄若乃一吟一詠狀鳥步獸行也一弄一引類乎物情也情與類遷則聲隨九變而成歌氣與數合則音協律呂而俱作拊之金石則百獸率舞奏之管絃則人神同感斯乃窮音聲之妙會極自然之衆趣不可勝言者矣又其為經標偈以立本述本以廣義先弘內以明外譬由根而尋條可謂美發於中暢於四枝者也發中之道要有三焉一謂顯法相以明本二謂定己性於自然三謂心法之生必俱遊而同感俱遊必同於感則照數會之相因己性定於自然則達至當之有極法相顯於真境則知迷情之可反心本明於三觀則覩玄路之可遊然後練神達思水鏡六府洗心淨慧擬迹聖門尋相因之數即有以悟無推至當之極動而入微矣罽賓沙門僧伽提婆少玩茲文味之彌久兼宗匠本正關入神要其人情悟所參亦已涉其津矣會遇來遊因請令譯提婆乃手執胡本口宣晉言臨文誡懼一章三復遠亦實而重之敬慎無違然方言殊韻難以曲盡儻或失當俟之來賢幸諸明哲正其大謬晉太元十六年出三法度序第十二釋慧遠法師三法度經者蓋出四阿含四阿含則三藏之契經十二部之淵府也以三法為統以覺法為道開而當名變而彌廣法雖三焉而類無不盡覺雖一焉而智無不周觀諸法而會其要辨衆流而同其原斯乃始涉之鴻漸舊學之華苑也有應真大人厥號山賢恬思間宇智周變通感達識之先覺愍後矇之未悟故撰此三法因而名云自德品暨于所依凡三章九真度斯其所作也其後有大乘居士字僧伽先以為山賢所集雖辭旨高簡然其文猶隱故仍前人章句為之訓傳演散本文以廣其義顯發事類以弘其美幽讚之功於斯乃盡自茲而後道光于世其教行焉於是振錫取足者仰玄風而高蹈禪思入微者挹清流而洗心高座談對之士擬之而後言博識淵有之賓由之而贍聞也有遊方沙門出自罽賓姓瞿曇氏字僧伽提婆昔在本國豫聞斯道雅玩神趣懷佩以遊其人雖不親承二賢之音旨而諷味三藏之遺言志在分德誨人不惓每至講論嗟詠有餘遠與同集勸令宣譯提婆於是自執胡經轉為晉言雖音不曲盡而文不害意依實去華務存其本自昔漢興逮及有晉道俗名賢並參懷聖典其中弘通佛教者傳譯甚衆或文過其意或理勝其辭以此考彼殆兼先典後來賢哲若能參通晉胡善譯方言幸復詳其大歸以裁厥中焉三法度經記第十三出經後比丘釋僧伽先志願大乘學三藏摩訶鞞耶伽蘭兼通一切書記此三法度三品九真度撰説出此經持此福祐一切衆生令從苦得安見諦解脫八揵度阿毗曇根揵度後別記第十四未詳作者斯經序曰其人忘因緣一品故闕文焉近自罽賓沙門曇摩卑暗之來經密川僧伽揥婆譯出此品八揵度文具也而卑云八揵度是體耳別有六足可自百萬言卑誦二足今無譯可出慨恨良深泰元十五年正月十九日於揚州瓦官佛圖記鞞婆沙序第十五十四卷者釋道安法師阿難所出十二部經於九十日中佛意三昧之所傳也其後別其徑至小乘法為四阿含阿難之功於斯而已迦栴延子撮其要行引經訓釋為阿毗曇四十四品要約婉顯外國重之優波離裁之所由為毗尼與阿毗曇四阿含並為三藏身毒甚珍未墜於地也其後曇摩多羅剎集修行亦大行於世也又有三羅漢一名尸陀槃尼二名達悉三名鞞羅尼撰鞞婆沙廣引聖證言輒據古釋阿毗曇焉其所引據皆是大士真人佛印印者也達悉迷而近煩鞞羅要而近略尸陀最折中焉其在身毒登無畏座僧中唱言何莫由斯道也其經猶大海與深廣浩汗千寶出焉猶崑嶽與嵬峨幽藹百珍之藪資生之徒於焉斯在茲經如是何求而不有乎有祕書郎趙政文業者好古索隱之士也常聞外國尤重此經思存想見然乃在崑嶽之右艽野之西眇爾絶域末由也已會建元十九年罽賓沙門僧伽跋澄諷誦此經四十二處是尸陀槃尼所撰者也來至長安趙郎飢虛在往求令出焉其國沙門曇無難提筆受為梵文弗圖羅剎譯傳敏智筆受為此秦言趙郎正義起盡自四月出至八月二十九日乃訖胡本一萬一千七百五十二首盧長五字也凡三十七萬六千六十四言也秦語為十六五千九百七十五字經本甚多其人忘失唯四十事是釋阿毗曇十門之本而分十五事為小品回著前以二十五事為大品而著後此大小二品全無所損其後二處是忘失之遺者令第而次之趙郎謂譯人曰爾雅有釋古釋言者明古今不同也昔來出經者多嫌胡言方質而改適今俗此政所不取也何者傳胡為秦以不開方言求知辭趣耳何嫌文質文質是時幸勿易之經之巧質有自來矣唯傳事不盡乃譯人之咎耳衆咸稱善斯真實言也遂案本而傳不令有損言遊字時改倒句餘盡實録也余欣秦土忽有此經挈海移嶽奄在茲域載玩載詠欲疲不能遂佐對挍一月四日然後乃知大方之家富昔見之至夾也恨八九之年方窺其牖耳願欲求如意珠者必牢莊強伴勿令不周倉若之實者也毗婆沙經序第十六六十卷者釋道梴作毗婆沙者蓋是三藏之指歸九部之司南司南既準則群迷革正指歸既宣則邪輪輟駕自釋迦遷暉六百餘載時北天竺有五百應真以為靈燭久潛神炬落耀含生昏喪重夢方始雖前勝迦旃延撰阿毗曇以拯頽運而後進之賢尋其宗致儒墨競搆是非紛然故乃澄神玄觀搜簡法相造毗婆沙抑正衆説或即其殊辨或標之銓評理致淵曠文蹄艷博使西域勝達之士莫不資之以鏡心覽之以朗識而冥瀾潛灑將洽殊方然理不虛運弘之由人大沮渠河西王者天懷遐廓標誠沖寄雖迹纏紛務而神棲玄境用能丘壑廊廟館第林野是使淵叟投竿巖逸來廷息心升堂玄客入室誠詣既著理感不期有沙門道泰才敏自天沖氣疏朗博關奇趣遠參異言往以漢土方等既備幽宗粗暢其所未練唯三藏九部故杖策冒嶮爰至蔥西綜攬梵文義承高旨并獲其胡本十萬餘偈既達涼境王即欲令宣譯然懼環中之固將或未盡所以側席虛襟企矚明勝時有天竺沙門浮陀跋摩周流敷化會至涼境其人開悟淵博神懷深邃研味鑽仰喻不可測遂以乙丑之歲四月中旬於涼城內苑間豫宮寺請令傳譯理味沙門智嵩道朗等三百餘人考文詳義務存本旨除煩即實質而不野王親屢回御駕陶其幽趣使文當理詣斥言有寄至丁卯歲七月上旬都訖通一百卷會涼城覆沒淪湮遐境所出經本零落殆盡今涼王信向發中深探幽趣故每至新異悕仰寄聞其年歲首更寫已出本六十卷令送至宋臺宣布未聞庶令日新之美敞於當時福祚之興垂于來葉挻以後緣得參聽末欣遇之誠竊不自默粗列時事以貽來哲雜阿毗曇心序第十七未詳作者如來泥洹數百年後有尊者法勝於佛所説經藏之中抄集事要為二百五十偈號阿毗曇心其後復有尊者達摩多羅攬其所製以為文體不足理有所遺乃更搜採衆經復為三百五十偈補其所闕號曰雜心新舊偈本凡有六百篇第之數則有十一品篇號仍舊為稱唯有擇品一品全異於先尊者多羅復即自廣引諸論敷演其義事無不列列無不辨微言玄旨於是昭著自茲之後道隆於世涉學之士莫不寶之以為美談於宋元嘉三年徐州刺史太原王仲德請外國沙門伊葉波羅於彭城出之擇品之半及論品一品有緣事起不得出竟元嘉八年復有天竺法師名求那跋摩得斯陀含道善練茲經來遊楊都更從挍定咨詳大義余不以暗短廁在二集之末輒記所聞以訓章句庶於攬者有過半之益耳後出雜心序第十八焦鏡法師昔如來泥洹之後於秦漢之間有尊者法勝造阿毗曇心本凡有二百五十偈以為十品後至晉中興之世復有尊者達摩多羅更增三百五十偈以為十一品號曰雜心十品篇目仍舊為名唯別立擇品篇以為異耳位序品次依四諦為義界品直説法相以擬苦諦行業使三品多論生死之本以擬習諦賢聖所説斷結證滅之義以擬滅諦智定二品多説無漏之道以擬道諦自後諸品雜明上事更無別體也於宋元嘉十一年甲戌之歲有外國沙門名曰三藏觀化遊此其人先於大國綜習斯經於是衆僧請令出之即以其年九月於宋都長干寺集諸學士法師雲公譯語法師觀公筆受考挍治定周年乃訖鏡以不才謬豫聽末雖思不及玄而時有淺解今謹率所聞以示後生至於折中以俟明哲於會稽始寧山徐支江精舍撰訖大智釋論序第十九釋僧睿夫萬有本於生生而生生者無生變化兆於物始而始始者無始然則無生無始物之性也生始不動於性而萬有陳於外悔吝生於內者其唯邪思乎正覺有以見邪思之自起故阿含為之作知滯有之由惑故般若為之照然而照本希夷津涯浩汗理超文表趣絶思境以言求之則乖其深以智測之則失其旨二乘所以顛沛於三藏新學所以曝鱗於龍門者不其然乎是以馬鳴起於正法之餘龍樹生於像法之末正餘易弘故直振其遺風瑩拂而已像末多端故乃寄迹凡夫示悟物以漸又假照龍宮以朗搜玄之慧託聞幽祕以窮微言之妙爾乃憲章智典作茲釋論其開夷路也則令大乘之駕方軌而直入其辨實相也則使妄見之惑不遠而自復其為論也初辭擬之必標衆異以盡美矣成之終則舉無執以盡善釋所不盡則立論以明之論其未辨則寄折中以定之使靈篇無難喻之章千載悟作者之旨信若人之功矣有究摩羅耆婆法師者少播聰慧之問長集奇拔之譽才舉則亢標萬里言發則英辨榮枯常杖茲論焉淵鏡憑高致以明宗以秦弘始三年歲次星紀十二月二十日自姑臧至長安秦王虛襟既已蘊在昔見之心豈徒則悅而已晤言相對則淹留終日研微造盡則窮年忘惓又以晤言之功雖深而恨獨得之心不曠造盡之要雖玄而惜津梁之勢未普遂以莫逆之懷相與弘兼忘之惠乃集京師義業沙門命公卿賞契之士五百餘人集於渭濱逍遙園堂鸞輿佇駕於洪涘禁禦息警於林間躬攬玄章考正名於胡本咨通律要坦夷路於來踐經本既定乃出此釋論論之略本有十萬偈偈有三十二字并三百二十萬言胡夏既乖又有煩簡之異三分除二得此百卷於大智三十萬言玄章婉旨朗然可見歸途直達無復惑趣之疑以文求之無間然矣故天竺傳云像正之末微馬鳴龍樹道學之門其淪湑溺喪矣其故何耶實由二未契微邪法用盛虛言與實教並興嶮徑與夷路爭𨅊始進者化之而流離向道者惑之而播越非二匠其孰與正之是以天竺諸國為之立廟宗之若佛又稱而詠之曰智慧日已頽斯人令再曜世昏寢已久斯人悟令覺若然者真可謂功格十地道牟補處者矣傳而稱之不亦宜乎幸哉此中鄙之外忽得全有此論胡文委曲皆如初品法師以秦人好簡故裁而略之若備譯其文將近千有餘卷法師於秦語大格唯識一法方言殊好猶隔而未通苟言不相喻則情無由比不比之情則不可以託悟懷於文表不喻之言亦何得委殊塗於一致理固然矣進欲停筆爭是則挍競終日卒無所成退欲簡而便之則負傷手穿鑿之譏以二三唯案譯而書都不備飾幸冀明悟之賢略其文而挹其玄也大智論記第二十出論後究摩羅耆婆法師以秦弘始三年歲在辛丑十二月二十日至常安四年夏於逍遙園中西門閣上為姚天王出釋論七年十二月二十七日乃訖其中兼出經本禪經戒律百論禪法要解向五十萬言并此釋論一百五十萬言論初品三十四卷解釋一品是全論其本二品已下法師略之取其要足以開釋文意而已不復備其廣釋得此百卷若盡出之將十倍於此大智論抄序第二十一釋慧遠作夫宗極無為以設位而聖人成其能昏明代謝以開運而盛衰合其變是故知嶮易相推理有行藏屈申相感數有往復由之以觀雖冥樞潛應圓景無窮不能均四象之推移一其會通況時命紛謬世道交淪而不深根固蒂寧極以待哉若達開塞之有運時來非由遇則正覺之道不虛凝於物表弘教之情亦漸可識矣有大乘高士厥號龍樹生于天竺出自梵種積誠曩代契心在茲接九百之運撫頽薄之會悲蒙俗之茫昧蹈險迹而弗吝於是卷陰衡門雲翔赤澤慨文明之未發思忽躍而勿用乃喟然嘆曰重夜方昏非熒燭之能照雖白日寢光猶可繼以朗月遂自誓落簪表容玄服隱居林澤守間行禪靖慮研微思通過半因而悟曰聞之於前論大方無垠或有出乎其外者俄而回步雪山啓神明以訊志將歷古仙之所遊忽遇沙門於巖下請質所疑始知有方等之學及至龍宮要藏祕典靡不管綜滯根既拔則名冠道位德備三忍然後開九津於重淵朋鱗族而俱遊學徒如林英彥必集由是外道高其風名士服其致大乘之業於茲復隆矣其人以般若經為靈府妙門宗一之道三乘十二部由之而出故尤重焉然斯經幽奧厥趣難明自非達學鮮得其歸故敘夫體統辨其深致若意在文外而理蘊於辭輒寄之賓主假自疑以起對名曰問論其為要也發軫中衢啓惑智門以無當為實無照為宗無當則神凝於所趣無照則智寂於所行寂以行智則群邪革慮是非息焉神以凝趣則二諦同軌玄𨅊一焉非夫正覺之靈撫法輪而再轉孰能振大業於將頽紐遺綱之落緒令微言絶而復嗣玄音輟而復詠哉雖弗獲與若人並世叩津聞道至於研味之際未嘗不一章三復欣於有遇其中可以開蒙朗照水鏡萬法固非常智之所辨請略而言生塗兆於無始之境變化搆於倚伏之場咸生於未有而有滅於既有而無推而盡之則知有無回謝於一法相待而非原生滅兩行於一化映空而無主於是乃即之以成觀反鑒以求宗鑒明則塵纍不止而儀像可覩觀深則悟徹入微而名實俱玄將尋其要必先於此然後非有非無之談方可得而言嘗試論之有而在有者有於有者也無而在無者無於無者也有有則非有無無則非無何以知其然無性之性謂之法性法性無性因緣以之生生緣無自相雖有而常無常無非絶有猶火傳而不息夫然則法無異趣始末淪虛畢竟同爭有無交歸矣故遊其樊者心不待慮智無所緣不滅相而寂不修定而間不神遇以斯通焉識空空之為玄斯其至也斯其極也過此以往莫之或知又論之為體位始無方而不可詰觸類多變而不可窮或開遠理以發興或導近習以入深或闔殊塗於一法而弗雜或闢百慮於同相而不分此以絶夫疊凡之談而無敵於天下者也爾乃博引衆經以贍其辭暢發義音以弘其美美盡則智無不周辭博則廣大悉備是故登其涯而無津挹其流而弗竭汪汪焉莫測其量洋洋焉莫比其盛雖百川灌河未足語其辨矣雖涉海求源未足窮其邃矣若然者非夫淵識曠度孰能與之潛躍非夫越名反數孰能與之淡漠非夫洞幽入冥孰能與之沖泊哉有高座沙門字曰童壽宏才博見智周群籍玩服斯論佩之彌久雖神悟發中必待感而應于時秦主姚王敬樂大法招集名學以隆三寶德洽殊俗化流西域是使其人聞風而至既達關右即勸令宣譯童壽以此論深廣難卒精究因方言易省故約本以為百卷計所遺落殆過參倍而文藻之士猶以為繁咸纍於博罕既其實譬大羹不和雖味非珍神珠內映雖寶非用信言不美固有自來矣若遂令正典隱於榮華玄朴虧於小成則百家競辨九流爭川方將幽淪長夜背日月而昏逝不亦悲乎於是靜尋所由以求其本則知聖人依方設訓文質殊體若以文應質則疑者衆以質應文則悅者寡是以化行天竺辭朴而義微言近而旨遠義微則隱昧無象旨遠則幽緒莫尋故令玩常訓者牽於近習束名教者或於未聞若開易進之路則階藉有由曉漸悟之方則始涉有津遠於是簡繁理穢以詳其中令質文有體義無所越輒依經立本繫以問論正其位分使類各有屬謹與同止諸僧共別撰以為集要凡二十卷雖不足增暉聖典庶無大謬如其未允請俟來哲
