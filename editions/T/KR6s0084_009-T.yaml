body:
  text: 釋僧祐撰華嚴經記第一出經後記十住經含注序第二釋僧衛作漸備經十住胡名并書敘第三未詳作者菩薩善戒菩薩持二經記第四釋僧祐撰大集虛空藏無盡意經記第五釋僧祐撰如來大哀經記第六未詳作者長阿鋡經序第七僧肇法師中阿鋡經序第八道慈法師增一阿鋡經序第九道安法師四阿鋡暮抄序第十未詳作者優婆塞戒經序記第十一出經後記菩提經序第十二僧馥法師關中出禪經序第十三叡法師作廬山修行方便禪經序第十四慧遠法師禪要祕密經記第十五出經後記修行地不淨觀序第十六慧觀法師勝鬘經序第十七法慈法師勝鬘經序第十八慈法師文殊師利發願記第十九出經後記賢愚經記第二十釋僧祐撰八吉祥經後記第二十一出經後記無量義經序第二十二劉虬作譬喻經序第二十三康法邃作百句譬喻經前記第二十四出經前記華嚴經記第一出經後記華嚴經胡本凡十萬偈昔道人支法領從于闐得此三萬六千偈以晉義熙十四年歲次鶉火三月十日於楊州司空謝石所立道場寺請天竺禪師佛度跋陀羅手執梵文譯胡為晉沙門釋法業親從筆受時吳郡內史孟顗右衛將軍叔度為檀越至元熙二年六月十日出訖凡再挍胡本至大宋永初二年辛丑之歲十二月二十八日挍畢十住經含注序第二釋僧衛作夫冥壑以冲虛靜用百川以之本至極以無相標玄品物以之宗故法性住湛一以居妙寂紛累以運通靈根朗圓燭以遂能乘涉動以開用然能要有資用必有本用必有本故御本則悟涉無方能要有資故悟虛則遂其通通則苞鏡六合而有無圓照塞則用隨緣感而應必慮偏照圓則神功造極慮偏則顛覆興焉故四瀆開溢則洪川灌壑玄象差轍則三光晦耀因此而推固知運通有宗化積有本夫運通之宗因緣開其會無相極其終化積之本十道啟其謀心術兆其始故心術憑無則靈照通而大乘廓滯有則神虛塞而九宅開矣然推而極之則唯心與法引而張之則綿彰八極請辯而目焉夫萬法浩然宗一無相靈魄彌綸統極圓照斯蓋目體用為萬法言性虛為無相稱動王為心識謂靜御為智照故滯有慮塞則曰心曰識憑虛照通則曰智曰見見者正見也始曉之偏目也智者正遍知也體極之圓號也正見創入轍之始正遍標體極之終四者蓋精魄彌綸水鏡萬法雖數隨緣感然靈照常一而不變者也夫體用無方則用實異照故亂識為塵穢心欲開見謂寶廓智謂種穢心故五欲為酖醴之室開見故三寶為荊石之門亂識故六塵為幻惑之肆廓智故一切種為驪龍之淵四者寔萬法浩然同實異照雖感應交映而宗一無相者也故識御六塵以矇性心赴五欲以昏慮見憑四諦以洗鑒智撫無相以通照然則境雖理故心緣精魄彌綸體故靈照靈照故統名一心所緣故總號一法若夫名隨數變則浩然無際統以心法則末始非二故十住為經將窮賾心術之原本遂真悟之始辯神功啟于化彰八萬歸於圓照使靈機無隱伏之數大造無虛竊之名爾乃落滯識以反鑒貞真慧以居宗開十道運其用恬無相遠其通合三義以廓能則表宏稱謂菩提菩提者統極十道之尊號括囊通物之妙稱乃十住啟靈照之圓極遠弘大通之逸軌故十住者靜照息機反鑒之容目者也夫所以冠大業之始唱統十地之通目表稱十住諒義存於茲焉義存於茲焉然則十住之興蓋廓明神覺之響像發瑩真慧之砥礪如來反流盡源之舟輿世雄撫會誕化之天府乃眾經之宗本法藏之淵源實鑒始領終之水鏡光宣佛慧之日月者也夫致弘不可以言象窮道玄不可以名數極故文約而義豐詞婉而旨弘兆百行開于心轍啟八萬舉其一隅非夫探鉤玄亹研機孰能亢貞鑒敬於希微開拔英悟返于三隅者哉悲夫守習之迷雖服膺舊聞不翫斯要譬負日月而彌昏面玄津而莫濟矣當請彌而攉焉夫舉高必詣遠致深則興玄故廓六天以妙處引法雲以勝眾蓋非勝無以扣其玄處非妙不足光其道道光要有方玄扣必得人故位妙處以殊方則境絕眾穢開玄肆以引眾則英彥蓋時處極六天則實映七珍眾舉法靈則體鏡九宅廓六變以開運朗耀世之宏觀叩三說以開奧撫玄中之統韻發五請以宣到慮眾誠以彌淳遞二七以運感互交用於玄端開神轍于三轉之際兆靈覺於九識之淵匹夫眾經以比興固不得同日而語開八萬以辯用焉可共劫而言非夫體苞三義道總兩端孰有若斯之弘哉孰有若斯之弘哉以此而斷其道淵矣其致玄矣夫以金剛之幽殖總神辯以居用猶日不可究其深況自降慈者乎然道不獨運弘必由人故令千載之下靈液有寄焉夫外國法師究摩羅耆婆者挺天悟於命世邁英風于季俗乘冥寄而孤遊因秦運以弘道撫玄節於希聲暢微言于象外可以祛故納新非擬三益悟宗入轍幾于過半運啟其願彌遭其會以鉛礫之質廁南金之肆誠悟無返三之機思無稽玄之謀然在聞賞事庶無惑焉故撫經靜慮感尋疇昔每苦其文約而致弘言婉而旨玄使靈燭映于隱數大宗昧于褊文神標繇是以權範玄風自茲用澆淳至于閑詣靖惟扣膺津門則何常不遙然長慨撫頹薄以興懷哉故遂撰記上聞略為注釋豈曰淵壑之待晨露蓋以申其用己之心耳庶後來明哲有以引而補焉漸備經十住胡名并書敘第三未詳作者波牟提陀晉曰一住維摩羅晉曰二住波披迦羅晉曰三住阿至摸晉曰四住頭闍耶晉曰五住阿比目佉晉曰六住頭羅迦摩晉曰七住阿遮羅晉曰八住抄頭摩提晉曰九住曇摩彌迦晉曰十住漸備經晉曰十住名第一住名悅豫第二住名離垢第三住名興光第四住名輝耀第五住名難勝第六住名目前第七住名玄妙第八住名不動第九住名善哉意第十住名法雨漸備經十住行第一住今忘第二住說誡行第三住說十二門五通事第四住說三十七品事第五住說四諦事第六住說十二因緣事第七住說權智事第八住說神足變化事第九住說神足教化事第十住亦說神足教化事漸備經護公以元康七年出之其經有五卷五萬餘言第一卷說一住事今無此一卷今現有二住以上至十住為十品漸備經十住與本業大品異說事委悉於本業大品不知何以曀於涼州昔涼州諸道士釋教道竺法彥義斯二道士普皆博學以經法為意不知何以不集此經又亦不聞其有所說始知博聞之難為人興顯經且亦是大經說事廣大義理幽深乃是眾經之美望辭敘茂贍真有奇聞而帛法巨亦是博學道士昔鄴中亦與周旋不知何以復不集此經又不聞其言博聞強記信難有護公出須賴經雖不見恒聞彥說之張天錫更出首楞嚴故當應委於先者元康七年十一月二十一日沙門法護在長安市西寺中出漸備經手執胡本譯為晉言護公菩薩人也尋其餘音遺迹使人仰之彌遠夫諸方等無生諸三昧經類多此公所出真眾生之冥梯大品出來雖數十年先出諸公略不縷習不解諸公何以爾諸公才明過人當能留心思研心以為至業者故當極有所得先出諸公故恨大蘭於文句殊多可恨大品頃來東西諸講習無不以為業於文句猶不同覺其轉深但才分有限思尋有極幽旨作非短思所盡然文句故可力為方欲研之窮此一生冀有微補漸備經恨不得上一卷冀因緣冥中之助忽復得之漸備所說十住位分眾行各有階級目下殊異於眾經方欲根悉研尋之如今芒芒猶涉大海不知第一住中何說彼或有因緣信使君不可不持作意盡尋求之理大品上兩卷若有可尋之階亦勤以為意護公出光讚計在放光前九年不九年當八年不知何以遂逸在涼州不行於世尋出經時乃在長安出之而都不流行乃不知其故吾往在河北唯見一卷經後記云十七章年號日月亦與此記同但不記處所所以為異然出經時人云聶承遠筆受帛元信沙門法度此人皆長安人也以此推之略當必在長安出此經胡本亦言于闐沙門祇多羅所齎來也此同如慧常等涼州來疏正似涼州出未詳其故或乃護公在長安時經未流宣唯持至涼州未能乃詳審泰元元年歲在丙子五月二十四日此經達襄陽釋慧常以酉年因此經寄互市人康兒展轉至長安長安安法華遣人送至互市互市人送達襄陽付沙門釋道安襄陽時齊僧有三百人使釋僧顯寫送與楊州道人竺法汰漸備經以泰元元年十月三日達襄陽亦是慧常等所送與光讚俱來頃南鄉間人留寫故不與光讚俱至耳首楞嚴須賴並皆與漸備俱至涼州道人釋慧常歲在壬申於內苑寺中寫此經以酉年因寄至子年四月二十三日達襄陽首楞嚴經事事多於先者非第一第二第九此章最多近三四百言許於文句極有所益須羅經亦復小多能有佳處云有五百戒不知何以不至此乃最急四部不具於大化有所闕般若經乃以善男子善女人為教首而戒立行之本百行之始猶樹之有根常以為深恨若有緣便盡訪求之理先胡本有至信因之勿零落菩薩善戒菩薩地持二經記第四僧祐撰祐尋舊錄此經十卷是宋文帝世三藏法師求那跋摩於京都譯出經文云此經名善戒名菩薩地名菩薩毘尼摩夷名如來藏名一切善法根本名安樂國名諸波羅蜜聚凡有七名第一卷先出優波離問受戒法第二卷始方有如是我聞次第列品乃至三十而復有別本題為菩薩地經檢此兩本文句悉同唯一兩品分品品名小小有異義亦不殊既更不見有異人重出推之應是一經而諸品亂雜前後參差菩薩地本分為三段第一段十八品第二段有四品第三段有八品未詳兩本孰是三藏所出正本也又菩薩地持經八卷有二十七品亦分三段第一段十八品第二段四品第三段五品是晉安帝世曇摩懺於西涼州譯出經首禮敬三寶無如是我聞似撰集佛語文中不出有異名而今此本或題云菩薩戒經或題云菩薩地經與三藏所出菩薩善戒經二文雖異五名相涉故同一記又此二經明義相類根本似是一經異國人出故成別部也並次第明六度品名多同製辭各異祐見菩薩地經一本其第四卷第十戒品乃是地持經中戒品又少第九施品當是曝曬誤雜後人不悉便爾傳寫其本脫多恐方亂惑若細尋內題了然可見若有菩薩地經闕無第九施品者即是誤本也大集虛空藏無盡意三經記第五僧祐撰祐尋舊錄大集經是晉安帝世天竺沙門曇摩懺於西涼州譯出有二十九卷首尾有十二段說共成一經第一瓔珞品第二陀羅尼自在王第三寶女第四不眴第五海慧第六無言第七不可說第八虛空藏第九寶幢第十虛空目第十一寶髻第十二無盡意更不見異人別譯而今別部唯有二十四卷尋其經文餘悉同唯不可說菩薩品後寶幢分前中間闕無虛空藏所問品五卷又經唯盡寶髻菩薩品復無最末無盡意所說不可思議品四卷略無二品九卷分所餘二十卷為二十四卷耳又尋兩本並以海慧菩薩品為第五越至無言菩薩品第七無第六品未詳所以又撿錄別有大虛空藏經五卷成者即此經虛空藏品當是時世有益甄為異部又別無盡意經四卷成者亦是此經末無盡意品也但護公錄復出無盡意經四卷未詳與此本同異如來大哀經記第六未詳作者元康元年七月七日燉煌菩薩支法護手執胡經經名如來大哀口授聶承遠道真正書晉言以其年八月二十三日訖護親自覆挍當令大法光顯流布其有攬者疾得總持暢澤妙法長阿含經序第七釋僧肇作夫宗極絕於稱謂賢聖以之冲默玄旨非言不傳釋迦所以致教是以如來出世大教有三約身口則防之以禁律明善惡則導之以契經演幽微則辯之以法相然則三藏之作也本於殊應會之有宗則異途同趣矣禁律律藏也四分十誦法相阿毘曇藏也四分五誦契經四阿含藏也增一阿含四分八誦中阿含四分五誦雜阿含四分十誦此長阿含四分四誦合三十經以為一部阿含秦言法歸法歸者蓋是萬善之淵府總持之林苑其為典也淵博弘富溫而彌曠明宣禍福賢愚之迹割判真偽異濟之原歷記古今成敗之數墟域二儀品物之倫道無不由法無不在譬彼巨海百川所歸故以法歸為名開析修途所記長遠故以長為目翫茲典者長迷頓曉邪正難辯顯如晝夜報應冥昧照若影嚮劫數雖遼近猶朝夕六合雖曠現若目前斯可謂朗火明於幽室慧五目於眾瞽不𨶳戶牖而智無不周矣大秦天王滌除玄攬高韻獨邁恬智交養道世俱濟每懼微言翳於殊俗以右將軍使者司隷挍尉晉公姚爽質直清柔玄心超詣尊尚大法妙悟自然上特留懷每任以法事以弘始十二年歲上章掩茂請罽賓三藏沙門佛陀耶舍出律藏四分四十卷十四年訖十五年歲昭陽奮若出此長阿含訖涼州沙門佛念為譯秦國道士道含筆受時集京夏名勝沙門於宅第挍定恭承法言敬無差舛蠲華崇朴務存聖旨余以嘉遇猥參聽次雖無翼善之功而豫親承之末故略記時事以示來覽焉中阿鋡經序第八釋道慈中阿鋡經記云昔釋法師於長安出中阿鋡增一阿毘曇廣說僧伽羅叉阿毘曇心婆須蜜三法度二眾從解脫緣此諸經律凡百餘萬言並違本失旨名不當實依悕屬辭句味亦差良由譯人造次未善晉言故使爾耳會燕秦交戰關中大亂於是良匠背世故以弗獲改正乃經數年至關東小清冀州道人釋法和罽賓沙門僧伽提和招集門徒俱遊洛邑四五年中研講遂精其人漸曉漢語然後乃知先之失也於是和乃追恨先失即從提和更出阿毘曇及廣說也自是之後此諸經律漸皆譯正唯中阿鋡僧伽羅叉婆須蜜從解脫緣未更出耳會僧伽提和進遊京師應運流化法施江左于時晉國大長者尚書令衛將軍東亭侯優婆塞王元琳常護持正法以為己任即檀越也為出經故造立精舍延請有道釋慧持等義學沙門四十許人施諸所安四事無乏又豫請經師僧伽羅叉長供數年然後乃以晉隆安元年丁酉之歲十一月十日於楊州丹楊郡建康縣界在其精舍更出此中阿鋡請罽賓沙門僧伽羅叉令講胡本請僧伽提和轉胡為晉豫州沙門道慈筆受吳國李寶唐化共書至來二年戊戌之歲六月二十五日草本始訖此中阿鋡凡有五誦都十八品有二百二十二經合五十一萬四千八百二十五字分為六十卷時遇國大難未即正書乃至五年辛丑之歲方得正寫挍定流傳其人傳譯准之先出大有不同於此二百二十二經中若委靡順從則懼失聖旨若從本制名類多異舊則逆忤先習不愜眾情是以其人不得自專時有改本從舊名耳然五部異同孰知其正而道慈愚意怏怏於違本故諸改名者皆抄出注下新舊兩存別為一卷與目錄相連以示於後將來諸賢令知同異得更採訪脫遇高明外國善晉梵方言者訪其得失刊之從正增一阿含序第九釋道安作四阿含義同中阿含首以明其指不復重序也增一阿含者皆法條貫以數相次也數終十今加其一故曰增一也且數數皆增以增為義也其為法也多錄禁律繩墨切厲乃度世撿括也外國巖岫之士江海之人於四阿含多詠味茲焉有外國沙門曇摩難提者兜佉勒國人也齠齓出家孰與廣聞誦二阿含溫故日新周行諸國無土不涉以秦建元二十年來詣長安外國鄉人咸皆善之武威太守趙文業求令出焉佛念譯傳曇嵩筆受歲在甲申夏出至來年春乃訖為四十一卷分為上下部上部二十六卷全無遺忘下部十五卷失其錄偈也余與法和共考正之僧略僧茂助挍漏失四十日乃了此年有阿城之役伐鼓近郊而正專在斯業之中全具二阿含一百卷鞞婆沙婆和須蜜僧伽羅剎傳此五大經自法東流出經之優者也四阿含四十應真之所集也十人撰一部題其起書為錄偈焉懼法留世久遺逸散落也斯土前出諸經班班有其中者今為二阿含各為新錄一卷全其故目注其得失使見經尋之差易也合上下部四百七十二經凡諸學士撰此二阿含其中往往有律語外國不通與沙彌白衣共視也而今已後幸共護也使與律同此乃茲邦之急者也斯諄諄之誨幸勿藐藐聽也廣見而不知護禁乃是學士通中創也中本起康孟祥出出大愛道品乃不知是禁經比丘尼法堪慊切直割而去之此乃是大鄙可痛恨者也此二經有力道士乃能見當以著心焉如其輕忽不以為意者幸我同志鳴鼓攻之可也四阿鋡暮抄序第十未詳作者阿鋡暮者秦言趣無也阿難既出十二部經又採撮其要逕至道法為四阿鋡暮與阿毘曇及律並為三藏焉身毒學士以為至德未墜於地也有阿羅漢名婆素跋陀抄其膏腴以為一部九品四十六葉斥重去復文約義豐真可謂經之瓔鬘也百行美妙辨是與非莫不悉載也優奧深富行之能事畢矣有外國沙門字因提麗先齎詣前部國祕之佩身不以示人其王彌第求得諷之遂得布此余以壬午之歲八月東省先師寺廟於鄴寺令鳩摩羅佛提執胡本佛念佛護為譯僧導曇究僧叡筆受至冬十一月乃訖此歲夏出阿毘曇冬出此經一年之中具二藏也深以自幸但恨八九之年始遇斯經恐韋編未絕不終其業耳若加數年將無大過也近勅譯人直令轉胡為秦解方言而已經之文質所不敢易也又有懸數懸事皆訪其人為注其下時復以意消息者為章章注修妬路者其人注解別經本也其有直言修妬路者引經證非注解也優婆塞戒經記第十一出經後記太歲在丙寅夏四月二十三日河西王世子撫軍將軍錄尚書事大沮渠興國與諸優婆塞等五百餘人共於都城之內請天竺法師曇摩讖譯此在家菩薩戒至秋七月二十三日都訖秦沙門道養筆受願此功德令國祚無窮將來之世值遇彌勒初聞悟解逮無生忍十方有識咸同斯誓菩提經注序第十二釋僧馥夫萬法無相而有二諦聖人無知而有二名二諦者俗也道也二名者權也智也二名以語默為稱二諦以緣性為言緣性兩陳而其實不乖語默誠異而幽旨莫二故般若經曰色即是空空即是色見緣起為見法也菩提經者諸佛之要藏十住之營統其文雖約而義貫眾典其旨雖玄曉然易攬猶日月麗天則群像自朗示之一隅則三方自釋也經之為體論緣性則以二諦為宗語玄會則以權智為主言菩提則以無得為玄明發意則以冥期為妙婉約而弘深莫不備矣耆婆法師入室之祕說也親承者寡故罕行世家師順得之於始會余雖不敏謬聞於第五十性疎多漏故事語而書紳豈曰注解自貽來哂庶同乎我者領之文外耳關中出禪經序第十三僧叡法師禪法者向道之初門泥洹之津徑也此土先出修行大小十二門大小安般雖是其事既不根悉又無受法學者之戒蓋闕如也究摩羅法師以辛丑之年十二月二十日自姑𮍏至常安予即以其月二十六日從受禪法既蒙啟授乃知學有成准法有成條首楞嚴經云人在山中學道無師道終不成是其事也尋蒙抄撰眾家禪要得此三卷初四十三偈是究摩羅羅陀法師所造後二十偈是馬鳴菩薩之所造也其中五門是婆須蜜僧伽羅叉漚波崛僧伽斯那勒比丘馬鳴羅陀禪要之中抄集之所出也六覺中偈是馬鳴菩薩修習之以釋六覺也初觀婬恚癡相及其三門皆僧伽羅叉之所撰也息門六事諸論師說也菩薩習禪法中後更依持世經益十二因緣一卷要解二卷別時撰出夫馳心縱想則情愈滯而惑愈深繫意念明則澄鑒朗照而造極彌密心如水火擁之聚之則其用彌全決之散之則其勢彌薄故論云質微則勢重質重則勢微如地質重故勢不如水水性重故力不如火火不如風風不如心心無形故力無上神通變化八不思議心之力也心力既全乃能轉昏入明明雖愈於不明而明未全也明全在于忘照照忘然後無明非明無明非明爾乃幾乎息矣幾乎息矣慧之功也故經云無禪不智無智不禪然則禪非智不照照非禪不成大哉禪智之業可不務乎出此經後至弘始九年閏月五日重求撿挍懼初受之不審差之一毫將有千里之降詳而定之輒復多有所正既正既備無間然矣廬山出修行方便禪經統序第十四釋慧遠夫三業之興以禪智為宗雖精麁異分而階藉有方是故發軫分逵塗無亂𨅊革俗成務功不待積靜復所由則幽緒告微淵博難究然理不云昧庶旨統可尋試略而言禪非智無以窮其寂智非禪無以深其照則禪智之要照寂之謂其相濟也照不離寂寂不離照感則俱遊應必同趣功玄於在用交養於萬法其妙物也運群動以至壹而不有廓大象於未形而不無無思無為而無不為是故洗心靜亂者以之研慮悟微入微者以之窮神也若乃將入其門機在攝會理玄數廣道隱於文則是阿難曲承音詔遇非其人必藏之靈府何者心無常規其變多方數無定像待感而應是故化行天竺緘之有匠幽關莫開罕𨶳其廷從此而觀理有行藏道不虛授良有以矣如來泥曰未久阿難傳其共行弟子末田地末田地傳舍那婆斯此三應真咸乘至願冥契于昔功在言外經所不辨必闇軌元匠孱焉無差其後有優波崛弱而超悟智終世表才高應冥觸理從簡八萬法藏所在唯要五部之分始自於此因斯而推固知形運以廢興自兆神用則幽步無跡妙動難尋涉麁生異可不慎乎可不察乎自茲已來感於事變懷其舊典者五部之學並有其人咸懼大法將頹理深其慨遂各述讚禪經以隆盛業其為教也無數方便以求寂然寂乎唯寂其揆一耳而尋條求根者眾統本運末者寡或將暨而不至或守方而未變是故經稱滿願之德高普事之風原夫聖旨非徒全其長亦所以救其短若然五部殊業存乎其人人不繼世道或隆替廢興有時則互相升降小大之目其可定乎又達節善變出處無際晦名寄跡無聞無示若斯人者復不可以名部分既非名部之所分亦不出乎其外別有宗明矣每慨大教東流禪數尤寡三業無統斯道殆廢頃鳩摩耆婆宣馬鳴所述乃有此業雖其道未融蓋是為山於一簣欣時來之有遇感寄趣於若人捨夫制勝之論而順不言之辯遂誓被僧那以至寂為己任懷德未忘故遺訓在茲其為要也圖大成於末象開微言而崇體悟惑色之悖德杜六門以寢患達忿競之傷性齊彼我以宅心於是異族同氣幻形告疎入深緣起見生死際爾乃闢九關於龍津超三忍以登位垢習凝於無生形累畢於神化故曰無所從生靡所不生於諸所生而無不生今之所譯出自達磨多羅與佛大先其人西域之俊禪訓之宗搜集經要勸發大乘弘教不同故有詳略之異達磨多羅闔眾篇於同道開一色為恒沙其為觀也明起不以生滅不以盡雖往復無際而未始出於如故曰色不離如如不離色色則是如如則是色佛大先以為澄源引流固宜有漸是以始自二道開甘露門釋四義以反迷啟歸塗以領會分別陰界導以正觀暢散緣起使優劣自辨然後令原始反終妙尋其極其極非盡亦非所盡乃曰無盡入于如來無盡法門非夫道冠三乘智通十地孰能洞玄根於法身歸宗一於無相靜無遺照動不離寂者哉禪要祕密治病經記第十五出經後記河西王從弟大沮渠安陽侯於于闐國衢摩帝大寺從天竺比丘大乘沙門佛陀斯那其人天才特拔諸國獨步誦半億偈兼明禪法內外綜博無籍不練故世人咸曰人中師子沮渠親面稟受憶誦無滯以宋孝建二年九月八日於竹園精舍書出此經至其月二十五日訖尼慧濬為檀越修行地不淨觀經序第十六慧觀法師夫禪典之妙蓋是三乘之所遊反迷悟惑者託幽途以啟真城塹三業之固宅廣六度以澄神散結賊於曠野研四變以遊心焰三慧為炬明浪冲源以殊分金剛戟以練魔定慧相和以測真如是智依定則癡妄虧而霄落定由智則七淵湛然而淳清清融九服則玄庭有階階級相乘則鑪冶成妙義之本本之有方尋根傳訓則冥一俱當雖利鈍有殊濟苦一量若契會同趣則聖性同照聖性同照則累患永遼故知禪智為出世之妙術實際之義標也夫禪智之為道言約理備究析中道對治萬法善惡相乘迭轉孰止互有廢興館𨶳匠徹略位其宗以揆大方異世同文上聖為慈悲之主留法藏於千載示三異之軌轍知會通之至階汰麁蜯於曩劫曲成眾豔之靈蠙密典相傳以至今接有緣以八背未始失其會隨機猶掌迴所謂澹智常寂而不失照雖萬機寂化一用故能窮諸法寶擬想玄扉遊志妙極躡神光於無間者哉禪典要密宜對之有宗若漏失根原則支尋不全群盲失旨則上慢幽昏可不懼乎若能審其本根冥訓道成實觀會古則萬境齊明冲途𭐋爾而融體玄像於無形然後知凡聖異流心行無邊然棄本尋條之士各以升降小異俱會其穴遂迷穴見偶變其津塗昏遊長夜永與理隔不亦哀哉自頃來禪訓實少尠得其中每以列形難保遷動不常便啟誠三寶搜求玄要依四百論扣其關旨會遇西來宗匠綜習大法尋本至終冥隅一開千載之下優曇再隆可不欣乎遂乃推究高宗承嗣之範云佛涅槃後阿難曲奉聖旨流行千載先與同行弟子摩田地摩田地傳與舍那婆斯此三應真大願弘覆冥搆于昔神超事外慈在寧濟潛行救物偶會無差佛在世時有外學五通仙人往至佛所請求出家乘俗高勝志存遠寄便言若我入道智慧辯才與身子等者爾乃當於至尊法中修習梵行佛知其本根於後百年當弘大事便答仙人汝今出家智慧淺薄不及身子仙人即退後百年中其人出世奇識博達遇物開悟遂出家學道尋得應真三明內照六通遠振辯才無礙摧諸異論所度人眾其量無邊於諸法藏開託教文諸賢遂見乃有五部之異是化運有方開徹有期五部既舉則深淺殊風遂有支流之別既有其別可不究本詳而後學耶此一部典名為具足清淨法場傳此法至於罽賓轉至富若蜜羅富若蜜羅亦盡諸漏具足六通後至弟子富若羅亦得應真此二人於罽賓中為第一教首富若蜜羅去世已來五十餘年弟子去世二十餘年曇摩多羅菩薩與佛陀斯那俱共諮得高勝宣行法本佛陀斯那化行罽賓為第三訓首有於彼來者親從其受法教誨見其涅槃時遺教言我所化人眾數甚多入道之徒具有七百富若羅所訓為教師者十五六人如今於西域中熾盛教化受學者眾曇摩羅從天竺來以是法要傳與婆陀羅婆陀羅與佛陀斯那佛陀斯那愍此旃丹無真習可師故傳此法本流至東州亦欲使了其真偽塗無亂轍成無虛搆必加厚益斯經所云開四色為分界一色無量緣宗歸部津則發趣果然其猶朝陽揮首萬類影旋師子震吼則眾獸伏焉聖王輪寶諸雄悚然攬斯法界廓清虛津入有不惑處無不沈自非道起群方智鑒玄中孰能立無言之辯於靈沼之淵寄言述於七覺之林可謂無名於所名而物無不名無形於所形而物無不形無事於所事而物無不事者哉勝鬘經序第十七釋慧觀作勝鬘經者蓋方廣之要略超昇之洪軌欲其為教也創基覆簣而雲峯已搆冲想一興而淵悟載豁言踰常訓旨越舊篇故發心希聖而神儀曜靈歸無別章而歎德斯備誠感聲發而尊號響集然後勒心切戒曠志僧那善攝靡遺大乘斯御馳輪幽𨅊長驅永路期運剋終誕登玄極玄極無二故萬流歸一故曰三乘皆入一乘所謂究竟第一義乘一誠無辯而義有區分名由義生故稱謂屢轉三五之興蓋由此也爾其奧也窮無始之前以明解惑之本究來際之末挹泥洹之妙文寡義豐彌綸群籍宇宙不足以擬其廣太虛不能以議其量淵兮其不可測也廓兮其不可極也將來本際之源追反流之極者必至於此焉司徒彭城王殖根遐劫龍現茲生依跡上台協讚皇極而神澄世表志光玄猷聞斯幽典誠期愈曠凡厥道俗莫不響悅請外國沙門求那跋陀羅手執正本口宣梵音山居苦節通悟息心釋寶雲譯為宋語德行諸僧慧嚴等一百餘人考音詳義以定厥文大宋元嘉十三年歲次玄枵八月十四日初轉梵輪訖于月終公乃廣寫雲布以澤未洽將興後世同往高會道場故略敘法要以染同暮之懷云爾勝鬘經序第十八慈法師勝鬘經者蓋是方等之宗極者也所以存于千載功由人弘故得以元嘉十二年歲在乙亥有天竺沙門名功德賢業素敦尚貫統大乘遠載胡本來遊上京庇迹祇洹招學鑽訪才雖不精絕義粗輝揚遂播斯旨乃上簡帝主于時有優婆塞何尚之居丹楊尹為佛法檀越登集京輦敏德名望便於郡內請出此經既會賢本心又謹傳譯字句雖質而理妙淵博殆非常情所可廟慮時竺道生義學弟子竺道攸者少習玄宗偏蒙旨訓後侍從入廬山溫故傳覆可謂助鳳耀德者也法師至元嘉十一年於講座之上遷神異世道攸慕深情慟有若天墜於是奉訣墳壟遂遁臨川三十許載經出之後披尋反覆既悟深旨仰而歎曰先師昔義闇與經會但歲不待人經襲義後若明匠在世剖析幽賾者豈不使異經同文解無餘向者哉輒敢解釋兼翼宣遺訓故作注解凡有五卷時人以為文廣義隱所以省者息心玄門至大明四年孝武皇帝以其師習有承勅出為都邑法師慈因得諮覲粗問此經首尾又尋其注意竊謂義然今聊撮其要解撰為二卷庶使後賢共見其旨焉文殊師利發願經記第十九出經後記晉元熙二年歲在庚申於楊州鬪場寺禪師新出云外國四部眾禮佛時多誦此經以發願求佛道賢愚經記第二十釋僧祐新撰十二部典蓋區別法門曠劫因緣既事照於本生智者得解亦理資於譬喻賢愚經者可謂兼此二義矣河西沙門釋曇學威德等凡有八僧結志遊方遠尋經典於于闐大寺遇般遮于瑟之會般遮于瑟者漢言五年一切大眾集也三藏諸學各弘法寶說經講律依業而教學等八僧隨緣分聽於是競習胡音折以漢義精思通譯各書所聞還至高昌乃集為一部既而踰越流沙齎到涼州于時沙門釋慧朗河西宗匠道業淵博總持方等以為此經所記源在譬喻譬喻所明兼載善惡善惡相翻則賢愚之分也前代傳經已多譬喻故因事改名號曰賢愚焉元嘉二十二年歲在乙酉始集此經京師天安寺沙門釋弘宗者戒力堅淨志業純白此經初至隨師河西時為沙彌年始十四親預斯集躬覩其事洎梁天監四年春秋八十有四凡六十四臘京師之第一上座也唯經至中國則七十年矣祐總集經藏訪訊遐邇躬往諮問面質其事宗年耆德峻心直據明故標講為錄以示後學焉八吉祥經記第二十一出經後記八吉祥經宋元嘉二十九年太歲壬辰正月三日天竺國大乘比丘釋求那跋陀羅於荊州城內譯出此經至其月六日竟使持節侍中都督荊湘雍益梁寧南北秦八州諸軍事司空荊州刺史領南蠻挍尉南譙王優婆塞劉義宣為檀越無量義經序第二十二荊州隱士劉虬作無量義經者取其無相一法廣生眾教含義不貲故曰無量夫三界群生隨義而轉一極正覺任機而通流轉起滅者必在苦而希樂此叩聖之感也順通示現者亦施悲而用慈即救世之應也根異教殊其階成七先為波利等說五戒所謂人天善根一也次為拘隣等轉四諦所謂授聲聞乘二也次為中根演十二因緣所謂授緣覺乘三也次為上根舉六波羅蜜所謂授以大乘四也眾教宜融群疑須導次說無量義經既稱得道差品復云未顯真實使發求實之冥機用開一極之由序五也故法華接唱顯一除三順彼求實之心去此施權之名六也雖權開而實現猶掩常住之正義在雙樹而臨崖乃暢我淨之玄音七也過斯以往法門雖多撮其大歸數盡於此亦由眾聲不出五音之表百氏並在六家之內其無量義經雖法華首戴其目而中夏未覩其說每臨講肆未嘗不廢談而歎想見斯文忽有武當山比丘慧表生自羗胄偽帝姚略從子國破之日為晉軍何澹之所得數歲聰黠澹之字曰螟蛉養為假子俄放出家便勤苦求道南北遊尋不擇夷險以齊建元三年復訪奇搜祕遠至嶺南於廣州朝亭寺遇中天竺沙門曇摩伽陀耶舍手能隷書口解齊言欲傳此經未知所授表便慇懃致請心形俱至淹歷旬朔僅得一本仍還嶠北齎入武當以今永明三年九月十八日頂戴出山見投弘通奉覿真文欣敬兼誠詠歌不足手舞莫宣輒虔訪宿解抽刷庸思謹立序注云自極教應世與俗而差神道救物稱感成異玄圃以東號曰太一罽賓以西字為正覺東國明殃慶於百年西域辨休咎於三世希無之與修空其揆一也有欲於無者既無得無之分施心於空者豈有入空之照而講求釋教者或謂會理可漸或謂入空必頓請試言之以筌幽寄立漸者以萬事之成莫不有漸堅氷基於履霜九成作於累土學人之入空也雖未員符譬如斬木去寸無寸去尺無尺三空稍登寧非漸耶立頓者以希善之功莫過觀於法性法性從緣非有非無忘慮於非有非無理照斯一者乃曰解空存心於非有非無境智猶二者未免於有有中伏結非無日損之驗空上論心未有入理之効而言納羅漢於一聽判無生於終朝是接誘之言非稱實之說妙得非漸理固必然既二談分路兩意爭途一去一取莫之或正尋得旨之匠起自支安支公之論無生以七住為道慧陰足十住則群方與能在迹斯異語照則一安公之辯異觀三乘者始匱之因稱定慧者終成之實錄此謂始求可隨根三入解則其慧不二譬喻亦云大難既夷乃無有三險路既息其化即亡此則名一為三非有三悟明矣生公云道品可以泥洹非羅漢之名六度可以至佛非樹王之謂斬木之喻木存故尺寸可漸無生之證生盡故其照必頓案三乘名教皆以生盡照息去有入空以此為道不得取象於形器也今無量義亦以無相為本若所證實異豈曰無相若入照必同寧曰有漸非漸而云漸密筌之虛教耳如來亦云空拳誑小兒以此度眾生微文接麁漸說或允忘象得意頓義為長聊舉大較談者擇焉譬喻經序第二十三康法邃造譬喻經者皆是如來隨時方便四說之辭敷演弘教訓誘之要牽物引類轉相證據互明善惡罪福報應皆可寤心免彼三塗如今所聞億未載一而前後所寫互多複重今復撰集事取一篇以為十卷比次首尾皆令條別趣使易了於心無疑願率土之賢有所遵承永升福堂為將來基百句譬喻經記第二十四出經前記永明十年九月十日中天竺法師求那毘地出修多羅藏十二部經中抄出譬喻聚為一部凡一百事天竺僧伽斯法師集行大乘為新學者撰說此經
