body:
  text: 梁建初寺沙門釋僧祐撰宋明帝勅中書侍郎陸澄撰法論目錄序第一齊太宰竟陵文宣王法集錄序第二釋僧祐法集總目錄序第三釋迦譜記目錄序第四世界記目錄序第五薩婆多部師資記目錄序第六法苑目錄序第七弘明集目錄序第八十誦律義記目錄序第九法集雜記銘目錄序第十雜錄序夫靈源啟潤則萬流脈散玄根毓萌則千條雲積何者本大而末盛基遠而緒長也自尊經神運秀出俗典由漢屆梁世歷明哲雖復緇服素飾並異跡同歸講議讚析代代彌精注述陶練人人競密所以記論之富盈閣以仞房書序之繁充車而被軫矣宋明皇帝摽心淨境載飡玄味迺勅中書侍郎陸澄撰錄法集陸博識洽聞苞舉群籍銓品名例隨義區分凡十有六帙一百有三卷其所閏古今亦已備矣今即其本錄以相綴附雖非正經而毘讚道化可謂聖典之羽儀法門之警衛足以輝顯前緒昭進後學是以寄于三藏集末以廣枝葉之覽焉宋明帝勅中書侍郎陸澄撰法論目錄序第一論或列篇立第兼明眾義者今總其宗致不復擿分合之則體全別之則文亂置難形神援譬薪火庾闡發其議謝瞻廣其意然桓譚未及聞經先著此言有足奇者宜其掇附也牟子不入教門而入緣序以持載漢明之時像法初傳故也魏祖答孔是知英人開尊道之情習生貽安則見令主弘信法之心所以有取二書指存兩事又支遁敷翰遠國述江南僧業故兼錄即色遊玄論支道林王敬和問支答辯著論支道林釋即色本無義支道林王幼恭問支答不真空論釋僧肇本無難問郗嘉賓竺法汰難并郗答往反四首郗與法𤀹書郗與開法師書郗與支法師書心無義桓敬道王稚遠難桓答釋心無義劉遺民法性論上下釋慧遠實相義釋道安問實相王稚遠外國法師答問如法性真際釋慧遠什法師答問實法有釋慧遠鳩摩答問分破空釋慧遠什答實相論釋曇無威實相通塞論釋道含會通論支曇諦支書與郗嘉賓會通論上下釋慧義始元論釋僧宗略論諸經勝鬘經序釋慧觀百論序釋僧叡百論序釋僧肇右法論第一帙法性集十五卷涅槃無名論釋僧肇佛性論上下釋僧宗問涅槃有神不王稚遠什答問滅度權實王稚遠竺法師答問清淨國王稚遠什法師答涅槃三十六問竺道生釋八住初心欲取泥洹義竺道生與諸道人論大般泥洹義范伯倫論經目大涅槃經序辯佛性義竺道生王問并竺答佛性集釋慧靜佛性論右法論第二帙覺性集七卷道行指歸支道林何敬問支答道行指歸云是安公述相傳云般若無名論釋僧肇劉遺民難肇答問佛成道時何用王稚遠什答問般若法王稚遠什法師答問般若稱王稚遠什法師答問般若知王稚遠什法師答問般若是實相智非王稚遠什法師答問般若薩婆若同異王稚遠什法師答問無生法忍般若同異王稚遠什法師答問禮事般若王稚遠什法師答問佛慧王稚遠什法師答問權智同異王稚遠什法師答問菩薩發意成佛王稚遠什法師答般若折疑略序釋道安大品序釋道安大品經序釋僧叡大智釋論序釋僧叡般若經問論序釋慧遠中論序釋僧叡小品經序釋僧叡合維摩詰經序支敏度道行品注序維摩詰經注序釋僧肇毘摩羅詰經義疏序釋僧叡自在王經後序釋僧叡思益經義疏序釋僧叡與釋慧遠書論真人至極釋慧遠答與諸道人論般若義范伯倫右法論第三帙般若集六卷問法身王稚遠什答問法身釋慧遠什答重問法身釋慧遠什答問真法身像類釋慧遠什答問真法身壽釋慧遠什答問法身應感釋慧遠什答問法身非色釋慧遠什答問修三十二相釋慧遠什答問釋慧嚴法身二義竺僧弼丈六即真論釋僧肇通佛影迹顏延年通佛頂齒爪顏延年通佛衣鉢顏延年通佛二疊不燃顏延年右法論第四帙法身集四卷問法身佛盡本習釋慧遠什答問成佛時斷何累王稚遠什答右法論第五帙解脫集一卷法華經後序釋僧叡妙法蓮華經序釋慧遠妙法蓮華經宗要序釋慧觀與竺道生書劉遺民法華經論辯三乘論支道林無三乘統略釋慧遠問釋道安三乘并書竺法汰問三乘一乘什答問得三乘王稚遠法師答問三歸王稚遠法師答問辟支佛王稚遠法師答四阿含暮抄序長阿含經序釋僧肇三法度經序釋慧遠正誣論了本生死經注序法句經序明佛論宗少文譬道論孫興公坐右銘支道林道學誡支道林切悟章支道林支道林答謝長遐書離識觀顏延年張景胤與從弟景玄書論西方并答奉法要郗嘉賓七眾法通神呪郗嘉賓明感論郗嘉賓問菩薩生五道中王稚遠法師答問七佛王稚遠什答問不見彌勒不見千佛王稚遠什法師答右法論第六帙教門集十二卷優婆塞五學跡略論上下三藏法師法社節度序釋慧遠外寺僧節度序釋慧遠節度序釋慧遠般若臺眾僧集議節度序支道林比丘尼節度序釋慧遠咸康六年門下議并詔及何次道議二首晉成帝詔及何次道議四首詔是庾季堅作桓敬道書與八座論道人敬王者八座答桓敬道與王稚遠書往反九首桓敬道與釋慧遠書往反三首桓敬道偽詔沙門不復敬天子并卞嗣之等答往反十首桓敬道沙汰沙門教釋慧遠答桓敬道書論料簡沙門事宋武為相時沙汰道人教沙門不敬王者論釋慧遠問佛法不老王稚遠什答與釋慧遠書論沙門袒服鄭道子沙門袒服論釋慧遠答何無忌難遠答與禪師書論踞食鄭道子與王司徒諸人書論據食范伯倫釋慧義答范重答與道生慧觀二法師書范伯倫論據食表并詔四首范伯倫右法論第七帙戒藏集八卷本起四禪序并注支道林安般守意經注序康會十二門經注序釋道安十二門注序陰持入經注序人本欲生經注序禪經序釋僧叡禪經序釋慧遠釋神足釋慧遠問念佛三昧釋慧遠什答妄書禪慧宣諸弘信顏延年聞慧思修禪定義在家習定法右法論第八帙定藏集四卷阿毘曇心序釋慧遠阿毘曇序阿毘曇五法行義謝慶緒阿毘曇心略解數阿毘曇心雜數林問竺道生諸道人佛義范伯倫眾僧述范問范重問道生往反三首傅季友答范伯倫書辯宗論謝靈運法勗問往反六首僧維問往反六首慧驎述僧維問往反六首驎雜問往反六首竺法綱釋慧林問往反十一首王休元問往反十四首竺道生答王問一首漸悟論釋慧觀沙門竺道生執頓悟謝康樂靈運辯宗述頓悟沙門釋慧觀執漸悟明漸論釋曇無成右法論第九帙慧藏集七卷問遍學外國法師答問遍學釋慧遠什答重問遍學釋慧遠什答問羅漢受釋慧遠什答論三行上郗嘉賓敘通三行郗嘉賓郗與謝慶緒書往反五首論三行下郗嘉賓郗與傅叔玉書往反三首答英郎書一首王季琰書往反四首與仰法師書并答二首道地經注序略解三十七品次第什法師本業略例支道林本業經注序支道林論十住上下傅叔玉書與謝慶緒論十住往反四首二首分為下卷傅叔玉重書并謝答三十二字十住義釋曇遇實相標格論問住壽釋慧遠什答問釋道安六通竺汰右法論第十帙雜行集十卷十報法統略釋三報論釋慧遠述竺道生善不受報義釋僧璩釋鏡難璩答全生論郗嘉賓殺生門桓敬道殷伯道答桓難明報應論釋慧遠報應論卞湛范伯倫難卞答業報論右法論第十一帙業報集六卷神本論支曇諦命源論釋慧靜識三本論謝慶緒友道人書與謝論三識并答戴安道書與謝論三識并答往反三首四執論問精神心意識王稚遠什答問十數法王稚遠什法師答辯心意識釋慧遠釋神名釋慧遠驗寄名釋慧遠問論神釋慧遠問釋道安神竺法汰問神識王稚遠什答五陰三達釋郗嘉賓問後識追憶前識釋慧遠什答神不更受形論庾仲初更生論羅君章孫安國難羅答習鑿齒難神不滅論鄭道子桓君山新論論形神書與何彥德論感果生滅五往反顏延年山巨源問摯元禮諮顏答山摯二難右法論第十二帙色心集九卷問四相釋慧遠物不遷論釋僧肇申無生論釋曇無成右法論第十三帙物理集三卷牟子一云蒼梧太守牟子博傳舊首楞嚴經後序支法護像讚支道林答孔文舉書魏武帝與釋道安書習鑿齒與釋道安書伏玄度與高句驪國道人書支道林右論第十四帙緣序集二卷難沙門子法龍釋道彥法龍答答謝宣明難佛理范伯倫論檢顏延年答或人問顏延年關中法𣸫道人與涼州同學書達性論何承天顏延年釋何五往反道人問顏答均善論釋慧琳何承天與宗少文書五往反演均善論斷家養論何彥德釋慧琳難廣何顏延年顏重與何書右法論第十五帙雜論集六卷辯教論桓敬道婚農無傷論釋慧琳照極明化論顧長康問難釋慧琳右法論第十六帙邪論集三卷齊太宰竟陵文宣王法集錄序第二夫五時九部之契三請四卷之機玄哉邈乎奧不可議已然法海無涯航而罕知大慧藏不極採而得寶是以弘誓之士隨時斟酌馬鳴抽其幽宗龍樹振其絕緒提婆析其名數訶梨總其條理並翼讚妙典俘剪外學迷津見衢長夜逢曉故智慧之日名飛於摧邪功德之月績翔於闡化亦已盛矣但群萌殊葉根力異品運季道澆信淡識淺至於披瞽發聾事資懇勵藥愚針惑宜務切近是以後代敷訓顯晦不一或颺言以汎解或提耳而指授所以卷舒教義抑揚風軌豈滯恒方期於悟俗而已齊太宰竟陵文宣王淨剎萌因忍土現果慧自天成道為期出孝忠淳和之深仁智博愛之厚率由而極因心則至若乃棲神二諦宅業三寶瞻前卓爾望後不群用能降帝子之尊灼淨土之操屏朱觀之貴下白屋之禮磨踵以拯俗刻髓以侚道望億劫以長駈淩千載而獨上若乃闡經律弘福施𣸫蒼黎敏翾動未常不慮積昏明慈洽巨細感靈瑞於顯微通覺應於霄夢固已葳民譽昭晢神聽矣至於苞括儒訓洞鏡釋典空有雙該內外咸照常欲廣彼洲渚熾此法燈駐四生之風波燭九居之霾霧指來際以為期總大千以為任故惻隱垂教慇懃敷道於是銳臨雲之思壯談天之文網羅字輪儀形法印是以淨住命氏啟入道之門華嚴瓔珞標出世之術決定要行進趣乎金剛戒果莊嚴克成乎甘露爾其眾經注義法塔讚頌僧制藥記之流導文願疏之屬莫不誠在言前理出辭表大者鉤深測幽小者馳辯感俗森成條章欝為卷帙可謂開士住心道場初跡冠一代之妙化垂千祀之勝範者也祐昔以道緣預屬嘉會律任法使謬荷其寄齋堂梵席時抂其請哲人俎謝而道心不亡靜尋遺篇曖乎如在遂序茲集錄以貽來世云爾淨住子十卷右第一帙上淨住子十卷右第二帙下華嚴瓔珞二卷右第三帙諸佛名十卷右第四帙諸菩薩名二卷右第五帙菩薩決定要行十卷右第六帙注優婆塞戒三卷右第七帙戒果莊嚴一卷注遺教經一卷右第八帙維摩義略五卷右第九帙雜義記十卷右第十帙上雜義記十卷右第十一帙下僧制一卷清信士女法制三卷右第十二帙禮佛文二卷右第十三帙西州法雲小莊嚴普弘寺講并述羊常弘廣齋共卷抄成實論序并上定林講共卷華嚴齋記一卷施藥記一卷捨身記一卷妃捨身記一卷發願疏一卷會稽荊雍江郢講記一卷內典序并讚一卷述放生東宮齋述受戒共卷僧得施三業施施食法共卷右第十四帙宣白僧尼疏與暢疏并與州郡書求內典共一卷法門讚一卷講淨住記一卷受維摩注名一卷與僚佐書并教誡左右一卷拜楊州刺史發願一卷與何祭酒書讚去滋味一卷讚梵唄偈文一卷開優婆塞經題一卷右第十五帙大司馬捨身并施天保二眾一卷佛牙記一卷答疑惑書并稚珪書一卷教宣約受戒人一卷八日禪靈寺齋并頌一卷龍華會并道林齋一卷布薩并天保講一卷淨住子次門一卷梵唄序一卷轉讀法并釋滯一卷示諸朝貴法制啟二卷示諸朝貴釋滯啟答二卷寶塔頌并石像記一卷受戒并弘法式一卷右第十六帙十六帙合一百一十六卷自書經目錄大字維摩經一部十四卷細字維摩經一部六卷妙法蓮花經一部十四卷般舟三昧經一部二卷無量壽經一部四卷十地經一部十卷華嚴經六卷大泥洹經五卷虛空藏經二卷泥洹受持品一卷護身經一卷觀世音經一卷普賢經一卷金剛波若經一卷八吉祥神呪經一卷出生無量門持經一卷呵色慾經一卷齊竟陵王世子撫軍巴陵王法集序蓋聞世諦善論法海所總嚴錺文辭初位是攝自大化東漸㳂世詠歌魏來雜製間出群集至於才中含章思入精理固法門之羽纛梵聲之金石也齊竟陵文宣王世子故撫軍巴陵王稟華於崐峯敏明璣於珠海慧發𧤪辰識表綺歲孝友停至機頴朗徹故幼無弱弄夙有老成甫在志學固已總括墳典矣雅好辭賦允登高之才藉意隷書均臨池之敏業盈竹素慮滿風月是時齊方有德文宣翼讚康衢既熙慧教傍遠世子以枝葉之慶蕃守淅河下車風舉升席治立含靜臺以御己垂蘭蕙以振俗郡富名山巖多靈寺故勝業愈高清心彌往每遊踐必訓思若淵泉信足以揄揚至道炳發玄極觀其擒賦經聲述頌繡像千佛願文捨身弘誓四城九相之詩釋迦十聖之讚並英華自凝新聲間出故僕射范雲篤賞文會雅相嗟重以為後進之佳才也至隆昌之時始兆無妄永元之末運屬道消葛藟失庇磐石傾翦虎兕出柙宗室致猜而樂天知命夷憂味道在艱不虧其貞處約無改其節鏡因果而靡晦洞真俗而如曉專精於大覺之門懍烈於經典之奧於是下帷墐戶注解百論拔出幽旨妙盡纖典乃躬算縑素手寫方等所書大經凡有十部鋒刃勁削風趣妍靡論其思理所徹業藝所貫有踰萁裘之能克副青藍之敏矣夫深宮寡識著自格言梁肉多驕聞之前記而能拔類獨立超然高舉豈非內鑄堅芳之性外瑩過庭之風哉以法而說譬金龍之嗣信相由俗而議邁允恭之紹陳思可謂開士宿因旃檀眷屬無忝堂構克勝負荷者也余昔緣法事亟覿清徽及律集稽川屢延供禮惜乎早世文製未廣今撰錄法詠以繼文宣內集使千祀之外知蘭菊之無絕焉巴陵雜集目錄造千佛願繡佛頌捨身序并願右上卷釋迦讚十弟子讚十首為會稽西方寺作禪圖九相詠十首四城門詩四首法詠歎德二首佛牙讚經聲賦會稽寶林寺禪房閑居頌右下卷自寫經目錄并注法華經一部七卷維摩經一部三卷無量壽二部四卷金剛波若三部三卷請觀世音一部一卷八吉祥一部一卷波若神呪一部一卷右十部注百論一部釋僧祐法集總目錄序第三常聞瀝泣助河之談捧土裨岱之論雖誚發於古而愧集於今矣僧祐漂隨前因報生閻浮幼齡染服早備僧數而慧解弗融禪味無紀剎那之息徒積錙毫之勤未基是以懼結香朝慚動鍾夕茫茫塵劫空閱斬籌然竊有堅誓志是大乘頂受方等遊心四含加以山房寂遠泉松清密以講席間時僧事餘日廣訊眾典披覽為業或專日遺飡或通夜繼燭短力共尺波爭馳淺識與寸陰競晷雖復管窺迷天䗍測惑海然遊目積心頗有微悟遂綴其聞誡言法寶仰稟群經傍採記傳事以類合義以例分顯明覺應故序釋迦之譜區辯六趣故述世界之記訂正經譯故編三藏之錄尊崇律本故銓師資之傳彌綸福源故撰法苑之篇護持正化故集弘明之論且少受律學刻意毘尼旦夕諷持四十許載春秋講說七十餘遍既稟義先師弗敢墜失標括章條為律記十卷并雜碑記撰為一帙總其所集凡有八部冀微啟於今業庶有藉於來津豈曰善述庶非妄作但理遠識近多有未周明哲儻覽取諸其心使道場之果異跡同臻焉釋迦譜五卷右一部第一帙世界記五卷右一部第二帙出三藏記集十卷右一部第三帙薩婆多部相承傳五卷右一部第四帙法苑集十卷右一部第五帙弘明集十卷右一部第六帙十誦義記十卷右一部第七帙法集雜記傳銘十卷右一部第八帙釋迦譜目錄序第四釋僧祐撰蓋聞菩提之為極也神妙寂通圓智湛照道絕於形識之封理畢於生滅之境形識久絕豈實誕於王宮生滅已畢寧真謝於堅固哉但群萌長寢同歸大覺緣來斯化感至必應若應而不生誰興悟俗化而無名何以導世是以標號釋迦擅種剎利體域中之尊冠人天之秀然後脫屣儲宮直觀道樹捨金輪而馭大千明玉豪而制法界此其所以垂跡也爰自降胎至于分塔偉化千條靈瑞萬變並義炳經典事盈記傳而群言參差首尾散出事緒舛駁同異莫齊散出首尾宜有貫一之區莫齊同異必資會通之契故傳訊難該而揔集易覽也祐以不敏業謝多聞時因疾隙頗存尋翫遂乃披經按記原始要終敬述釋迦譜記列為五卷若夫胤裔託生之源得道度人之要泥洹塔像之徵遺法將滅之想總眾經以正本綴世記以附末使聖言與俗說分條古聞共今跡相證萬里雖邈有若躬踐千載誠隱無隔面對今抄集眾經述而不作庶脫尋訪力半功倍敬率丹心略敷誓願釋迦始祖劫初剎利相承譜第一出長阿含經釋迦始祖劫初姓瞿曇緣譜第二出十二遊經釋迦六世祖始姓釋氏緣譜第三出長阿含經釋迦降生釋種成佛緣譜第四出普耀經釋迦在七佛末種姓眾數同異譜第五出長阿含經釋迦同三千佛緣譜第六出藥王藥上觀經釋迦內外族姓名譜第七出長阿含經釋迦弟子姓釋緣譜第八出增一阿含釋迦四部名聞弟子譜第九出增一阿含右第一卷釋迦從兄調達出家緣記第十出中本起經釋迦從弟阿那律跋提出家記第十一出曇無德律釋迦從弟孫陀羅難陀出家緣記第十二出出耀經釋迦子羅云出家緣記第十三出未曾有經釋迦姨母大愛道出家緣記第十四出中本起經釋迦父淨飯王泥洹記第十五出淨飯王泥洹經釋迦母摩耶夫人記第十六出佛昇忉利天經