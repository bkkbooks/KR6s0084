body:
  text: 釋僧祐撰摩訶鉢羅若波羅蜜經抄序第一道安法師大品經序第二長安叡法師大品注經序第三大梁皇帝小品經序第四長安叡法師大小品對比要抄序第五支道林作正法華記第六出經後記正法華後記第七未詳作者法華宗要序第八慧觀法師法華經後序第九長安叡法師持心經後記第十出經後記思益經序第十一長安叡法師維摩詰經序第十二僧肇法師合維摩詰經序第十三敏度法師毘摩羅詰堤經義疏序第十四長安叡法師自在王經後序第十五長安叡法師大涅槃經序第十六涼州朗法師大涅槃經記序第十七未詳作者六卷泥洹經記第十八出經後記二十卷泥洹經記第十九出智猛傳摩訶鉢羅若波羅蜜經抄序第一道安法師昔在漢陰十有五載講放光經歲常再遍及至京師漸四年矣亦恒歲二未敢墮息然每至滯句首尾隱沒釋卷深思恨不見護公叉羅等會建元十八年正車師前部王名彌第來朝其國師字鳩摩羅跋提獻胡大品一部四百二牒言二十千失盧失盧三十二字胡人數經法也即審數之凡十七千二百六十首盧殘二十七字都并五十五萬二千四百七十五字天竺沙門曇摩蜱執本佛護為譯對而撿之慧進筆受與放光光讚同者無所更出也其二經譯人所漏者隨其失處稱而正焉其義異不知孰是者輒併而兩存之往往為訓其下凡四卷其一經五卷也譯胡為秦有五失本也一者胡語盡倒而使從秦一失本也二者胡經尚質秦人好文傳可眾心非文不合斯二失本也三者胡經委悉至於嘆詠丁寧反覆或三或四不嫌其煩而今裁斥三失本也四者胡有義記正似亂辭尋說向語文無以異或千五百刈而不存四失本也五者事已全成將更傍及反騰前辭已乃後說而悉除此五失本也然般若經三達之心覆面所演聖必因時時俗有易而刪雅古以適今時一不易也愚智天隔聖人叵階乃欲以千歲之上微言傳使合百王之下末俗二不易也阿難出經去佛未久尊者大迦葉令五百六通迭察迭書今離千年而以近意量截彼阿羅漢乃兢兢若此此生死人而平平若此豈將不知法者勇乎斯三不易也涉茲五失經三不易譯胡為秦詎可不慎乎正當以不開異言傳令知會通耳何復嫌大匠之得失乎是乃未所敢知也前人出經支讖世高審得胡本難繫者也叉羅支越斵鑿之巧者也巧則巧矣懼竅成而混沌終矣若夫以詩為煩重以尚書為質朴而刪令合今則馬鄭所深恨者也近出此撮欲使不雜推經言旨唯懼失實也其有方言古辭自為解其下也於常首尾相違句不通者則冥如合符厭如復折乃見前人之深謬欣通外域之嘉會也於九十章蕩然無措疑處毫芒之間泯然無微疹已矣乎南摸一切佛過去未來現在佛如諸法明天竺禮般若辭也明智也外國禮有四種一罽耶二波羅南三婆南四南摸南摸屈體也跪也此四拜拜佛外道國主父母通拜耳禮父母云南摸薩迦薩迦供養也摩訶大也鉢羅若智也波羅度也蜜無極經抄天竺經無前題前題皆云吉法吉法竟是也道安為此首目題也大品經序第二長安釋僧叡摩訶般若波羅蜜者出八地之由路登十階之龍津也夫淵府不足以盡其深美故寄大以目之水鏡未可以喻其澄朗故假慧以稱之造盡不足以得其崖極故借度以明之然則功託有無度名所以立照本靜末慧目以之生曠兼無外大稱由以起斯三名者雖義涉有流而詣得非心跡寄有用而功實非待非心故以不住為宗非待故以無照為本本以無照則凝知於化始宗以非心則忘功於行地故啟章玄門以不住為始妙歸三慧以無得為終假號照其真應行顯其明無生冲其用功德旍其深大明要終以驗始漚和即始以悟終蕩蕩焉真可謂大業者之通塗畢佛乘者之要軌也夫寶重故防深功高故校廣囑累之所以慇懃功德之所以屢增良有以也而經來茲土乃以秦言譯之典摸乖於殊制名實喪於不謹致使求之彌至而失之彌遠頓轡重關而窮路轉廣不遇淵匠殆將墜矣亡師安和上鑿荒塗以開轍摽玄指於性空落乖蹤而直達殆不以謬文為閡也亹亹之功思過其半邁之遠矣究摩羅什法師慧心夙悟超拔特詣天魔于而不能迴淵識難而不能屈扇龍樹之遺風振慧響於此世秦王感其來儀時運開其凝滯以弘始三年歲次星紀冬十二月二十日至長安秦王扣其虛關匠伯陶其淵致虛關既闡乃正此文言淵致既宣而出其釋論渭濱流祇洹之化西明啟如來之心逍遙集德義之僧京城溢道詠之音末法中興將始於此乎予既知命遇此真化敢竭微誠屬當譯任執筆之際三惟亡師五失及三不易之誨則憂懼交懷惕焉若厲雖復履薄臨深未足喻也幸冀宗匠通鑒文雖左右而旨不違中遂謹受案譯敢當此任以弘始五年歲在癸卯四月二十三日於京城之北逍遙園中出此經法師手執胡本口宣秦言兩釋異音交辯文旨秦王躬攬舊經驗其得失諮其通途坦其宗致與諸宿舊義業沙門釋慧恭僧䂮僧遷寶度慧精法欽道流僧叡道恢道㯹道恒道悰等五百餘人詳其義旨審其文中然後書之以其年十二月十五日出盡校正檢括明年四月二十三日乃訖文雖粗定以釋論撿之猶多不盡是以隨出其論隨而正之釋論既訖爾乃文定定之未已已有寫而傳者又有以意增損私以般若波羅蜜為題者致使文言舛錯前後不同良由後生虛己懷薄信我情篤故也胡本唯序品阿鞞跋致品魔品有名餘者直第其事數而已法師以名非佛制唯存序品略其二目其事數之名與舊不同者皆是法師以義正之者也如陰入持等名與義乖故隨義改之陰為眾入為處持為性解脫為背捨除入為勝處意止為念處意斷為正勤覺意為菩提直行為聖道諸如此比改之甚眾胡音失者正之以天竺秦名謬者定之以字義不可變者即而書之是以異名斌然胡音殆半斯實匠者之公謹筆受之重慎也幸冀遵實崇本之賢推而體之不以文撲見咎煩異見慎也注解大品序第三大梁皇帝機事未形六畫得其悔吝玄象既運九章測其盈虛斯則鬼神不能隱其情狀陰陽不能遁其變通至如摩訶般若波羅蜜者洞達無底虛豁無邊心行處滅言語道斷不可以數術求不可以意識知非三明所能照非四辯所能論此乃菩薩之正行道場之直路還源之真法出要之上首本來不然畢竟空寂寄大不能顯其博名慧不能庶其用假度不能機其通借岸不能窮其實若談一相事絕百非補處默然等覺息行始廼可謂無德而稱以無名相作名相說導涉求之意開新發之眼故有般若之字彼岸之號頃者學徒罕有尊重或時聞聽不得經味帝釋誠言信而有徵此實賢眾之百慮菩薩之魔事故唱愈高和愈寡知愈希道愈貴致使正經沈匱於世寔由虛己情少懷疑者多虛己少則是我之見深懷疑多則橫構之慮繁然則雖繁慮紛紜不出四種一謂此經非是究竟多引涅槃以為碩訣二謂此經未是會三咸誦法華以為盛難三謂此經三乘通教所說般若即聲聞法四謂此經是階級行於漸教中第二時說舊義如斯廼無是非較略四意粗言所懷涅槃是顯其果德般若是明其因行顯果則以常住佛性為本明因則以無生中道為宗以世諦言說是涅槃是般若以第一義諦言說豈可復得談其優劣法華會三以歸一則三遣而一存一存未免乎相故以萬善為乘體般若即三而不三則三遣而一亡然無法之可得故以無生為乘體無生絕於戲論竟何三之可會所謂百花異色共成一陰萬法殊相同入般若言三乘通教多執二文今復開五意以增所疑一聲聞若智若斷皆是菩薩無生法忍二三乘學道宜聞般若三三乘同學般若俱成菩提四二乘欲住欲證不離是忍五羅漢辟支從般若生於此五義不善分別堅著三乘教同一門遂令朱紫共色珉玉等價若明察此說深求經旨連環既解弄丸自息謂第二時是亦不然人心不同皆如其面根性差別復過於此非可局以一教限以五時般若無生非去來相豈以數量拘寧可以次第求始於道樹終於雙林初中後時常說智慧復何可得名為漸教釋論言須菩提聞法華經中說於佛所作少功德乃至戲笑漸漸必當作佛又聞阿鞞跋致品中有退不退又復聞聲聞人皆當作佛是故今問為畢定為不畢定以此而言去之彌遠夫學出離非求語言應定觀道以正宗致三乘不分依何義說相與無相有如水火二性相違豈得共貫雖一切聖人以無為法三乘入空其行各異聲聞以壞緣觀觀生滅空緣覺以因緣觀觀法性空菩薩以無生觀觀畢竟空此則淄澠殊味涇渭分流非可以口勝非可以力爭欲及弱喪去斯何適值大寶而不取遇深經而不求亦何異窮子反走於宅中獨姥揜目於道上此廼惑行之常性迷途之恒心但好龍而觀畫愛象而翫跡荊山可為流慟法水所以大悲經譬兔馬論喻鹿犀俱以一象配成三獸用度河以測境因圍箭以驗智格得空之淺深量相心之厚薄懸鏡在前無待耳識離婁既睇豈勞相者若無不思誼之理豈有不思誼之事放瑞光於三千集寄蓮於十方變金色於大地嚴華臺於虛空表舌相之不虛證般若之真實所以龍樹道安童壽慧遠咸以大權應世或以殆庶救時莫不伏膺上法如說修行況於細人可離斯哉此經東漸二百五十有八歲始於魏甘露五年至自于闐叔蘭開源彌天導江鳩摩羅什澍以甘泉三譯五校可謂詳矣龍樹菩薩著大智論訓解斯經義旨周備此實如意之寶藏智慧之滄海但其文遠曠每怯近情朕以聽覽餘日集名僧二十人與天保寺法寵等詳其去取雲根寺慧令等兼以筆功採釋論以注經本略其多解取其要釋此外或捃關河舊義或依先達故語時復間出以相顯發若章門未開義勢深重則參懷同事廣其所見使質而不簡文而不繁庶令學者有過半之思講般若經者多說五時一往聽受似有條理重更研求多不相符唯仁王般若具書名部世既以為疑經今則置而不論僧叡小品序云斯經正文凡有四種是佛異時適化之說多有十萬偈少者六百偈略出四種而不列名釋論言般若部黨有多有少光讚放光道行止舉三名復不滿四此土別有一卷謂為金剛般若欲以配數可得為五既不具得經名復不悉時之前後若以臆斷易致譏嫌此非議要請俟多聞今注大品自有五段非彼所言五時般若勸說以不住標其始命說以無教通其道願說以無得顯其行信說以甚深美其法廣說以不盡要其終中品所以累教末章所以三屬義備後釋不復詳言設迺時曠正教處無法名猶且苦辛草澤經歷嶮遠翹心逿聽澍意希夷冀遲玄應想像空聲輕生以重半偈賣身以尊一言甘渫血而不疑欣出髓而無悋況復龍宮神珠寶臺金鍱難得之貨難聞之法遍布塔寺充刃目前豈可不伏心受持虛懷鑽仰使佛種相續菩提不斷知恩反復更無他道方以雪山疋以香城寧得同日語其優劣率書所得懼增來過明達後進幸依法行小品經序第四釋僧叡作般若波羅蜜經者窮理盡性之格言菩薩成佛之弘軌也軌不弘則不足以冥群異指其歸性不盡則物何以登道場成正覺正覺之所以成群異之所以一何莫由斯道也是以異教慇懃三撫以之頻發功德疊校九增以之屢至如問相標玄而玄其玄幻品忘寄而忘其忘道行坦其津難問窮其原隨喜忘趣以要終照明不化以即玄章雖三十貫之者道言雖十萬倍之者行行凝然後無生道足然後補處及此而變一切智也法華鏡本以凝照般若冥末以解懸解懸理趣菩薩道也凝照鏡本告其終也終而不泯則歸途扶疎有三實之跡權應不夷則亂緒紛綸有惑趣之異是以法華般若相待以期終方便實化冥一以俠盡論其窮理盡性夷明萬行則實不如照取其大明真化解本無三則照不如實是故歎深則般若之功重美實則法華之用微此經之尊三撫三囑未足惑也有秦太子者寓跡儲宮擬韻區外翫味斯經夢想增至准悟大品深知譯者之失會聞究摩羅法師神授其文真本猶存以弘始十年二月六日請令出之至四月三十日校正都訖考之舊譯真若荒田之稼芸過其半未詎多也斯經正文凡有四種是佛異時適化廣略之說也其多者云有十萬偈少者六百偈此之大品乃是天竺之中品也隨宜之言復何必計其多少議其煩簡耶胡文雅質按本譯之於麗巧不足樸正有餘矣幸冀文悟之賢略其華而幾其實也大小品對比要抄序第五支道林作夫般若波羅蜜者眾妙之淵府群智之玄宗神王之所由如來之照功其為經也至無空豁廓然無物者也無物於物故能齊於物無智於智故能運於智是故夷三脫於重玄齊萬物於空同明諸佛之始盡群靈之本無登十住之妙階趣無生之徑路何者耶賴其至無故能為用夫無也者豈能無哉無不能自無理亦不能為理理不能為理則理非理矣無不能自無則無非無矣是故妙階則非階無生則非生妙由乎不妙無生由乎生是以十住之稱興乎未足定號般若之智生乎教迹之名是故言之則名生設教則智存智存於物實無迹也名生於彼理無言也何則至理冥壑歸乎無名無名無始道之體也無可不可者聖之慎也苟慎理以應動則不得不寄言宜明所以寄宜暢所以言理冥則言廢忘覺則智全若存無以求寂希智以忘心智不足以盡無寂不足以冥神何則故有存於所存有無於所無存乎存者非其存也希乎無者非其無也何則徒知無之為無莫知所以無知存之為存莫知所以存希無以忘無故非無之所無寄存以忘存故非存之所存莫若無其所以無忘其所以存忘其所以存則無存於所存遺其所以無則忘無於所無忘無故妙存妙存故盡無盡無則忘玄忘玄故無心然後二迹無寄無有冥盡是以諸佛因般若之無始明萬物之自然眾生之喪道溺精神乎欲淵悟群俗以妙道漸積損至無設玄德以廣教守谷神以存虛齊眾首於玄同還群靈乎本無蓋聞出小品者道士也常遊外域歲數悠曩未見典載而不詳其姓名矣嘗聞先學共傳云佛去世後從大品之中抄出小品世傳其人唯目之以淳德驗之以事應明其至到而已亦莫測其由也夫至人也攬通群妙凝神玄冥虛靈響應感通無方建同德以接化設玄教以悟神述往迹以搜滯演成規以啟源或因變以求通事濟而化息適任以全分分足則教廢故理非乎變變非乎理教非乎體體非乎教故千變萬化莫非理外何神動哉以之不動故應變無窮無窮之變非聖在物物變非聖聖未始於變故教遺興乎變理滯生乎權接應存物理致同乎歸而辭數異乎本事備乎不同不同之功由之萬品神悟遲速莫不緣分分闇則功重言積而後悟質明則神朗觸理則玄暢輕之與重未始非分是以聖人之為教不以功重而廢分分易而存輕故群品所以悟分功所以成必須重以運通因其宜以接分此為悟者之功重非聖教之有煩今統所以約教功所以全必待統以適任約文以領玄領玄則易通因任則易從而物未悟二本之不異統致同乎宗便以言數為大小源流為精麁文約謂之小文殷謂之大慎常之為通因變之為㵲守數之為得領統之為失而彼揩文之徒羈見束教頂著阿鋡神匱分淺才不經宗儒墨大道域定聖人志記文句詰教難擁謂崇要為達諒領統為傷宗須徵驗以明實效應則疑伏是以至人順群情以徵理取驗乎沸油明小品之體本塞群疑幽滯因物之徵驗故示驗以應之今不可以趣徵於一驗目之為淳德效喪於事實謂之為常人而未達神化之權統玄應於將來暢濟功於殊塗運無方之一致而察殊軌為異統觀寄化為逆理位大寶為欣王聚濟貨為欲始徒知至聖之為教而莫知所以教是以聖人標域三才玄定萬品教非一塗應物萬方或損教違無寄通適會或抱一御有繫文明宗崇聖典為世軌則夫體道盡神者不可詰之以言教遊無蹈虛者不可求之於形器是以至人於物遂通而已明乎小大之不異暢玄標之有寄因順物宜不拘小介或以大品辭茂事廣喻引宏奧雖窮理有外終於玄同然其明宗統一會致不異斯亦大聖之時教百姓之分致苟以分致之不同亦何能求簡於聖哉若以簡不由聖豈不寄言於百姓夫以萬聲鍾響響一以持之萬物感聖聖亦寂以應之是以聲非乎響言非乎聖明矣且神以知來夫知來者莫非其神也機動則神朗神朗則逆鑒明夫來往常在鑒內是故至人鑒將來之希纂明才致之不並簡教迹以崇順擬群智之分向關之者易統知希之者易行而大品言數豐具辭領富溢問對衍奧而理統宏邃雖玄宗易究而詳事難備是以明夫為學之徒須尋迹旨關其所往究攬宗致標定興盡然後悟其所滯統其玄領或須練綜群問明其酬對探幽研賾盡其妙致或以教眾數溢諷績難究欲為寫崇供養力致無階諸如此例群仰分狹𨶳者絕希是故出小品者參引王統簡領群目筌域事數摽判由宗以為小品而辭喻清約運旨亹亹然其往往明宗而標其會致使宏統有所於理無損自非至精孰其明矣又察其津塗尋其妙會攬始源終研極奧旨領大品之王標備小品之玄致𦆝𦆝焉攬津乎玄味精矣盡矣無以加矣斯人也將神王於冥津群形於萬物量不可測矣宜求之於筌表寄之於玄外惟昔聞之曰夫大小品者出於本品本品之文有六十萬言今遊天竺未適於晉今此二抄亦興于大本出者不同也而小品出之在先然斯二經雖同出於本品而時往有不同者或小品之所具大品所不載大品之所備小品之所闕所以然者或以二者之事同互相以為賴明其本一故不並矣而小品至略玄總事要舉宗大品雖辭致婉巧而不喪本歸至於說者或以專句推事而不尋況旨或多以意裁不依經本故使文流相背義致同乖群儀偏供喪其玄旨或失其引統錯徵其事巧辭辯偽以為經體雖文藻清逸而理統乖宗是以先哲出經以胡為本小品雖抄以大為宗推胡可以明理徵大可以撿小若苟住胸懷之所得背聖教之本旨徙常於新聲苟競於異常異常未足以徵本新聲不可以經宗而遺異常之為談而莫知傷本之為至傷本則失統失統則理滯理滯則惑殆若以殆而不思其源困而不尋其本斯則外不關於師資內不由於分得豈非仰資於有知自塞於所尋困蒙於所滯自窮於所通進不闇常退不研新說不依本理不經宗而忽詠先舊毀呰古人非所以為學輔其自然者哉夫物之資生靡不有宗事之所由莫不有本宗之與本萬理之源矣本喪則理絕根朽則枝傾此自然之數也末紹不然矣於斯也徒有天然之才淵識邈世而未見大品攬其源流明其理統而欲寄懷小品率意造義欲寄其分得標顯目然希邈常流徒尚名賓而竭其才思玄格聖言趣悅群情而乖本違宗豈相望乎大品也哉如其不悟將恐遂其所惑以罔後生是故推考異同驗其虛實尋流窮源各有歸趣而小品引宗時有諸異或辭例事同而不乖旨歸或取其初要廢其後致或筌次事宗例其首尾或散在群品略撮玄要時有此事乖互不同又大品事數甚眾而辭曠浩衍本欲推求本宗明驗事旨而用思甚多勞審功又寡且稽驗廢事不覆速急是故余今所以例玄事以駢比標二品以相對明彼此之所在辯大小之有光雖理或非深奧而事對之不同故釆其所究精麁並兼研盡事迹使驗之有由故尋源以求實趣定於理宗是以考大品之宏致驗小品之總要搜玄沒之所存求同異之所寄有在尋之有軌爾乃也貫綜首尾推步玄領究其盤結辯其凝滯使文不違旨理無負宗棲驗有寄辯不失微且於希詠之徒浪神遊宗陶冶玄肆推尋源流關虛考實不亦夷易乎若其域乖體極對非理標或其所寄者願俟將來摩訶薩幸為研盡備其未詳也正法華經記第六出經後記太康七年八月十日燉煌月支菩薩沙門法護手執胡經口宣出正法華經二十七品授優婆塞聶承遠張仕明張仲政共筆受竺德成竺文盛嚴威伯續文承趙叔初張文龍陳長玄等共勸助歡喜九月二日訖天竺沙門竺力龜茲居士帛元信共參校元年二月六日重覆又元康元年長安孫伯虎以四月十五日寫素解正法華經後記第七未詳作者永熙元年八月二十八日比丘康那律於洛陽寫正法華品竟時與清戒界節優婆塞張季博董景玄劉長武長文等手執經本詣白馬容對與法護口校古訓講出深義以九月本齋十四日於東牛寺中施檀大會講誦此經竟日盡夜無不咸歡重已校定法華宗要序第八釋慧觀夫本際冥湛則神根凝一涉動離淳則精麁異陳於是心轡競策塵想諍馳翳有淺深則昏明殊鏡是以從初得佛暨于此經始應物開津故三乘別流別流非真則終期有會會必同源故其乘唯一唯一無上故謂之妙法頌曰是乘微妙清淨第一於諸世間最無有上夫妙不可明必擬之有像像之美者蓮華為上蓮華之秀分陀利為最妙萬法而為言故喻之分陀利其為經也明發矇不可以語極釋權應之所由御終不可以祕深則開實以顯宗權應既彰則扃心自廢宗致既顯則真悟自生故能令萬流合注三乘同往同往之三會而為一乘之始也覺慧成滿乘之盛也滅景澄神乘之終也雖以萬法為乘然統之有主舉其宗要則慧收其名故經以真慧為體妙一為稱是以釋迦玄音始發讚佛智甚深多寶稱善歎平等大慧頌曰為說佛慧故諸佛出世間唯此一事實餘二則非真然則佛慧乃一之正實乘之體成妙之至足華之開秀者也雖寄華宣微而道玄像表稱之曰妙而體絕精麁頌曰是法不可示言辭相寂滅二乘所以息慮補處所以絕塵唯佛與佛乃能究焉故恒沙如來感希聲以靈萃已逝之聖振餘靈而現證信佛法之奧區窮神之妙境其此經之謂乎此經之謂乎觀少習歸一之言長味會通之要然緬思愈勤而幽旨彌潛未嘗不面靈鷲以遐想臨辭句而增懷諒由枝說差其本謬文乖其正也有外國法師鳩摩羅什超爽俊邁奇悟天拔量與海深辯流玉散繼釋蹤以嗣軌秉神火以霜燭紐頹綱於將絕拯漂溺於已淪耀此慧燈來光斯境秦弘始八年夏於長安大寺集四方義學沙門二千餘人更出斯經與眾詳究什自手執胡經口譯秦語曲從方言而趣不乖本即文之益亦已過半雖復霄雲披翳陽景俱暉未足喻也什猶謂語現而理沈事近而旨遠又釋言表之隱以應探賾之求雖冥扉未開固已得其門矣夫上善等潤靈液尚均是以仰感囑累俯慨未同故採述旨要流布未聞庶法輪遐軫往所未往十方同悟究暢一乘故序之云爾法華經後序第九僧叡法師法華經者諸佛之祕藏眾經之實體也以華為名者照其本也稱分陀利者美其盛也所興既玄其旨甚婉自非達識傳之罕有得其門者夫百卉藥木之英物實之本也八萬四千法藏者道果之原也故以喻焉諸華之中蓮華最勝華而未敷名屈摩羅敷而將落名迦摩羅處中盛時名分陀利未敷喻二道將落譬泥洹榮曜獨足以喻斯典至如般若諸經深無不極故道者以之而歸大無不該故乘者以之而濟然其大略皆以適化為本應務之門不得不以善權為用權之為化悟物雖弘於實體不足皆屬法華固其宜矣尋其幽旨恢廓宏邃所該甚遠豈徒說實歸本畢定殊塗而已耶乃實大明覺理囊括古今云佛壽無量永劫未足以明其久也分身無數萬形不足以異其體也然則壽量定其非數分身明其無實普賢顯其無成多寶照其不滅夫邁玄古以期今則萬世同一日即百化以悟玄則千塗無異轍夫如是者則生生未足以期存永寂亦未可言其滅矣尋幽宗以絕往則喪功於本無控心轡於三昧則忘期於二地經流茲土雖復垂及百年譯者昧其虛津靈關莫之或啟談者乖其准格幽蹤罕得而履徒復搜研皓首並未有窺其門者秦司隷挍尉左將軍安城侯姚嵩擬韻玄門宅心世表注誠斯典信詣彌至每思尋其文深識譯者之失既遇究摩羅法師為之傳寫指其大歸真若披重霄而高蹈登崐崙而俯眄矣于時聽受領悟之僧八百餘人皆是諸方英秀一時之傑也是歲弘始八年歲次鶉火持心經記第十出經後記持心經太康七年三月十日燉煌開士竺法護在長安說出梵文授承遠思益經序第十一釋僧叡法師此經天竺正音名毘絁沙真諦是他方梵天殊特妙意菩薩之號也詳聽什公傳譯其名幡覆展轉意似未盡良由未備秦言名實之變故也察其語意會其名旨當是持意非思益也直以未喻持義遂用益耳其言益者超絕殊異妙拔之稱也思者進業高勝自強不息之名也舊名持心最得其實又其義旨舊名等御諸法梵天坦其津塗世尊照其所明普華獎其非心文殊泯以無生落落焉真可謂法輪再轉於閻浮法鼓重聲於宇內甘露流津於季末靈液沾潤於遐裔者矣而恭明前譯頗麗其辭迷其旨是使宏標乖於謬文至味醈於華艶雖復研尋彌稔而幽旨莫啟幸遇究摩羅什法師於關右既得更譯梵音正文言於竹帛又蒙披釋玄旨曉大歸於句下于時諮悟之僧二千餘人大齊法集之眾欣務難遭之慶近是講肆之來未有其比于時予與道恒謬當傳寫之任輒復疏其言記其事以貽後來之賢豈期必勝其辭必盡其意耶庶以所錄之言粗可髣髴其心耳不同時事之賢儻欲令見其高座所說之旨故具載之于文不自加其意也維摩詰經序第十二釋僧肇維摩詰不思議經者蓋是窮微盡化妙絕之稱也其旨淵玄非言像所測道越三空非二乘所議超群數之表絕有心之境眇莽無為而無不為罔知所以然而能然者不思議也何則夫聖智無知而萬品俱照法身無像而殊形並應至韻無言而玄籍彌布冥權無謀而動與事會故能統濟群方開物成務利現天下於我無為而惑者覩感照因謂之智觀應形則謂之身覿玄籍便謂之言見變動便謂之權夫道之極者豈可以形言權智而語其神域哉然群生長寢非言莫曉道不孤運弘之由人是以如來命文殊於異方召維摩於他土爰集毘耶共弘斯道此經所明統萬行則以權智為主樹德本則以六度為根濟朦惑則以慈悲為首語宗極則以不二為言凡此眾說皆不思議之本也至若借座燈王請飯香土手接大千室包乾像不思議之迹也然幽關難啟聖應不同非本無以垂迹非迹無以顯本本迹雖殊而不思議一也故命侍者標以為名焉大秦天王俊神超世玄心獨悟弘至治於萬機之上揚道化於千載之下每尋翫茲典以為栖神之宅而恨支竺所出理滯於文常懼玄宗墜於譯人北天之運運通有在也以弘始八年歲次鶉火命大將軍常山公左將軍安城侯與義學沙門千二百人於常安大寺請羅什法師重譯正本什以高世之量冥心真境既盡環中又善方言時手執胡文口自宣譯道俗虔虔一言三復陶冶精求務存聖意其文約而詣其旨婉而彰微遠之言於茲顯然余以闇短時豫聽次雖思乏參玄然麁得文意輒順所聞而為注解略記成言述而無作庶將來君子異世同聞焉合維摩詰經序第十三支敏度作蓋維摩詰經者先哲之格言弥道之宏標也其文微而婉厥旨幽而遠可謂唱高和寡故舉世罕攬然斯經梵本出自維耶離在昔漢興始流茲土于時有優婆塞支恭明逮及於晉有法護叔蘭此三賢者並博綜稽古研機極玄殊方異音兼通關解先後譯傳別為三經同本人殊出異或辭句出入先後不同或有無離合多少各異或方言訓古字乖趣同或其文胡越其趣亦乖或文義混雜在疑似之間若此之比其塗非一若其偏執一經則失兼通之功廣披其三則文煩難究余是以合兩令相附以明所出為本以蘭所出為子分章斷句使事類相從令尋之者瞻上視下讀彼案此足以釋乖迀之勞易則易知矣若能參考挍異極數通變則萬流同歸百慮一至庶可以闡大通於未寐闔同異於均致若其配不相儔儻失其類者俟後明哲君子刊之從正毘摩羅詰堤經義疏序第十四僧叡法師此經以毘摩詰所說為名者尊其人重其法也五百應真之所稱述一切菩薩之所嘆伏文殊師利對揚之所明答普現色身之要言皆其說也借座於燈王致飯於香積接大眾於右掌內妙樂於忍界阿難之所絕塵皆其不可思議也高挌邁于十地故彌勒屈之而虛己崇墉超於學境故文殊已還並未有𨶳其庭者法言恢廓指玄門以忘期觀品夷照總化本以冥想落落焉聲法鼓於維耶而十方世界無不悟其希音恢恢焉感諸佛於一室而恒沙正覺無不應其虛求予始發心啟曚於此諷詠研求以為喉衿稟玄指於先匠亦復未識其絕往之通塞也既蒙究摩羅法師正玄文摘幽指始悟前譯之傷本謬文之乖趣耳至如以不來相為辱來不見相為相見未緣法為始神緣合法為止心諸如此比無品不有無章不爾然後知邊情險詖難可以參契真言廁懷玄悟矣自慧風東扇法言流詠已來雖曰講肆格義迂而乖本六家偏而不即性空之宗以今驗之最得其實然鑪冶之功微恨不盡當是無法可尋非尋之不得也何以知之此土先出諸經於識神性空明言處少存神之文其處甚多中百二論文未及此又無通鑒誰與正之先匠所以輟章遐慨思決言於彌勒者良在此也自提婆已前天竺義學之僧並無來者於今始聞宏宗高唱敢豫悕味之流無不竭其聰而住其心然領受之用易存憶識之功難掌自非般若朗其聞慧總持銘其思府焉能使機過而不遺神會而不昧者哉故因紙墨以記其文外之言借眾聽以集其成事之說煩而不簡者遺其事也質而不麗者重其意也其指微而婉其辭博而晦自非筆受胡可勝哉是以即於講次疏以為記冀通方之賢不咎其煩而不要也自在王經後序第十五僧叡法師此經以菩薩名號為題者蓋是思益無盡意密迹諸經之流也以其圓用無方故名自在勢無與等故稱為王標准宏廓固非思之所及幽旨玄凝尋者莫之髣髴此土先出方等諸經皆是菩薩道行之式也般若指其靈標勇伏明其必制法華泯一眾流大哀旍其拯濟雖各有其美而未備此之所載秦大將軍尚書令常山公姚顯真懷簡到徹悟轉詣聞其名而悅之考其旨而靈衿思弘斯化廣其流津以為斯文既布便若菩薩常住不去此世奔誠發自大心欣躍不能自替遂請鳩摩羅法師譯而出之得此二卷於菩薩希蹤卓犖之事朗然照列矣是歲弘始九年歲次鶉首大涅槃經序第十六涼州釋道朗作大般涅槃者蓋是法身之玄堂正覺之實稱眾經之淵鏡萬流之宗極其為體也妙存有物之表周流無窮之內任運而動見機而赴任運而動則乘虛照以御物寄言蹄以通化見機而赴則應萬形而為像即群情而設教至乃形充十方而心不易慮教彌天下情不在己廁流塵蟻而弗下彌蓋群聖而不高功濟萬化而不恃明踰萬日而不居渾然與太虛同量泯然與法性為一夫法性以至極為體至極則歸于無變所以生滅不能遷其常生滅不能遷其常故其常不動非樂不能虧其樂故其樂無窮或我生於謬想非我起於因假因假存于名數故至我越名數而非無越名數而非無故能居自在之聖位而非我不能變非淨生於虛淨故真淨水鏡於萬法水鏡於萬法故非淨不能渝是以斯經觸章敘常樂我淨為宗義之林開究玄致為涅槃之原用能闡祕藏於未聞啟靈管以通照拯四重之𭼱疽拔無間之疣贅闡祕藏則群識之情暢審妙我之在己啟靈管則悟玄光之潛映神珠之在體然四重無間誹謗方等斯乃眾患之𤴲痟創疣之甚者故大涅槃以無創疣為義名斯經以大涅槃為宗目宗目舉則明統攝於眾妙言約而義備義名立則照三乘之優劣至極之有在然冥化無朕妙契無言任之冲境則理不虛運是以此經開誠言為教本廣眾喻以會義建護法以涉初覩祕藏以窮原暢千載之固滯散靈鷲之餘疑至於理微幽蟠微于微者則諸菩薩弘郢匠之功曠舟船之濟清難雲搆幡覆周密由使幽途融坦宗歸豁然是故誦其文而不疲語其義而不惓甘其味而無足飡其音而不厭始可謂微言興詠於真丹高韻初唱于赤縣梵音震響於聾俗真容巨曜於今日而寡聞之士偏執之流不量愚見敢評大聖無崖之典遂使是非興於諍論譏謗生于快心先覺不能返其迷眾聖莫能移其志方將沈蔽八邪之網長淪九流之淵不亦哀哉不亦哀哉天竺沙門曇摩讖者中天竺人婆羅門種天懷秀拔領鑒明邃機辯清勝內外兼綜將乘運流化先至燉煌停止數載大沮渠河西王者至德潛著建隆王業雖形處萬機每思弘大道為法城壍會開定西夏斯經與讖自遠而至自非至感先期孰有若茲之遇哉讖既達此以玄始十年歲次大梁十月二十三日河西王勸請令譯讖手執梵文口宣秦言其人神情既銳而為法殷重臨譯敬慎殆無遺隱搜研本正務存經旨唯恨胡本分離殘缺未備耳余以庸淺豫遭斯運夙夜感戢欣遇良深聊試標位敘其宗格豈謂必然𨶳其宏要者哉此經梵本正文三萬五千偈於此方言數減百萬言今數出者一萬餘偈如來去世後人不量愚淺抄略此經分作數分隨意增損雜以世語緣使違失本正如乳之投水下章言雖然猶勝餘經足滿千倍佛涅槃後初四十年此經於閻浮提宣通流布大明於世四十年後隱沒於地至正法欲滅餘八十年乃得行世雨大法雨自是以後尋復隱沒至于千載像教之末雖有此經人情薄淡無心敬信遂使群邪競辯曠塞玄路當知遺法將滅之相大涅槃經記第十七未詳作者此大涅槃經初十卷有五品其胡本是東方道人智猛從天竺將來暫憩高昌有天竺沙門曇無讖廣學博見道俗兼綜遊方觀化先在燉煌河西王宿植洪業素心冥契契應王公躬統士眾西定燉煌會遇其人神解悟識請迎詣州安止內苑遣使高昌取此胡本命讖譯出此經初分唯有五品次六品已後其本久在燉煌讖因出經下際知部黨不足尋訪慕餘殘有胡道人應期送到此經胡本都二萬五千偈後來胡本想亦近具足但頃來國家慇猥未暇更譯遂少停滯諸可流布者經中大意宗塗悉舉無所少也今現已有十三品作四十卷為經文句執筆者一承經師口所譯不加華飾其經初後所演佛性廣略之聞耳無相違也每自惟省雖復西垂深幸此遇遇此大典開解常滯非言所盡以諸家譯經之致大不允其旨歸疑謬後生是故竊不辭輒作徒勞之舉冀少有補益諮參經師採尋前後略舉初五品為私記餘致惟之悉可領也祐尋此序與朗法師序及懺法傳小小不同未詳孰正故復兩出六卷泥洹記第十八出經後記摩竭提國巴連弗邑阿育王塔天王精舍優婆塞伽羅先見晉土道人釋法顯遠遊此土為求法故深感其人即為寫此大般泥洹經如來祕藏願令此經流布晉土一切眾生悉成平等如來法身義熙十三年十月一日於謝司空石所立道場寺出此方等大般泥洹經至十四年正月二日挍定盡訖禪師佛大跋陀手執胡本寶雲傳譯于時坐有二百五十人二十卷泥洹記第十九出智猛遊外國傳智猛傳云毘耶離國有大小乘學不同帝利城次華氏邑有婆羅門氏族甚多其稟性敏悟歸心大乘博攬眾典無不通達家有銀塔縱廣八尺高三丈四龕銀像高三尺餘多有大乘經種種供養婆羅門問猛言從何來答言秦地來又問秦地有大乘學不即答皆大乘學其乃驚愕雅歎云希有將非菩薩往化耶智猛即就其家得泥洹胡本還於涼州出得二十卷
