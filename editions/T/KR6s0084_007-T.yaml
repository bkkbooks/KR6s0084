body:
  text: 釋僧祐撰道行經序第一釋道安作道行經後記第二未詳作者放光經記第三未詳作者合放光光讚略解第四道安法師須真天子經記第五未詳作者普曜經記第六未詳作者賢劫經記第七未詳作者般舟三昧經記第八未詳作者首楞嚴三昧經注序第九未詳作者合首楞嚴經記第十支敏度作首楞嚴經後記第十一未詳作者新出首楞嚴經序第十二弘充法師法句經序第十三未詳作者阿維越致遮經記第十四出經後記魔逆經記第十五出經後記慧印三昧及濟方等學二經序讚第十六王僧孺撰聖法印經記第十七出經後記文殊師利淨律經記第十八出經後記王子法益壞目因緣經序第十九佛念法師合微密持陀以尼總持三本第二十支恭明作道行經序第一釋道安作大哉智度萬聖資通咸宗以成也地含日照無法不周不恃不處累彼有名既外有名亦病無形兩忘玄漠塊然無主此智之紀也夫永壽莫美乎上乾而齊之殤子神偉莫美於陵虛而同之𠉌滯至德莫大乎真人而比之朽種高妙莫大乎世雄而喻之幻夢由此論之亮為眾聖宗矣何者執道御有卑高有差此有為之域耳非據真如遊法性冥然無名也據真如遊法性冥然無名者智度之奧室也名教遠想者智度之蘧廬也然存乎證者莫不契其無生而惶眩存乎迹者莫不忿其蕩冥而誕誹道動必反優劣致殊眩誹不其宜乎不其宜乎要斯法也與進度齊軫逍遙俱遊千行萬宜莫不以成眾行得字而智進令名諸法參相成者求之此列也且其經也進咨第一義以為語端追述權便以為談首行無細而不歷數無微而不極言似煩而各有宗義似重而各有主瑣見者慶其邇教而悅寤宏哲者望其遠標而絕息陟者彌高而不能階涉者彌深而不能測謀者慮不能規尋者度不能暨窈冥矣真可謂大業淵藪妙矣者哉然凡諭之者考文以徵其理者昏其趣者也察句以驗其義者迷其旨者也何則考文則異同每為辭尋句則觸類每為旨為辭則喪其平成之致為旨則忽其始擬之義矣若率初以要其終或忘文以全其質者則大智玄通居可知也從始發意逮一切智曲成決著八地無深謂之智也故曰遠離也三脫照空四非明有統鑑諸法因後成用藥病雙亡謂之觀也明此二行於三十萬言其如視諸掌乎顛沛造次無起無此也佛泥曰後外國高士抄九十章為道行品桓靈之世朔佛齎詣京師譯為漢文因本順旨轉音如已敬順聖言了不加飾也然經既抄撮合成章指音殊俗異譯人口傳自非三達胡能一一得本緣故乎由是道行頗有首尾隱者古賢論之往往有滯仕行恥此尋求其本到于闐乃得送詣倉垣出為放光品斥重省刪務令婉便若其悉文將過三倍善出無生論空特巧傳譯如是難為繼矣二家所出足令大智煥爾闡幽支讖全本其亦應然何者抄經刪削所害必多委本從聖乃佛之至戒也安不量未學庶幾斯心載詠載玩未墜于地撿其所出事本終始猶令析傷玷缺厭然無際假無放光何由解斯經乎永謝先哲所蒙多矣今集所見為解句下始況現首終隱現尾出經見異銓其得否舉本證抄敢增損也幸我同好飾其瑕謫也道行經後記第二未詳作者光和二年十月八日河南洛陽孟元士口授天竺菩薩竺朔佛時傳言者譯月支菩薩支讖時侍者南陽張少安南海子碧勸助者孫和周提立正光二年九月十五日洛陽城西菩薩寺中沙門佛大寫之放光經記第三二十卷者未詳作者惟昔大魏頴川朱士行以甘露五年出家學道為沙門出塞西至于闐國寫得正品梵書胡本九十章六十萬餘言以太康三年遣弟子弗如檀晉字法饒送經胡本至洛陽住三年復至許昌二年後至陳留界倉垣水南寺以元康元年五月十五日眾賢者皆集議晉書正寫時執胡本者于闐沙門無叉羅優婆塞竺叔蘭口傳祝太玄周玄明共筆受正書九十章凡二十萬七千六百二十一言時倉垣諸賢者等大小皆勸助供養至其年十二月二十四日寫都訖經義深奧又前後寫者參挍不能善悉至太安二年十一月十五日沙門竺法寂來至倉垣水北寺求經本寫時撿取現品五部并胡本與竺叔蘭更共考挍書寫永安元年四月二日訖於前後所寫挍最為差定其前所寫可更取挍晉胡音訓暢義難通諸開士大學文生書寫供養諷誦讀者願留三思恕其不逮也合放光光讚略解序第四釋道安作放光光讚同本異譯耳其本俱出于闐國持來其年相去無幾光讚于闐沙門祇多羅以泰康七年齎來護公以其年十一月二十五日出之放光分如檀以泰康三年于闐為師送至洛陽到元康元年五月乃得出耳先光讚來四年後光讚出九年也放光于闐沙門無叉羅執胡竺叔蘭為譯言少事約𭃒削復重事事顯炳煥然易觀也而從約必有所遺於天竺辭及騰每本蘭焉光讚護公執胡本聶承遠筆受言准天竺事不加飾悉則悉矣而辭質勝文也每至事首輒多不使諸反覆相明又不顯灼考其所出事事周密耳互相補益所悟實多恨其寢逸涼土九十一年幾至泯滅乃達此邦也斯經既殘不具並放光尋出大行華京息心居士翕然傳焉中山支和上遣人於倉垣斷絹寫之持還中山中山王及眾僧城南四十里幢幡迎經其行世如是是故光讚人無知者昔在趙魏迸得其第一品知有茲經而求之不得至此會慧常進行慧辯等持如天竺路經涼州寫而困焉展轉秦雍以晉泰元元年五月二十四日乃達襄陽尋之玩之欣有所益輒記其所長為略解如左般若波羅蜜者無上正真道之根也正者等也不二入也等道有三義焉法身也知也真際也故其為經也以如為始以法身為宗也如者爾也本末等爾無能令不爾也佛之興滅綿綿常存悠然無寄故曰如也法身者一也常淨也有無均淨未始有名故於戒則無戒無犯在定則無定無亂處智則無智無愚泯爾都忘二三盡息皎然不緇故曰淨也常道也真際者無所著也泊然不動湛爾玄齊無為也無不為也萬法有為而此法淵默故曰無所有者是法之真也由是其經萬行兩廢觸章輒無也何者癡則無往而非徼終日言盡物也故為八萬四千塵垢門也慧則無往而非妙終日言盡道也故為八萬四千度無極也所謂執大淨而萬行正正而不害妙乎大也凡論般若推諸病之疆服者理徹者也尋眾藥之封域者斷迹者也高談其徹迹者失其所以指南也其所以指南者若假號章之不住五通品之不貢高是其涉百辟而不失午者也宜精理其徹迹又思存其所指則始可與言智已矣何者諸五陰至薩云若則是菩薩來往所現法慧可道之道也諸一相無相則是菩薩來往所現真慧明乎常道也可道故後章或曰世俗或曰說己也常道則或曰無為或曰復說也此兩者同謂之智而不可相無也斯乃轉法輪之目要般若波羅蜜之常例也須真天子經記第五未詳作者須真天子經太始二年十一月八日於長安青門內白馬寺中天竺菩薩曇摩羅察口授出之時傳言者安文惠帛元信手受者聶承遠張玄泊孫休達十二月三十日未時訖普曜經記第六未詳作者普曜經永嘉二年太歲在戊辰五月本齋菩薩沙門法護在天水寺手執胡本口宣晉言時筆受者沙門康殊帛法巨出賢劫經記第七未詳作者賢劫經永康元年七月二十一日月支菩薩竺法護從罽賓沙門得是賢劫三昧手執口宣時竺法友從洛寄來筆者趙文龍使其功德福流十方普遂蒙恩離於罪蓋其是經者次見千佛稽受道化受菩薩決致無生忍至一切法十方亦爾般舟三昧經記第八未詳作者般舟三昧經光和二年十月八日天竺菩薩竺朔佛於洛陽出菩薩法護時傳言者月支菩薩支讖授與河南洛陽孟福字元士隨侍菩薩張蓮字少安筆受令後普著在建安十三年於佛寺中挍定悉具足後有寫者皆得南無佛又言建安三年歲在戊子八月八日於許昌寺挍定首楞嚴三昧經注序第九未詳作者首楞嚴三昧者晉曰勇猛伏定意也謂十住之人忘當而功顯不為而務成蓋勇伏之名生於希尚者耳雖功高天下豈係其名哉直以忘宗而稱立遺稱故名貴訓三千數典誥群生瞻之而弗及鑽之而莫喻自非奇致超玄胡可以應乎聖錄所謂勇猛者誠哉難階也定意者謂迹絕仁智有無兼忘雖復寂以應感惠澤倉生何甞不通以仁智照以玄宗所以寂者未可得而分也故其篇云悉遍諸國亦無所分而於法身不壞也謂雖從感若流身充宇宙豈有為之者哉謂化者以不化為宗作者以不作為主為主其自忘焉像可分哉若至理之可分斯非至極也可分則有虧斯成則有散所謂為法身者絕成虧遺合散靈鑒與玄風齊蹤員神與太陽俱暢其明不分萬類殊觀法身全濟非亦宜乎故曰不分無所壞也首楞嚴者冲風冠乎知喪洪緒在於忘言微旨盡於七位外迹顯乎三權洞重玄之極奧耀八特之化谷插高木之玄標建十准以伺能翫妙旨以調習既習釋而知玄遺慈故慈洽棄照而照弘也故有陶化育物紹以經綸自非領略玄宗深致奇趣豈云究之哉沙門支道林者道心冥乎上世神悟發於天然俊朗明澈玄映色空啟于往數位敘三乘余時復疇諮豫聞其一敢以不敏係于句末想望來賢助刪定焉安公經錄云中平二年十二月八日支讖所出其經首略如是我聞唯稱佛在王舍城靈鳥頂山中合首楞嚴經記第十胡文同晉音勇伏定意支慜度三經謝敷合注共四卷此經本有記云支讖所譯出讖月支人也漢桓靈之世來在中國其博學淵妙才思測微凡所出經類多深玄貴尚實中不存文飾今之小品阿闍貰屯真般舟悉讖所出也又有支越字恭明亦月支人也其父亦漢靈帝之世來獻中國越在漢生似不及見讖也又支亮字紀明資學於讖故越得受業於亮焉越才學深徹內外備通以季世尚文時好簡略故其出經頗從文麗然其屬辭析理文而不越約而義顯真可謂深入者也以漢末沸亂南度奔吳從黃武至建興中所出諸經凡數十卷自有別傳記錄亦云出此經今不見復有異本也然此首楞嚴自有小不同辭有豐約文有晉胡較而尋之要不足以為異人別出也恐是越嫌讖所譯者辭質多胡音異者刪而定之其所同者述而不改二家各有記錄耳此一本於諸本中辭最省便又少胡音偏行於世即越所定者也至大晉之初有沙門支法護白衣竺叔蘭並更譯此經求之於義互相發明披尋三部勞而難兼欲令學者即得其對今以越所定者為母護所出為子蘭所譯者繫之其所無者輒於其位記而別之或有文義皆同或有義同而文有小小增減不足重書者亦混以為同雖無益於大趣分部章句差見可耳勇伏定記曰元康元年四月九日燉煌菩薩支法護手執胡經口出首楞嚴三昧聶承遠筆受願令四輩攬綜奉宣觀異同意首楞嚴後記第十一未詳作者咸和三年歲在癸酉涼州刺史張天錫在州出此首楞嚴經于時有月支優婆塞支施崙手執胡本支博綜眾經於方等三昧特善其志業大乘學也出首楞嚴須賴上金光首如幻三昧時在涼州州內正聽堂湛露軒下集時譯者歸慈王世子帛延善晉胡音延博解群籍內外兼綜受者常侍西海趙潚會水令馬奕內侍來恭政此三人皆是俊德有心道德時在坐沙門釋慧常釋進行涼州自屬辭辭旨如本不加文飾飾近俗質近道文質兼唯聖有之耳新出首楞嚴經序第十二釋弘充作首楞嚴三昧者蓋神道之龍津聖德之淵府也妙物希微非器像所表幽玄冥湛豈情言所議冠九位以虛昇果萬行而圓就量種智以窮賢絕殆庶而靜統用能靈臺十地扃鐍法雲罔象環中神圖自外然心雖澄一應無不周定必凝泊在感斯至故明宗本則三達同寂論善救則六度彌綸辯威効則強魔慴縛語眾變則百億星繁至乃微號龍上晦跡塵光像告諸乘有盡無滅斯皆參定之冥功成能之顯事權濟之樞綱勇伏之宏要矣羅什法師弱齡言道思通法門昔紆步關右譯出此經自雲布以來競辰而衍中興啟運世道載昌宣轉之盛日月彌懋太宰江夏王該綜群籍討論淵敏每覽茲卷特深遠情充以管昧嘗廁玄肆預遭先匠啟訓音軌參聽儒緯髣髴文意以皇宋大明二年歲次奄茂於法言精舍略為注解庶勉不習之傳敢慕我聞之義如必紕繆以俟君子法句經序第十三未詳作者曇鉢偈者眾經之要義曇之言法鉢者句也而法句經別有數部有九百偈或七百偈及五百偈偈者結語猶詩頌也是佛見事而作非一時言各有本末布在眾經佛一切智厥性大仁愍傷天下出興于世開現道義所以解人凡十二部經總括其要別有四部阿鋡至去世後阿難所傳卷無大小皆稱聞如是處佛所究暢其說是後五部沙門各自鈔采經中四句六句之偈比次其義條別為品於十二部經靡不斟酌無所適名故曰法句夫諸經為法言法句者猶法言也近世葛氏傳七百偈偈義致深譯人出之頗使其渾漫惟佛難值其文難聞又諸佛興皆在天竺天竺言語與漢異音云其書為天書語為天語名物不同傳實不易唯昔藍調安侯世高都尉弗調譯胡為漢審得其體斯以難繼後之傳者雖不能密猶尚貴其實粗得大趣始者維祇難出自天竺以黃武三年來適武昌僕從受此五百偈本請其同道竺將炎為譯將炎雖善天竺語未備曉漢其所傳言或得胡語或以義出音近於質直僕初嫌其辭不雅維祇難曰佛言依其義不用飾取其法不以嚴其傳經者當令易曉勿失厥義是則為善座中咸曰老氏稱美言不信信言不美仲尼亦云書不盡言言不盡意明聖人意深邃無極今傳胡義實宜經達是以自竭受譯人口因循本旨不加文飾譯所不解則闕不傳故有脫失多不出者然此雖辭朴而旨深文約而義博事鉤眾經章有本故句有義說其在天竺始進業者不學法句謂之越敘此乃始進者之鴻漸深入者之奧藏也可以啟矇辯惑誘人自立學之功微而所苞者廣實可謂妙要者哉昔傳此時有所不出會將炎來更從諮問受此偈等重得十三品并挍往故有所增定第其品目合為一部三十九篇大凡偈七百五十二章庶有補益共廣聞焉阿維越遮致經記第十四晉言不退轉法輪經四卷出經後記太康五年十月十四日菩薩沙門法護於燉煌從龜茲副使美子侯得此梵書不退轉法輪經口敷晉言授沙門法乘使流布一切咸悉聞知魔逆經記第十五出經後記太康十年十二月二日月支菩薩法護手執梵書口宣晉言聶道真筆受於洛陽城西白馬寺中始出折顯元寫使功德流布一切蒙福度脫慧印三昧及濟方等學二經序讚第十六王僧孺撰夫六畫相因懸日月而無改二字一吐更天地而靡渝雖書不盡言言非書不闡言不盡意意非言不稱是以諦聽善思承茲利喜俯首屈足恭此受持若讀若誦已說今說一音一偈莫匪舟梁一讚一稱動成輪軌況夫五力方圓四攝無怠開方便門示真實相流方等之妙說得菩提之至因沐此寶池照茲法炬香雲靡靡慧露傍流出伽耶之妙城發娑羅之寶樹建安殿下含章基性育德成體憓聲溢於秋水義美光於冬日事高祖丘兔圃名出前意後蒼損己利人忘我濟物傍通兼善無礙無私若空谷之必應如洪鍾之虛受匡法弘道以善為樂重以植顯因於永劫襲妙果於茲生託意紹隆用心依止妙達空有深辯權實而玉體不安有虧凉暑行仁莫顯楚君日見其瘳施德靡言漢相方饗其樂桂葉龜腦固風寒之易銷茘葩鸞骨更騰飛之可孱況復慧身方漸善根宿樹無勞湔腸澣胃不待望色察聲有廣州南海郡民何規以歲次協洽月旅黃鍾天監之十四年十月二十三日採藥於豫章胡翼山幸非放子逐臣乃類尋仙招隱登峯十所里屑若有來將循曲陌先限清㵎或如止水乍有潔流方從揭厲且就褰攬未濟之間忽不自覺見㵎之西隅有一長者語規勿渡規於時即留其人面色正青徒跣捨屨年可八九十面已皺斂鬚長五六寸髭半於鬚耳過於眉眉皆下被眉之長毛長二三寸隨風相靡脣色甚赤語響而清手爪正黃指毛亦長二三寸著赭布帔下有赭布泥洹僧手捉書一卷遙投與規規即捧持望禮三拜語規可以此經與建安王兼言王之姓字此經若至宜作三七日病齋若不曉齋法可問下林寺副公副法師者戒行精苦恬憺無為遺嗜欲等豪賤蔬藿自充禪寂無怠此長者言畢便去行十餘步間忽不復覩規開卷敬視名為慧印三昧經經旨以至極法身無相為體理出百非義喻名相寂同法相妙等真如言其慧冥此理有若恒印心照凝寂故以三昧為名後又有濟諸方等學經此下又題云天竺薩和鞞曰僧迦與海虎王經旨以流通至教軌法有體所以誡示大土化物方法言若濟諸蒼民宜弘方等之教方等者大乘之通名究竟之弘旨其軸題云燉煌菩薩沙門支法護所出竺法首筆受共為一卷寫以流通軸用淳漆書甚緊潔點製可觀究尋義趣或微或顯稱在羅閱山箸陀隣尼行無來無去非住非止斯蓋鷲嶽鶴林之別記寶殿孤園之後述不殊玉撿靡異寶函理出希微辭深鉤致是惟正說曾匪異端雖王遵之得四十二章安清之出百六十品無以惑異大王沐浴持奉擎跪鑽習多寫廣述闡揚玄旨孰匪醫王即斯藥樹不待眠眴無勞苦口捨茲六術屏此十巫昔或授編書於圯上受揣術於谷裏乍有寓言且或假夢未有因應炳發若此其至焉受命下才式旍上道敢因滓賤率此顓蒙其辭曰雷音震響錄簡青編匪言曷教非迹靡傳是資妙象實寄幽筌照之慧燭濟以寶船懇哉至矣在應斯圓覆其靉靆浸此熙漣救焚拯溺去蓋銷纏灼灼應韓英英河楚松孤桂鬱鸞栖鵬舉照野光朝潤山枯渚濫源茲永覆匱已多欝為蕃幹擢此天柯寄誠梵表託好禪阿接足能仁心直妙覺用遺滯染是祛塵濁靡向非真何背非俗一忘受想將損味觸無德不詶有感必召吐彼神決示我玄要既蠲既已留華及少等以北恒均之東耀祐少尋經律竊闚諸部之奧但一切變易萬事遷訛所以古今同異觸類皆有故魚謬為魯陶誤成陰案晉末以來關中諸賢經錄云慧印三昧經支謙所出濟方等大乘學經法護所出聖法印經後記云晉元康四年菩薩沙門支法護於酒泉出此經弟子竺法首筆受而何規所得經本二經同卷題方等於法護亂三昧於支謙實由編寫成然非為誣濫而一往觀覽容生疑惑聊記所憶存之末塵故出別記聖法印經記第十七天竺名阿遮曇摩文圖出經後記元康四年十二月二十五日月支菩薩沙門曇法護於酒泉演出此經弟子竺法首筆受令此深法普流十方大乘常住文殊師利淨律經記第十八經後記云沙門曇法護於京師遇西國寂志從出此經經後尚有數品其人忘失輒宣現者轉之為晉更得其本補令具足太康十年四月八日白馬寺中聶道真對筆受勸助劉元謀傅公信侯彥長等王子法益壞目因緣經序第十九竺佛念造原夫善惡之運契猶形影之相顧受對明驗凡三差焉現世中世後世播九色之深恩以悅天妃之耳目孤禽投王而全命形受五兀之切酷斯現報也群徒潛淪於幽壑神陟淪漂而不改身酸歷世之殃舋不曉王子之喪目斯中報也阿蘭從禍於無相嬰佩永惑於始終為著翅之暴狸飛沈受困而難計斯後報也故聖人降靈必有所由非務不豫清白明矣玄鑒三世弱喪之流深記來世坏形之累趣承入百練之室自如來逝後阿育登位綱維閻浮光被六合圖形神寺八萬四千羅漢御世汜濟億數國主師宗玄化滂沛萬民仰戴而不已神祇欽賴而愈深然王子法益宿殖洪業生在王宮容貌殊特復受斯對靡知緣趣會秦尚書令輔國將軍宗正卿領城門挍尉使者司隷挍尉姚旻者南安郡人也親姚韶之次兄字景嶷文為儒表則烈勳於千載武為邈群則皎然而獨標凡音通實則辯機而曠遠執素縱情則翱翔而無倫德也純懿範也難摸赫逸翰於群才振龍威於昆鋒然愍永惑之叵救傷愚黨之不寤欲紹先勝之遺迹竪玄宗於末俗故請天竺沙門曇摩難提出斯緣本秦建初六年歲在辛卯於安定城二月十八日出至二十五日乃訖胡本三百四十三首盧也傳為漢文一萬八千言佛念譯音情義實難或離文而就義或正滯而傍通或取解於誦人或事略而曲備冀將來之學士令鑒罪福之不朽設有毫氂潤色者盡銘之於萌兆故序之焉合微密持經記第二十支恭明作合微密持陀以尼總持三本上本是地以尼下本是總持微密持也佛說無量門微密持經佛說阿難陀目佉尼阿離陀隣尼經一名成道降魔得一切智二本後皆有此名並不列出耳又別剡西臺曇斐記云此經凡有四本三本並各二名一本三名備如後列其中文句參差或胡或漢音殊或隨義制語各有左右依義順文皆可符同所為異處後列得法利三乘階級人數及動地雨華諸天伎樂供養多不悉備意所未詳一本一名無量門微密之持二名成道降魔得一切智此一本名行於世為常舊本一本一名阿難陀目佉尼呵離陀羅尼二名疾使人民得一切智一本一名無端底門總持之行二名菩薩降却諸魔堅固於一切智一本一名出生無量門持二名一生補處道行三名成道降魔得一切智此本備明法利及動地伎樂事四本皆各標前一名於經首第二第三名不以題經也後舍利弗請名佛說名皆備如前列
