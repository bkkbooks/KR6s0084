求那跋摩於京都譯出雜阿毘曇心十四卷宋元嘉十年於長干寺出寶雲傳譯其年九月訖摩得勒伽經十卷宋元嘉十二年乙亥歲正月於抹陵平樂寺譯出至九月二十二日訖分別業報略一卷大勇菩薩撰勸發諸王要偈一卷龍樹菩薩撰請聖僧浴文一卷闕右五部凡二十七卷宋文帝時天竺三藏法師僧伽跋摩於京都譯出觀普賢菩薩行法經一卷或云普賢觀經下注云出深功德經中虛空藏觀經一卷或云觀虛空藏菩薩經禪祕要三卷元嘉十八年譯出或云禪法要或五卷五門禪經要用法一卷右四部凡六卷宋文帝時罽賓禪師曇摩蜜多以元嘉中於祇洹寺譯出普耀經六卷四天王經一卷廣博嚴淨經四卷或云廣嚴淨不退輪轉經右三部十一卷宋文帝時沙門釋智嚴以元嘉四年共沙門寶雲譯出般泥洹經二十卷闕摩訶僧祇律一部胡本未譯出右二部定出一部凡二十卷宋文帝時沙門釋智猛遊西域還以元嘉中於西涼州譯出泥洹經一部至十四年齎還京都賢愚經十三卷宋元嘉二十二年出右一部凡十三卷宋文帝時涼州沙門釋曇學威德於于闐國得此經胡本於高昌郡譯出天安寺釋弘守傳新阿鋡經五十卷大法鼓經二卷東安寺譯出勝鬘經一卷丹陽郡譯出八吉祥經一卷元嘉二十九年正月十三日於荊州譯出楞伽阿跋多羅寶經四卷道場寺譯出央掘魔羅經四卷道場寺譯出過去現在因果經四卷相續解脫經二卷東安寺譯出第一義五相略一卷東安寺譯出釋六十二見經一卷闕泥洹經一卷似即一卷泥曰經闕無量壽經一卷闕無憂王經一卷闕右十三部凡七十三卷宋文帝時天竺摩訶乘法師求那跋陀羅以元嘉中及孝武時宣出諸經沙門釋寶雲及弟子菩提法勇傳譯觀彌勒菩薩生兜率天經一卷或云觀彌勒菩薩經或云觀彌勒經觀世音觀經一卷禪要祕密治病經二卷宋元孝建二年於竹園寺譯出佛母般泥洹經一卷孝建二年於鍾山定林上寺譯出一名大愛道般泥洹經右四部凡五卷宋孝武帝時偽河西王從弟沮渠安陽侯京都譯出前二觀先在高昌郡久已譯出於彼齎來京都念佛三昧經六卷宋大明六年譯出或云菩薩念佛三昧經破魔陀羅尼經一卷或云無量門破魔陀羅尼經大明六年譯出右二部凡七卷宋孝武時西域沙門功德直至荊州沙門釋玄請於禪房譯出十誦羯磨一卷或云略要羯磨法十誦律出右一部凡一卷宋景和中律師釋僧璩於京都撰出十誦比丘尼戒本一卷或云十誦比丘尼大戒十誦律羯磨雜事一卷右二部凡二卷宋明帝時律師釋法頴於京都撰出海意經七卷闕如來恩智不思議經五卷闕寶頂經五卷闕無盡意經十卷闕三密底耶經一卷漢言賢人用律闕右五部凡二十八卷宋明帝時天竺沙門竺法眷於廣州譯出並未至京都雜寶藏經十三卷闕付法藏因緣經六卷闕方便心論二卷闕右三部凡二十一卷宋明帝時西域三藏吉迦夜於北國以偽延興二年共僧正釋曇曜譯出劉孝標筆受此三經並未至京都無量義經一卷右一部凡一卷齊高帝時天竺沙門曇摩加他耶舍譯出五百本生經未詳卷數闕他毘利齊言宿德律未詳卷數闕右二部齊武皇帝時外國沙門大乘於廣州譯出未至京都善見毘婆沙律十八卷或云毘婆沙律齊永明七年出右一部凡十八卷齊武帝時沙門釋僧猗於廣州竹林寺請外國法師僧伽跋陀羅譯出觀世音懺悔除罪呪經一卷永明八年十二月十五日譯出妙法蓮華經提婆達多品第十二一卷右二部凡二卷齊武皇帝時先師獻正遊西域於于闐國得觀世音懺悔呪胡本還京都請瓦官禪房三藏法師法意共譯出自流沙以西妙法蓮華經竝有提婆達多品而中夏所傳闕此一品先師至高昌郡於彼獲本仍寫還京都今別為一卷百句譬喻經十卷齊永明十年九月十日譯出或五卷右一部凡十卷齊武帝時天竺沙門求那毘地於京都譯出毘跋律一卷右一部凡一卷齊帝時沙門釋法度出教戒比丘尼法一卷右一部凡一卷梁天監三年鍾山靈耀寺沙門釋僧盛依四分律撰大智論抄二十卷一名要論右一部凡二十卷晉帝世廬山沙門釋慧遠以論文繁積學者難省故略要抄出虛空藏經八卷右一部凡八卷宋武帝世河南國乞佛時沙門聖堅出十二因緣經一卷建武二年出須達長者經一卷建武二年出都合四百五十部凡一千八百六十七卷新集異出經錄第二異出經者謂胡本同而漢文異也梵書復隱宣譯多變出經之士才趣各殊辭有質文意或詳略故令本一末二新舊參差若國言訛轉則音字楚夏譯辭格礙則事義胡越豈西傳之𩥫駿乃東寫之乖謬耳是以泥洹楞嚴重出至七般若之經別本迺八傍及眾典往往如茲今竝條目列人以表同異其異出雜經失譯名者皆附失源之錄般若經支讖出般若道行品經十卷出古品遺日說般若一卷竺佛朔出道行經一卷道行者般若抄也朱士行出放光經二十卷一名舊小品竺法護更出小品經七卷衛士度抄摩訶般若波羅蜜道行經二卷曇摩蜱出摩訶鉢羅若波羅蜜經五卷一名長安品經鳩摩羅什出新大品二十四卷小品七卷右一經七人異出般泥洹經支讖出胡般泥洹經一卷支謙出大般泥洹經二卷竺法護出方等泥洹經二卷曇摩讖出大般涅槃經三十六卷釋法顯出大般泥洹經六卷方等泥洹經二卷釋智猛出泥洹經二十卷求那跋陀羅出泥洹經一卷右一經七人異出其支謙大般泥洹與方等泥洹大同曇摩讖涅槃與法顯泥洹大同其餘三部並闕未詳同異法華經舊錄有薩芸分陀利經云是異出法華未詳誰出今闕此經竺法護出正法華經十卷鳩摩羅什出新妙法蓮華經七卷右一經三人出其一經失譯人名已入失源錄首楞嚴經支讖首楞嚴二卷支謙首楞嚴二卷白延首楞嚴二卷竺法護更出勇伏