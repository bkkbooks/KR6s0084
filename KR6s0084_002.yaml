body:
  text: 釋僧祐撰法寶所被遠矣夫神理本寂感而後通緣應中夏始自漢代昔劉向校書已見佛經故知成帝之前法典久至矣逮孝明感夢張騫遠使西於月支寫經四十二章韜藏蘭臺帝王所印於是妙像麗於城闉金剎曜乎京洛慧教發揮震照區寓矣竊尋兩漢之季世構亂離西京蕩覆墳典皆散東都播遷載籍多亡子政所覩其文雖沒而顯宗所寫厥篇猶存東流初法於斯有徵祐檢閱三藏訪覈遺源古經現在莫先於四十二章傳譯所始靡踰張騫之使洎章和以降經出蓋闕良由梵文雖至緣運或殊有譯乃傳無譯則隱苟非其人道不虛行也邇及桓靈經來稍廣安清朔佛之儔支讖嚴調之屬飛譯轉梵萬里一契離文合義炳煥相接矣法輪屆心莫或條敘爰自安公始述名錄銓品譯才標列歲月妙典可徵實賴伊人敢以末學響附前規率其管見接為新錄兼廣訪別目括正異同追討支舉以備錄體發源有漢迄于大梁運歷六代歲漸五百梵文證經四百有十九部華戎傳譯八十有五人魚貫名第略為備矣或同是一經而先後異出新舊舛駁卷數參差皆別立章條使無疑亂至於律藏初啟則詳書本源審覈人代列于上錄若經存譯亡則編于下卷將使傳法之緣有孚聞道之心無惑敬貽來世庶在不墜焉新集撰出經律論錄第一新集條解異出經錄第二新集表序四部律錄第三新集經律論錄第一四十二章經一卷舊錄云孝明皇帝四十二章安法師所撰錄闕此經右一部凡一卷漢孝明帝夢見金人詔遣使者張騫羽林中郎將秦景到西域始於月支國遇沙門竺摩騰譯寫此經還洛陽藏在蘭臺石室第十四間中其經今傳於世安般守意經一卷安錄云小安般經陰持入經一卷百六十品經一卷舊錄云增一阿含百六十章大十二門經一卷小十二門經一卷大道地經二卷安公大道地經者修行經抄也外國所抄人本欲生經一卷道意發行經二卷阿毘曇五法經一卷舊錄云阿毘曇五法行經七法經一卷舊錄云阿毘曇七法行經或云七法行今闕此經五法經一卷十報經二卷舊錄云長阿含十報法普法義經一卷一名具法行具法行作舍利弗普法義作舍利曰餘並同義決律一卷或云義決律法行經安公云此上二經出長阿含今闕漏分布經一卷四諦經一卷安公云上二經出長阿含七處三觀經二卷九橫經一卷八正道經一卷安公云上三經出雜阿含雜經四十四篇二卷安公云出增一阿鋡既不標名未詳何經今闕五十校計經二卷或云明度五十校計經大安般經一卷思惟經一卷或思惟略要法十二因緣經一卷五陰喻經一卷舊錄云五陰譬喻經轉法輪經一卷或云法輪轉經流攝經一卷舊錄云一切流經或云一切流攝守經是法非法經一卷法受塵經一卷十四意經一卷舊錄云菩薩十四意經今闕本相猗致經一卷安公云出中阿含阿鋡口解一卷或云阿鋡口解十二因緣經或云斷十二因緣經舊錄云安侯口解凡有四名同一本阿毘曇九十八結經一卷今闕禪行法想經一卷難提迦羅越經一卷今闕右三十四部凡四十卷漢桓帝時安息國沙門安世高所譯出其四諦口解十四意九十八結安公云似世高撰也道行經一卷安公云道行品經者般若抄也外國高明者所撰安公為之序注右一部凡一卷漢桓帝時天竺沙門竺朔佛齎胡本至中夏到靈帝時於洛陽譯出般若道行品經十卷或云摩訶般若波羅經或八卷光和二年十月八日出首楞嚴經二卷中平二年十二月八日出今闕般舟般三昧經一卷舊錄云大般舟三昧經光和二年十月八日出伅真陀羅經二卷舊錄云屯真陀羅王經別錄所載安錄無今闕方等部古品曰遺日說般若經一卷今闕光明三昧經一卷出別錄安錄無阿闍世王經二卷安公云出長阿含舊錄阿闍貰經寶積經一卷安公云一名摩尼寶光和二年出舊錄云摩尼寶經二卷問署經一卷安公云出方等部或云文殊問菩薩署經胡般泥洹經一卷今闕兜沙經一卷阿閦佛國經一卷或云阿閦佛剎諸菩薩學成品經或云阿閦佛經孛本經二卷今闕內藏百品經一卷安公云出方等部舊錄云內藏百寶經遍校群錄並云內藏百寶無內藏百品故知即此經也右十三部凡二十七卷漢桓帝靈帝時月支國沙門支讖所譯出其古品以下至內藏百品凡九經安公云似支讖出也成具光明經一卷或云成具光明三昧經或云成具光明定意經右一部凡一卷漢靈帝時支曜譯出法鏡經一卷安公云出方等經十慧一卷或云沙彌十慧右二部凡二卷漢靈帝時沙門嚴佛調都尉安玄共譯出十慧是佛調所撰中本起經二卷或云太子中本起經右一部凡二卷漢獻帝建安中康孟詳譯出法句經二卷右一部凡二卷魏文帝時天竺沙門維祇難以吳主孫權黃武三年齎胡本武昌竺將炎共支謙譯出維摩詰經二卷闕大般泥洹經二卷安公云出長阿含祐案今長阿含與此異瑞應本起經二卷小阿差末經二卷闕慧印經一卷或云慧印三昧經或云實用慧印三昧經本業經一卷或云菩薩本業經法句經二卷須賴經一卷或云須賴菩薩經梵摩渝經一卷私阿末經一卷或作私呵昧案此經即是菩薩道樹經微密持經一卷或云無量門微密持經阿彌陀經二卷內題云阿彌陀三耶三佛薩樓檀過度人道經月明童子經一卷一名月明童男子一名月明菩薩三昧經義足經二卷阿難四事經一卷差摩竭經一卷優多羅母經一卷闕七女經一卷安公云出阿毘曇八師經一卷釋摩男經一卷安錄云出中阿含孛抄經一卷今孛經一卷即是明度經四卷或云大明度無極經老女人經一卷安公云出阿毘曇齋經一卷闕四願經一卷悔過經一卷或云序十方禮悔過文賢者德經一卷佛從上所行三十偈一卷闕了本生死經一卷安公云出生經祐案五卷生經無此名惟明二十偈一卷首楞嚴經二卷別錄所載安錄無今闕龍施女經一卷別錄所載安錄無法鏡經二卷出別錄安錄無鹿子經一卷別錄所載安錄無十二門大方等經一卷別錄所載安錄無今闕賴吒和羅經一卷別錄所載安錄無或云羅漢賴吒和羅經右三十六部四十八卷魏文帝時支謙以吳主孫權黃武初至孫亮建興中所譯出六度集經九卷或云六度無極經或云度無極集或云雜無極經吳品五卷凡有十品今闕右二部凡十四卷魏明帝時天竺沙門康僧會以吳主孫權孫亮世所譯出首楞嚴經二卷闕須賴經一卷闕除災患經一卷闕右三部凡四卷魏高貴公時白延所譯出別錄所載安公錄先無其名放光經二十卷晉元康元年五月十五日出有九十品一名舊小品闕右一部凡二十卷魏高貴公時沙門朱士行以甘露五年到于闐國寫得此經正品梵書胡本十九章到晉武帝元康初於陳留倉恒水南寺譯出光讚經十卷十七品太康七年十一月二十五日出賢劫經七卷舊錄云賢劫三昧經或云賢劫定意經元康元年七月二十一日出正法華經十卷二十七品舊錄云正法華經或云方等正法華經太康七年八月十日出普耀經八卷三十品安公云方等部永嘉二年五月出大哀經七卷二十八品舊錄云如來大哀經元康元年七月七日出度世品經六卷或云度世或為五卷元康元年四月十三日出密迹經五卷或云密迹金剛力士經或七卷太康九年十月八日出持心經六卷十七品一名等御諸法一名莊嚴佛法舊錄云持心梵天經或云持心梵天所問經太康七年三月十日出修行經七卷二十七品舊錄云修行道地經太康五年二月二十三日出漸備一切智經十卷或五卷元康七年十一月二十一日出生經五卷或四卷海龍王經四卷或三卷太康六年七月十日出普超經四卷一名阿闍世王品安錄亦云更出阿闍世王經或為三卷舊錄云文殊普超三昧經太康七年十二月二十七日出維摩鞊經一卷一本云維摩鞊名解阿惟越致遮經四卷太康五年十月十四日出嚴淨佛土經二卷舊錄云文殊師利嚴淨經或云文殊佛土嚴淨經阿耨達經二卷一名弘道廣顯三昧經舊錄云阿耨達龍王經或云阿耨達請佛經首楞嚴經二卷異出首稱阿難言無量壽經二卷一名無量清淨平等覺經寶藏經二卷舊錄云文殊師利寶藏經或云文殊師利現寶藏太始六年十月出寶結經二卷一名菩薩淨行經舊錄云寶結菩薩經或云寶結菩薩所問經永熙元年七月十四日出要集經二卷或云諸佛要集經天竺曰佛陀僧祇提佛昇忉利天品經二卷等集眾德三昧經三卷舊錄云等集眾德經或云等集無盡意經四卷離垢施女經一卷大康十年十二月二日出郁迦長者經一卷或云郁迦羅越問菩薩行經即大郁迦經或為二卷大淨法門經一卷建始元年三月二十六日出須真天子經二卷泰始二年十一月出幻士仁賢經一卷或云仁賢幻上經魔逆經一卷太康十年十二月二日出濟諸方等經一卷或云濟諸方等學經德光太子經一卷或云賴吒和羅所問光德太子經太始六年九月三十日出文殊師利淨律經一卷一本云淨律經太康十年四月八日出決總持經一卷寶女經四卷舊錄云寶女三昧經或云寶女問慧經太康八年四月二十七日出如來興顯經四卷一本云興顯如幻經元康元年十二月二十五日出般舟三昧經二卷安公錄云更出般舟三昧經首意女經一卷或云梵女首意經十二因緣經一卷月明童子經一卷一名月光童子經五十緣身行經一卷舊錄云菩薩緣身五十事經或云菩薩行五十緣身經六十二見經一卷或云梵網六十二見經四自侵經一卷安公云出阿毘曇須摩經一卷舊錄云須摩提經或云須摩提菩薩經隨權女經二卷出別錄安錄無方等泥洹經二卷或云大般泥洹經太始五年七月二十三日出大善權經二卷或云慧上菩薩問大善權經或云慧上菩薩經或云善權方便經或云善權方便所度無極經太康六年六月十七日出無言童子經一卷或云無言菩薩經溫室經一卷舊錄云溫室洗浴眾僧經頂王經一卷一名維鞊子問經安公云出方等部或云大方等頂王經聖法印經一卷天竺名阿遮曇摩又圖安公云出雜阿含移山經一卷舊錄云力士移山經文殊師利五體悔過經一卷舊錄云文殊師利悔過持人菩薩經三卷滅十方冥經一卷元熙元年八月十四日出無思議孩童經一卷舊錄云孩童經或云無思議光孩童菩薩經或云無思議光經迦葉集結經一卷舊錄云迦葉結經彌勒成佛經一卷與羅什所出異本舍利弗目連遊諸國經一卷或云舍利弗摩目揵連遊諸四衢經琉璃王經一卷奈女耆域經一卷或云奈女經寶施女經一卷寶罔童子經一卷舊錄云寶罔經順權方便經二卷一本云惟權方便經舊錄云順權女經一名轉女身菩薩經五百弟子本起經一卷舊錄云五百弟子自說本末經或云佛五百弟子自說本起經佛為菩薩五夢經一卷舊錄云佛五夢或云太子五夢普門經一卷一本云普門品太康八年正月十一日出如幻三昧經二卷舊錄云三卷彌勒本願經一卷或云彌勒菩薩所問本願經舍利弗悔過經一卷胞胎經一卷舊錄云胞胎受身經十地經一卷或云菩薩十地經摩目揵連本經一卷太子慕魄經一卷四不可得經一卷菩薩悔過經一卷或云菩薩悔過法下注云出龍樹十住論當來變經一卷乳光經一卷心明女梵志婦飯汁施經一卷或云心明經大六向拜經一卷舊錄云六向拜經或云威華長者六向拜經鴦掘摩經一卷或云指鬘經或云指髻經菩薩十住經一卷摩調王經一卷出六度集象出經一卷一名無所希望經照明三昧經一卷所欲致患經一卷法沒盡經一卷或云空寂菩薩所問經菩薩齋法一卷一名菩薩正齋經一名持齋經獨證自誓三昧經一卷或