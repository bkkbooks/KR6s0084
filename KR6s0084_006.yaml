body:
  text: 釋僧祐撰四十二章經序第一未詳作者安般守意經序第二僧會法師安般注序第三道安法師安般守意經序第四謝敷作陰持入經序第五道安法師人本欲生經序第六道安法師了本生死經序第七道安法師十二門經序第八道安法師大十二門經序第九道安法師法鏡經序第十僧會法師四十二章經序第一未詳作者昔漢孝明皇帝夜夢見神人身體有金色項有日光飛在殿前意中欣然甚悅之明日問群臣此為何神也有通人傅毅曰臣聞天竺有得道者號曰佛輕舉能飛殆將其神也於是上悟即遣使者張騫羽林中郎將秦景博士弟子王遵等十二人至大月支國寫取佛經四十二章在十四石函中登起立塔寺於是道法流布處處修立佛寺遠人伏化願為臣妾者不可稱數國內清寧含識之類蒙恩受賴于今不絶也安般守意經序第二康僧會夫安般者諸佛之大乘以濟衆生之漂流也其事有六以治六情情有內外眼耳鼻口身心謂之內矣色聲香味細滑邪念謂之外也經曰諸海十二事謂內外六情之受邪行猶海受流餓夫夢飯蓋無滿足也心之溢蕩無微不浹恍惚髣佛出入無間視之無形聽之無聲逆之無前尋之無後深微細妙形無絲髮梵聲仙聖所不能照明默種于此化生乎彼非凡所覩謂之陰也猶以晦曀種夫粢芥闓手覆種孳有萬億旁人不覩其形種家不知其數也一朽乎下萬生乎上彈指之間心九百六十轉一日一夕十三億意意有一身心不自知猶彼種夫也是以行寂繫意著息數一至十十數不誤意定在之小定三日大定七日寂無他念泊然若死謂之一禪禪棄也棄十三億穢念之意已獲數定轉念著隨蠲除其八正有二意意定在隨由在數矣垢濁消滅心稍清淨謂之二禪也又除其一注意鼻頭謂之止也得止之行三毒四走五陰六冥諸穢滅矣昭然心明踰明月珠淫邪汙心猶鏡處泥穢垢汙焉偃以照天覆以臨土聰睿聖達萬土臨照雖有天地之大靡一大而能覩所以然者由其垢濁衆垢汙心有踰彼鏡矣若得良師剗刮瑩磨薄塵微曀蕩使無餘舉之以照毛髮面理無微不察垢退明存使其然矣情溢意散念萬不識一矣猶若於市馳心放聽廣採衆音退宴存思不識一夫之言心逸意散濁翳其聰也若自間處心思寂寞志無邪欲側耳靖聽萬句不失片言斯著心靖意清之所由也行寂止意懸之鼻頭謂之三禪也還觀其身自頭至足反覆微察內體汙露森楚毛竪猶覩膿涕於斯具照天地人物其盛若衰無存不亡信佛三寶衆冥皆明謂之四禪也攝心還念諸陰皆滅謂之還也穢欲寂盡其心無想謂之淨也得安般行者厥心即明舉眼所觀無幽不覩往無數劫方來之事人物所更現在諸剎其中所有世尊法化弟子誦習無遐不見無聲不聞恍惚髣佛存亡自由大彌八極細貫毛氂制天地住壽命猛神德壞天兵動三千移諸剎八不思議非梵所測神德無限六行之由也世尊初欲説斯經時大千震動人天易色三日安般無能質者於是世尊化為兩身一曰何等一尊主演于斯義出矣大士上人六雙十二輩靡不執行有菩薩者安清字世高安息王嫡后之子讓國與叔馳避本土翔而後進遂處京師其為人也博學多識貫綜神模七正盈縮風氣吉凶山崩地動針脈諸術覩色知病鳥獸鳴啼無音不照懷二儀之弘仁愍黎庶之頑暗先挑其耳却啓其目欲之視聽明也徐乃陳演正真之六度譯安般之祕奧學者塵興靡不去穢濁之操就清白之德者也余生末蹤始能負薪考妣殂落三師凋喪仰瞻雲日悲無質受眷言顧之澘然出涕宿祚未沒會見南陽韓林頴川皮業會稽陳慧此三賢者信道篤密執德弘正蒸蒸進進志道不倦余之從請問規同矩合義無乖異陳慧注義余助斟酌非師不傳不敢自由也言多鄙拙不究佛意明哲衆賢願共臨察義有疣腨加聖刪定共顯神融矣安般注序第三釋道安安般者出入也道之所寄無往不因德之所寓無往不託是故安般寄息以成守四禪寓骸以成定也寄息故有六階之差寓骸故有四級之別階差者損之又損之以至於無為級別者忘之又忘之以至於無欲也無為故無形而不因無欲故無事而不適無形而不因故能開物無事而不適故能成務成務者即萬有而自彼開物者使天下兼忘我也彼我雙廢者守于唯守也故修行經以斯二法而成寂得斯寂者舉足而大千震揮手而日月捫疾吹而鐵圍飛微噓而須彌舞斯皆乘四禪之妙止御六息之大辨者也夫執寂以御有策本以動末有何難也安般居十念之一於五根則念根也故撰法句者屬惟念品也昔漢氏之末有安世高者博聞稽古特專阿毗曇學其所出經禪數最悉此經其所譯也茲乃趣道之要徑何莫由斯道也魏初康會為之注義義或隱而未顯者安竊不自量敢因前人為解其下庶欲蚊翮以助隨藍霧潤以增巨壑也安般守意經序第四謝敷作夫意也者衆苦之萠基背正之元本荒迷放蕩浪逸無崖若狂夫之無所麗愛惡充心耽昏無節若夷狄之無君微矣哉即之無像尋之無朕則毫末不足以喻其細迅矣哉僨蹻惚恍眴匝宇宙則奔電不足以比其速是以彈指之間九百六十轉一日一夕十三億想念必嚮報成生死栽一身所種滋蔓彌劫凡在三界倒見之徒溺喪淵流莫能自反正覺慈愍開示慧路防其終凶之原漸塞其忿欲之微兆為啓安般之要徑泯生滅以冥寂申道品以養恬建十慧以入微縶九神之逸足防七識之洪流故曰守意也若乃制伏麁垢弗剗漏結者亦有望見貿樂之士閉色聲於視聽遏塵想以禪寂乘靜泊之禎祥納色天之嘉祚然正志荒於華樂昔習沒於交逸福田矜執而日零毒根迭興而罪襲是以輪回五趣億劫難拔嬰羅欲罔有劇深牢由於無慧樂定不惟道門使其然也至於乘慧入禪亦有三輩或畏苦滅色樂宿泥洹志存自濟不務兼利者為無著乘或仰希妙相仍有遣無不建大悲練盡緣縛者則號緣覺菩薩者深達有本暢因緣無達本者有有自空暢無者因緣常寂自空故不出有以入無常寂故不盡緣以歸空住理而有非所緣非緣故無無所脫苟厝心領要觸有悟理者則不假外以靜內不因禪而成慧故曰阿惟越致不隨四禪也若欲塵翳心慧不常立者乃假以安般息其馳想猶農夫之淨地明鏡之瑩剗矣然即藝耨不以為地地淨而種滋瑩剗非以為鏡鏡淨而照明故開士行禪非為守寂在遊心於玄冥矣肇自發心悲盟弘普秉權積德忘期安衆衆雖濟而莫脫將廢知而去筌矣是謂菩薩不滅想取證也此三乘雖同假禪靜至於建志厥初各有攸歸故學者宜恢心宏摸殖栽於始也漢之季世有捨家開士安清字世高安息國王之太子也審榮辱之浮寄齊死生乎一貫遂脫篩於萬乘抱玄德而遊化演道教以發矇表神變以諒之于時俊乂歸宗釋華崇實者若禽狩之從麟鳳鱗介之赴虬蔡矣又博綜殊俗善衆國音傳授斯經變為晉文其所譯出百餘萬言探暢幽賾淵玄難測此安般典其文雖約義關衆經自淺至精衆行具舉學之先要孰踰者乎行者欲凝神反朴道濟無外而不循斯法者何異刖夫之陟太山無翅而圖升虛乎釋迦如來妙慧足於曩劫歷無數以潛化至于衆生運會圓滿告成而猶現行六年以為教端者誠以鎮一紛耶莫尚茲也由是而觀可不務歟敷染習沈冥積罪歷劫生與佛乖弗覩神化雖以微祚得稟遺典而情想繁蕪道根未固仰欣聖軌未一暫履夕惕戰懼惄焉如懤是以誠心諷誦以鍾識習每遭明睿輒咨凝滯然冥宗已遠義訓小殊乃採集英彥戢而載焉雖粗聞大要未悟者衆於是復率愚思推撿諸數尋求明證遂相繼續撰為注義并抄撮大安般修行諸經事相應者引而合之或以隱顯相從差簡搜尋之煩經道弘深既非愚淺所能裁衷又辭意鄙拙萬不暢一祇增理穢敢云足以闡融妙旨乎實欲私記所識以備遺忘而已耳儻有覽者願亮不逮正其愚謬焉陰持入經序第五釋道安陰持入者世之深病也馳騁人心變德成狂耳聾口爽耽醉榮寵抱癡投冥酸號三趣其為病也猶癩疾焉入骨徹髓良醫拱手猶癲蹶焉來則冥然莫有所識大聖悼茲痛心內發忘身安赴荼炭含厚德忍舞擊觀羅密於重雲止罝網于八極洪癡不得振其翼名愛不得逞其足採善心於毫芒拔凶頑於虎口以大寂為至樂五音不能聾其耳矣以無為為滋味五味不能爽其口矣曜形濁世拯擢難計陟降教終潛淪無名諸無著等尋各騰逝大弟子衆深懼妙法混然廢沒於是令迦葉集結阿難所傳凡三藏焉該羅幽廓難度難測也世雄授藥必因本病病不能均是故衆經相待乃備非彥非聖罔能綜練自茲以後神通高士各為訓釋或覽撰諸經以為行式譬瓔璣歟擇彼珠珍以色相發佩之冠之為光為飾喻繪事歟調別衆采以圖暉烈諸明睿者所撰亦然此經則是其數也有捨家開士出自安息字世高大慈流洽播化斯土譯梵為晉微顯闡幽其所敷宣專務禪觀醇玄道數深矣遠矣是經其所出也陰入之弊人莫知苦是故先聖照以止觀陰結日損成泥洹品自非知機其孰能與於此乎從首至于九絶都是四十五藥也以慧斷知入三部者成四諦也十二因緣訖淨法部者成四信也其為行也唯神矣故不言而成唯妙矣故不行而至統斯行者則明白四達立根得眼成十力子紹胄法王奮澤大千若取證則拔三結住壽成道徑至應真此乃大乘之舟擑泥洹之關路于斯晉土禪觀弛廢學徒雖興蔑有盡漏何者禪思守玄練微入寂在取何道猶覘于掌墮替斯要而悕見證不亦難乎安未近積罪生逢百羅戎狄孔棘世之聖導潛遁晉山孤居離衆幽處窮壑竊覽篇目淺識獨見滯而不達夙宵抱疑咨諏靡質會太陽比丘竺法濟并州道人支曇講陟岨冒寇重爾遠集此二學士高朗博通誨而不倦者也遂與折槃暢礙造茲注解世不值佛又處邊國音殊俗異規矩不同又以愚量聖難以逮也冀未踐緒者少有微補非敢自必析究經旨人本欲生經序第六釋道安人本欲生經者照乎十二因緣而成四諦也本者癡也欲者愛也生者生死也略舉十二之三以為目也人在生死莫不浪滯於三世飄縈於九止綢繆八縛者也十二因緣於九止則第一人亦天也四諦所鑒鑒乎九止八解所正正乎八邪邪正則無往而不恬止鑒則無往而不愈無往而不愈故能洞照傍通無往而不恬故能神變應會神變應會則不疾而速洞照傍通則不言而化不言而化故無棄人不疾而速故無遺物物之不遺人之不棄斯禪智之由也故經曰道從禪智得近泥洹豈虛也哉誠近歸之要也斯經似安世高譯為晉言也言古文悉義妙理婉覩其幽堂之美闕庭之富或寡矣安每覽其文欲疲不能所樂而現者三觀之妙也所思而存者想滅之辭也敢以餘暇為之撮注其義同而文別者無所加訓焉了本生死經序第七釋道安夫四信妙輿者衆祐之寶軒也以運連縛倒見衆生凡在三界罔弗冠癡佩行嬰舞生死而趨陰堂揖讓色味驂惑載疑驅馳九止者也既則狎賢侮聖縱其姦慝貪劍恚鏚梟截玄路群誹上要殃禍備嘗矣世雄顧愍深圖變謀法旍曜於重霓道鼓振於雷吼寂千障乎八紘慧戈陷乎三有於是碎癡冠決嬰佩升信車入諦軌則因緣息成四喜矣故曰了本生死也了猶解也本則癡也元也如來指舉一隅身子伸敷高旨引興幽讚美矣盛矣夫計身有命則隨緣縛謗佛毀信若彌綸於幽室矣夫解空無命則成四諦昭然立信若日殿之麗乾矣斯乃五十六藥之崇基淵乎蓋衆行之宗也開微成務孰先者乎佛始得道隆建大哀此經則十六之一也其在天竺三藏聖師莫不以為教首而研幾也漢之季世此經始降茲土雅邃奧邈少達其歸者也魏代之初有高士河南支恭明為作注解探玄暢滯真可謂入室者矣俊哲先人足以析中也然童曚之倫猶有未悟故仍前迹附釋未訓非苟穿鑿以紫亂朱也儻孤居始進者可以辨惑焉十二門經序第八釋道安十二門者要定之目號六雙之關徑也定有三義焉禪也等也空也用療三毒綢繆重病嬰斯幽厄其日深矣貪囹恚圄癡城至固世人遊此猶春登臺甘處欣欣如居華殿嬉樂自娛蔑知為苦嘗酸速禍困憊五道夫唯正覺乃識其謬耳哀倒見之苦傷蓬流之痛為設方便防萌塞漸闢茲慧定令自浣滌挫鋭解紛返神玄路苟非至德其道不凝也夫邪僻之心必有微著是故禪法以四為差焉貪淫囹者荒色悖蒸不別尊卑渾心耽愐習以成狂亡國傾身莫不由之虛迷空醉不知為幻故以死尸散落自悟漸斷微想以至于寂味乎無味故曰四禪也瞋恚圄者爭纖介之虛聲結歷世之重咎恩親絶於快心交友腐於縱忿含怒徹髓不悛滅族聖人見強梁者不得其死故訓之以等丹心讎親至柔其志受垢含苦治之未亂醇德邃厚呪不措角況人害乎故曰四等也愚癡城者誹古聖謗真諦慢二親輕師傅斯病尤重矣以慧探本知從癡愛分別末流了之為惑練心攘慝狂病瘳矣故曰四空也行者挹禪海之深醴溉昏迷之盛火激空淨之淵流蕩癡塵之穢垢則皎然成大素矣行斯三者則知所以宰身也所以宰身者則知所以安神也所以安神者則知所以度人也然則經無巨細出自佛口神心所制言為世寶慧日既沒三界喪目經藏雖存淵言難測自非至精孰達其微於是諸開士應真各為訓解釋其幽賾辨其差貫則爛然易見矣窮神知化何復加乎從十二門已後則是訓傳也凡學者行十二門却盡神足滅外止麁謂成五道也三向諸根進消內結謂盡諸漏也始入盡漏名不退轉諸佛嘉歎記其成號深不可測獨見曉焉神不可量獨能精焉陵雲輕舉淨光燭幽移海飛嶽風出電入淺者如是況成佛乎是乃三乘之大路何莫由斯定也自始發迹逮于無漏靡不周而復始習茲定也行者欲崇德廣業而不進斯法者其猶無柯而求伐不飯而徇飽難以獲矣醒寤之士得聞要定不亦妙乎安宿不敏生值佛後又處異國楷範多闕仰希古烈滯而未究寤寐憂悸有若疾首每惜茲邦禪業替廢敢作注于句末雖未足光融聖典且發曚者儻易覽焉安世高善開禪數斯經似其所出故録之于末大十二門經序第九釋道安夫淫息在乎解色不係防間也有絶存乎解形不係念空也色解則冶容不能轉形解則無色不能滯不轉者雖天魔玉顏窈窕艷姿莫足傾之之謂固也不滯者雖遊空無識泊然永壽莫足礙之之謂真也何者執古以御有心妙以了色雖群居猶芻靈泥洹猶如幻豈多制形而重無色哉是故聖人以禪防淫淫無遺焉以四空滅有有無現焉淫之有息要在明乎萬形之未始有百化猶逆旅也怨憾之興興於此彼此彼既興遂成仇敵仇敵適成勃然赫怒赫怒已發無所不至至不可𭎆神幽想獄乃毒乃辛欣之甘之是以如來訓之以等等所難等何往不等等心既富怨本息矣豈非為之乎未有圖難於其易者乎夫然則三事凶耽廢然息矣十二重關廓然闕矣根立而道生覺立而道成莫不由十二門立乎定根以逆道休也大人揮變榮光四塞彈撇安明吹沫千刃默動異剎必先正受明夫匪禪無以統乎無方而不留匪定無以周乎萬形而不礙禪定不愆於神變乎何有也至矣盡矣蔑以加矣此經世高所出也辭旨雅密正而不艷比諸禪經最為精悉案經後記云嘉禾七年在建鄴周司隸舍寫緘在篋匱向二百年矣冥然不行無聞名者比丘竺道護於東垣界賢者經中得送詣濩澤乃得流布得經之後俄而其家遇火護若不覩為灰炭矣自然將喪斯禪也後死者不得與聞此經也此經也八音所誨四道作訓約無之文重無簡矣精義入禪何以上乎前世又為懸解一家之傳故全而次之然世高出經貴本不飾天竺古文文通尚質倉卒尋之時有不達今為略注繼前人之末非敢亂朱冀有以寤焉法鏡經序第十康僧會夫心者衆法之原臧否之根同出異名禍福分流以身為車以家為國周遊十方稟無惓息家欲難足由海吞流火之獲薪六邪之殘已甚於蒺䔧網之賊魚矣女人佞等三魅其善偽而信寡家之為禍也尊邪穢賤清真連叢瑣謗聖賢興獄訟喪九親斯家之所由矣是以上士恥其穢懼其厲為之懾懾如也默思遁邁由明哲之避無道矣剔髮毀容法服為珍靖處廟堂練情攘穢懷道宣德闓導聾瞽或有隱處山澤枕石嗽流專心滌垢神與道俱志寂齊乎無名明化同乎群生賢聖競乎清靖稱斯道曰大明故曰法鏡騎都尉安玄臨淮嚴浮調斯二賢者年在束齓弘志聖業鉤深致遠窮神達幽愍世矇惑不覩大雅竭思譯傳斯經景摸都尉口陳嚴調筆受言既稽古義又微妙然時干戈未戢志士莫敢或遑大道淩遲內學者寡聞覩其景化可以拯塗炭之尤嶮然義壅而不達因間竭愚為之注義喪師歷載莫由重質心憤口悱停筆愴如追遠慕聖涕泗并流今記識闕疑俟後明哲庶有暢成以顯三寶矣
