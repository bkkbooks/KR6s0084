body:
  text: 釋僧祐撰新集抄經録第一新集安公疑經録第二新集疑經録第三新集安公注經及雜經志録第四小乘迷學竺法度造異儀記第五長安睿法師喻疑第六新集抄經録第一抄經者蓋撮舉義要也昔安世高抄出修行為大道地經良以廣譯為難故省文略說及支謙出經亦有孛抄此並約寫胡本非割斷成經也而後人弗思肆意抄撮或棋散衆品或爪剖正文既使聖言離本復令學者逐末竟陵文宣王慧見明深亦不能免若相競不已則歲代彌繁蕪黷法寶不其惜歟名部一成難用刊削其安公時抄悉附本録新集所獲撰目如左庶誡來葉無效尤焉抄華嚴經十四卷抄方等大集經十二卷抄菩薩地經十二卷抄法句譬經三十八卷抄阿差末經四卷抄淨度三昧經四卷抄摩訶摩耶經三卷抄胎經三卷抄央掘魔羅經二卷抄報恩經二卷少上卷抄頭陀二卷抄律中事抄義足經二卷抄法華藥王品一卷抄維摩詰所說佛國品一卷抄維摩詰方便品一卷抄維摩詰問疾品一卷抄安般守意經一卷抄菩薩本業經一卷抄菩薩本業願行品一卷抄四諦經要數一卷抄法律三昧經一卷抄照明三昧不思議事經一卷抄諸佛要集經一卷抄大乘方等要慧經一卷抄普賢觀懺悔法一卷抄樂瓔珞莊嚴方便經一卷抄未曾有因緣經一卷抄阿毗曇五法行經一卷抄諸法無行經一卷抄無為道經一卷抄分別經一卷抄德光太子經一卷抄魔化比丘經一卷抄優婆塞受戒品一卷抄優婆塞受戒法一卷抄貧女為國王夫人經一卷從華嚴經至貧女為國王夫人凡三十六部並齊竟陵文宣王所抄凡抄字在經題上者皆文宣所抄也般若經問論集二十卷即大智論抄或云要論或云略論或云釋論右一部凡二十卷廬山沙門釋慧遠以論文繁積學者難究故略要抄出抄成實論九卷齊武帝永明七年十二月竟陵文宣王請定林上寺釋僧柔小莊嚴寺釋慧次等於普弘寺共抄出淨度三昧抄一卷律經雜抄一卷本起抄經一卷睒抄經一卷舊録所載五百梵律經抄一卷舊録所載大海深嶮抄經一卷上六抄經是舊抄今並闕本抄為法捨身經六卷抄字在上似是文宣王所抄今闕此經法苑經一百八十九卷此一經近世抄集撮撰群經以類相從雖立號法苑終入抄數今闕此經右抄經四十六部凡三百五十二卷其四十八部一百五十一卷並有經其八部二百一卷今闕新集安公疑經録第二安法師造外國僧法學皆跪而口受同師所受若十二十轉以授後學若有一字異者共相推挍得便擯之僧法無縱也經至晉土其年未遠而喜事者以沙標金斌斌如也而無括正何以別真僞乎農者禾草俱在后稷為之嘆息金匱玉石同緘卞和為之懷恥安敢預學次見涇渭雜流龍蛇並進豈不恥之今列意謂非佛經者如左以示將來學士共知鄙信焉寶如來經二卷南海胡作或云寶如來三昧經定行三昧經一卷或云佛遺定行摩目揵所問經真諦比丘慧明經一卷或云慧明比丘經或云清淨真諦經尼吒國王經一卷或云尼吒黃羅國王經或云黃羅王經胸有萬字經一卷或云胸現萬字經薩和菩薩經一卷舊録云國王薩惒菩薩經善信女經二卷或云善信經護身十二妙經一卷一名度世護世經度護經一卷或云度護法經毗羅三昧經二卷善王皇帝經二卷或云善王皇帝功德尊經或為一卷惟務三昧經一卷或作惟無三昧阿羅呵公經一卷或云相國何羅呵公經慧定普遍神通菩薩經一卷舊録云慧定普遍國土神通菩薩經陰馬藏經一卷或云陰馬藏光明經大阿育王經一卷云佛在波羅奈者四事解脫經一卷或云四事解脫度人經大阿那律經一卷非八念者闕貧女人經一卷名難陀者舊録云貧女難陀經闕鑄金像經一卷闕四身經一卷闕普慧三昧經一卷闕阿秋那經一卷舊録云阿秋那三昧經闕兩部獨證經一卷闕法本齊經一卷西涼州來闕覓歷所傳大比丘尼戒一卷闕右二十六部三十卷新集疑經僞撰雜録第三長阿鋡經云佛將涅槃為比丘說四大教法若聞法律當於諸經推其虛實與法相違則非佛說又大涅槃經云我滅度後諸比丘輩抄造經典令法淡薄種智所照驗於今矣自像運澆季浮競者多或憑真以構僞或飾虛以亂實昔安法師摘出僞經二十六部又指慧達道人以為深戒古既有之今亦宜然矣祐挍閲群經廣集同異約以經律頗見所疑夫真經體趣融然深遠假託之文辭意淺雜玉石朱紫無所逃形也今區別所疑注之於録并近世妄撰亦標于末並依倚雜經而自製名題進不聞遠適外域退不見承譯西賓我聞興於戶牖印可出於胸懷誑誤後學良足寒心既躬所見聞寧敢默已嗚呼來葉慎而察焉比丘應供法行經一卷此經前題云羅什出祐案經卷舊無譯名兼羅什所出又無此經故入疑録居士請僧福田經一卷此經前題云曇無讖出案讖所出無此故入疑録灌頂度星招魂斷絶復連經一卷決定罪福經一卷無為道經二卷情離有罪經一卷燒香呪願經一卷或云呪願經安墓呪經一卷觀月光菩薩記一卷佛鉢經一卷或云佛鉢記甲申年大水及月光菩薩出事彌勒下教一卷在鉢記後九十六種道一卷右十二部經記或義理乖背或文偈淺鄙故入疑録庶耘蕪穬以顯法寶灌頂經一卷一名藥師琉璃光經或名灌頂拔除過罪生死得度經右一部宋孝武帝大明元年陵鹿野寺比丘慧簡依經抄撰此經後有續命法所以偏行於世提謂波利經二卷舊別有提謂經一卷右一部宋孝武時北國比丘曇靖撰寶車經一卷或云妙好寶車菩薩經右一部北國淮州比丘曇辨撰青州比丘道侍改治菩提福藏法化三昧經一卷右一部齊武帝時比丘道備所撰備易名道歡佛法有六義第一應知一卷未得本六通無礙六根淨業義門一卷未得本右二部齊武帝時比丘釋法願抄集經義所出雖弘經義異於僞造然既立名號則一部懼後代疑亂故明注于録佛所制名數經五卷右一部齊武帝時比丘釋王宗所撰抄集衆經有似數林但題稱佛制懼亂名實故注于録衆經要攬法偈二十一首一卷右一部梁天監二年比丘釋道歡撰右合二十部二十六卷疑經兩録合四十六部五十六卷其三十八部失源八部有人名新集安公注經及雜經志録第四夫日月麗天衆星助耀雨從龍降彪池佐潤由是豐澤洪沾大明煥赫也而猶有燋火於雲夜抱瓫於漢陰者時有所不足也佛之著教真人發起大行於外國有自來矣延及此土當漢之末世晉之盛德也然方言殊音文質從異譯胡為晉出非一人或善胡而質晉或善晉而未備胡衆經皓然難以折中竊不自量敢豫僧數既荷佐化之名何得素餐終日乎輒以灑掃之餘暇注衆經如左非敢自必必值聖心庶望考文時有合義願將來善知識不咎其默守冀抱瓫燋火讜有微益光讚折中解一卷光讚抄解一卷般若放光品者分別盡漏而不證八地也源流浩汗厥義幽邃非彼草次可見宗廟之義也安為折疑准一卷折疑略二卷起盡解一卷道行品者般若抄也佛去世後外國高明者撰也辭句質復首尾互隱為集異注一卷大小十二門者禪思之奧府也為各作注大作注大十二門二卷小十二門一卷今有了本生死者四諦四信之玄藪也為注一卷今有密迹金剛經持心梵天經右二經者護公所出也多有隱義為作甄解一卷賢劫八萬四千度無極者大乘之妙目也為解一卷人本欲生經者九止八脫之妙要也為注撮解一卷今有安般守意多念之要藥也為解一卷今有陰持入者世高所出殘經也淵流美妙至道直徑也為注二卷今有大道地者修行抄也外國所抄為注一卷衆經衆行或有未曾共和者安集之為十法句義一卷連雜解共卷義指者外國沙門於此土所傳義也云諸部訓異欲廣來學視聽也增之為注一卷九十八結者阿毗曇之要義為解一卷連約通解共卷又為三十二相解一卷三界諸天混然淆雜安為録一卷今有此土衆經出不一時自孝靈光和已來迄今晉康寧二年近二百載值殘出殘遇全出全非是一人難卒綜理為之録一卷今有答沙汰難二卷答法將難一卷西域志一卷凡二十七卷其諸天録經録及答沙汰難至西域志雖非注經今依安舊録附之于末僧法尼所誦出經入疑録寶頂經一卷永元元年出時年九歲淨土經一卷永元元年出時年九歲正頂經一卷永元元年出時年九歲法華經一卷永元元年出時年九歲藥草經一卷永元二年出時年十歲太子經一卷永元二年出時年十歲伽耶波經一卷永元二年出時年十歲波羅奈經一卷中興元年出時年十二歲優婁頻經一卷中興元年出時年十二歲益意經二卷天監元年出時年十三智遠承旨般若得經一卷天監元年出時年十三智遠承旨華嚴瓔珞經一卷天監元年出時年十三智遠承旨踰陀衛經一卷天監四年臺內華光殿出時年十六阿那含經二卷天監四年出時年十六妙音師子吼經三卷天監四年出年十六借張家出乘師子吼經一卷天監三年出時年十五勝鬘經一卷永元元年出時年九歲優曇經一卷妙莊嚴經四卷維摩經一卷江家出序七世經一卷右二十一種經凡三十五卷經如前件齊末太學博士江泌處女尼子所出初尼子年在齠齓有時閉目靜坐誦出此經或說上天或稱神授發言通利有如宿習令人寫出俄而還止經歷旬朔續復如前京都道俗咸傳其異今上敕見面問所以其依事奉答不異常人然篤信正法少修梵行父母欲嫁之誓而弗許後遂出家名僧法住青園寺祐既收集正典撿括異聞事接耳目就求省視其家祕隱不以見示唯得妙音師子吼經三卷以備疑經之録此尼以天監年三月亡有好事者得其文疏前後所出定二十餘卷厥舅孫質以為真經行疏勸化收合傳寫既染毫牘必存於世昔漢建安末濟陰丁氏之妻忽如中疾便能胡語又求紙筆自為胡書復有西域胡人見其此書云是經莂推尋往古不無此事但義非金口又無師譯取捨兼懷故附之疑例薩婆若陀眷屬莊嚴經一卷二十餘紙右一部梁天監九年郢州投陀道人妙光戒歲七臘矯以勝相諸尼嫗人僉稱聖道彼州僧正議欲驅擯遂潛下都住普弘寺造作此經又寫在屏風紅紗映覆香花供養雲集四部嚫供煙塞事源顯發敕付建康辨核疑狀云抄略諸經多有私意妄造借書人路琰屬辭潤色獄牒妙光巧詐事應斬刑路琰同謀十歲謫戍即以其年四月二十一日敕僧正慧超令喚京師能講大法師宿德如僧祐曇准等二十人共至建康前辨妙光事超即奉旨與曇准僧祐法寵慧令慧集智藏僧旻法雲等二十人於縣辨問妙光伏罪事事如牒衆僧詳議依律擯治天恩免死恐於偏地復為惑亂長繫東治即收拾此經得二十餘本及屏風於縣燒除然猶有零散恐亂後生故復略記薩婆若陀長者是妙光父名妙光弟名金剛德體弟子名師子法苑經一百八十九卷抄為法捨身經六卷右二部蓋近世所集未詳年代人名悉總集群經以類相從既立號法苑則疑於別經故注記其名以示後學卷數雖多猶是前録衆經故不入部最之限小乘迷學竺法度造異儀記第五夫至人應世觀衆生根根力不同設教亦異是以三乘立軌隨機而發五時說法應契而化沿麁以至妙因小以及大階漸殊時教之體也自正法稍遠受學乖互外域諸國或偏執小乘最後涅槃顯明佛性而猶執初教可謂膠柱鼓琴者也元嘉中外國商人竺婆勒久停廣州每往來求利於南康郡生兒仍名南康長易字金伽後得入道為曇摩耶舍弟子改名法度其人貌雖外國實生漢土天竺科軌非其所諳但性存矯異欲以攝物故執學小乘云無十方佛唯禮釋迦而已大乘經典不聽讀誦反抄著衣以此為法常用銅鉢無別應器乃令諸尼作鎮肩衣似尼師壇縫之為囊恆著肩上而不用坐以表衆異每至出路相捉而行布薩悔過但伏地相向而不胡跪法度善間漢言至授戒先作胡語不令漢知案律之明文授法資解言不相領不得法事而竺度昧罔面行詭術明識之衆咸共駭棄唯宋故丹陽尹顏竣女宣業寺尼法弘交州刺史張牧女弘光寺尼普明等信受其教以為真實雖出貴族而識謝慧心毀呰方等既絶法雨妄學詭科乖背律儀來苦方深良可愍傷自正化東流大乘日曜英哲頂受遍寓服膺而使迷僞之人專行偏教莫或振止何其甚哉昔慧導拘滯疑惑大品曇樂偏執非撥法華罔天下之明信己情之謬關中大衆固已指為無間矣至如彭城僧淵誹謗涅槃舌根銷爛現表厥殃大乘難誣亦可驗也尋三人之惑並惡止其躬而竺度之悖以毒飲人凡女人之性智弱信強一受僞教則同惑相埏故京師數寺遂塵異法東境尼衆亦時染此風將恐邪路易開淄污不已嗟乎斯豈魔斷大乘故先侮女人歟此實開士之所痛悼而法主所宜匡制也大方便經云釋迦如來昔為比丘專以四阿含教化謗毀方等於無數劫受大苦報從阿鼻出發大乘心致成正覺後進之賢宜思防斷古今明誡可不慎乎昔慧睿法師久歎愚迷製此喻疑防於今日故存之録末雖於録非類顯證同矣喻疑第六長安睿法師夫應而不寂感之者至感有精麁應亦不一影響理也若以方斯之非徒乖其圓乃亦喪其方故以備聞之悟喻其所疑疑非膏肓麁必為治若治所不至喻復其如之何並可詳覽往喻昔漢室中興孝明之世無盡之照始得揮光此壤於二五之照當是像法之初自爾已來西域名人安侯之徒相繼而至大化文言漸得淵照邊俗陶其鄙倍漢末魏初廣陵彭城二相出家並能任持大照尋味之賢始有講次而恢之以裕義迂之以配說下至法祖孟詳法行康會之徒撰集諸經宣暢幽旨粗得充允祖聽暨今附文求旨義不遠宗言不乖實起之於亡師及至符并龜茲三王來朝持法之宗亦並與經俱集究摩羅法師至自龜茲持律三藏集自罽賓禪師徒衆尋亦並集關中洋洋十數年中當是大法後興之盛也睿才常人鄙而得廁對宗匠陶譯玄典法言無日不聞聞之無要不記故敢依准所聞寄之紙墨以宣所懷什公云大教興世五十餘年言無不實實無不益益而為言無非教也實而為稱無非寶也寶以如意為喻教以正失為體若能體其隨宜之旨則言無不深若守其一照則惑無不至今此世界以雜為名則知本自離薄本自離薄則易為風波風波易以動不淳易為離易動易離故大聖隨宜而進進之不以一途三乘離化由之而起三藏祛其染滯般若除其虛妄法華開一究竟泥洹闡其實化此三津開照照無遺矣但優劣存乎人深淺在其悟任分而行無所臧否前五百年也此五百年中得道者多不得者少以多言之故曰正法後五百年唯相是非執競盈路得道者少不得者多亦以多目之名為像法像而非真失之由人由人之失乃有非跋真言斧戟實化無擇起於胸中不救出自脣吻三十六國小乘人也此釁流於秦地慧導之徒遂復不信大品既蒙什公入關開託真照般若之明復得揮光末俗朗茲實化尋出法華開方便門令一實究竟廣其津途欣樂之家景仰沐浴真復不知老之將至而曇樂道人以偏執之見而復非之自畢幽途永不可誨今大般泥洹經法顯道人遠尋真本於天竺得之持至揚都大集京師義學之僧百有餘人師執本參而譯之詳而出之此經云泥洹不滅佛有真我一切衆生皆有佛性皆有佛性學得成佛佛有真我故聖鏡特宗而為衆聖中王泥洹永存為應照之本大化不泯真本存焉而復致疑安於漸照而排跋真誨任其偏執而自幽不救其可如乎此正是法華開佛知見開佛知見今始可悟金以瑩明顯發可知而復非之大化之由而有此心經言闡提真不虛也此大法三門皆有成證昔朱士行既襲真式以大法為己任於雒中講中小品亦往往不通乃出流沙尋求大品既至于填果得真本即遣弟子十人送至雒陽出為晉音未發之間彼土小乘學者乃以聞王云漢地沙門乃以婆羅門書或亂真言王為地主若不折之斷絶大法聾盲漢地王之咎也王即不聽時朱士行乃求燒經為證王亦從其所求積薪十車於殿階下以火焚之士行臨階而發誠誓若漢地大化應流布者經當不燒若其不應命也如何言已投之火即為滅不損一字遂得有此法華正本於于填大國輝光重壤踊出空中而得流此此大般泥洹經既出之後而有嫌其文不便者而更便改之人情小惑有慧祐道人私以正本雇人寫之客書之家忽然火起三十餘家一時蕩然寫經人於灰火之中求銅鐵器物忽見所寫經本在火不燒及其所寫一紙陌外亦燒字亦無損餘諸巾紙寫經竹筒皆為灰燼此三經者如什公所言是大化三門無極真體皆有神驗無所疑也什公時雖未有大般泥洹文已有法身經明佛法身即是泥洹與今所出若合符契此公若得聞此佛有真我一切衆生皆有佛性便當應如白日朗其胸襟甘露潤其四體無所疑也何以知之每至苦問佛之真主亦復虛妄積功纍德誰為不惑之本或時有言佛若虛妄誰為真者若是虛妄積功纍德誰為其主如其所探今言佛有真業衆生有真性雖未見其經證明評量意便為不乖而亦曾問此土先有經言一切衆生皆當作佛此云何答言法華開佛知見亦可皆有為佛性若有佛性復何為不得皆作佛耶但此法華所明明其唯有佛乘無二無三不明一切衆生皆當作佛皆當作佛我未見之亦不抑言無也若得聞此正言真是會其心府故知聞之必深信受同吾之肆學正法者小可虛其襟帶更聽往喻如三十六國著小乘者亦復自以為日月之明無以進於己也而大心寥朗乃能鄙其狂而偏執自貽重罪慧道之非大品而尊重三藏亦不自以為照不周也曇樂之非法華憑陵其氣自以為是天下悠悠唯己一人言其意亦無所與讓今疑大般泥洹者遠而求之正當以一切衆生皆有佛性為不通真照真照自可照其虛妄真復何須其照一切衆生既有僞矣別有真性為不變之本所以陶練既精真性乃發恆以大慧之明除其虛妄虛妄既盡法身獨存為應化之本應其所化能成之緣一人不度吾終不捨此義如驗復何為疑耶若於真性法身而復致疑者恐此邪心無處不惑佛之真我尚復生疑亦可不信佛有正覺之照而為一切種智也般若之明自是照虛妄之神器復何與佛之真我法身常存一切皆有佛之真性真性存焉學不越崖成不乖本乎而欲以真照無虛言言而亦無佛我亦無泥洹是邪見但知執此照惑之明不知無惑之性非其照也為欲以此誣誷天下天下之人何可誣也所以遂不開默而驟明明此照者是惜一肆之上而有鑠金之說一市之中而言有虎者三易惑之徒則將為之所染皆為不殺之物亦得已而言之豈其好明人罪耶實是蝮蛇螫手不得不斬幸有深識者體其不默之旨未深入者尋而悟之以求自清之路如其已不可喻吾復其如之何
