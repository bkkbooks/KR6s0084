body:
  text: 釋僧祐撰新集安公古異經録第一新集安公失譯經録第二新集安公涼土異經録第三新集安公關中異經録第四新集律分為五部記録第五新集律分為十八部記録第六新集律來漢地四部記録第七新集安公古異經録第一古異經者蓋先出之遺文也尋安録自道地要語迄四姓長者合九十有二經標為古異雖經文散逸多有闕亡觀其存篇古今可辨或無別名題取經語以為目或撮略四鋡摘一事而立卷名號質實信古典矣安公覿其古異編之於末祐推其歲遠列之于首雖則失源而舊譯見矣道地經中要語章一卷或云小道地經今有此經自此以下不稱有者並闕本數練意章一卷舊録云數練經安公云上二經出生經祐案今生經無此章名梵志頗波羅延問尊種經一卷舊録云頗波延問種尊經今有此經菩薩道地經一卷安公云出方等部颰披陀菩薩經一卷安公云出方等部五十五法誡經一卷或云五十五法行一切義要一卷説善惡道經一卷愛欲聲經一卷一本云愛欲一聲經摩訶遮曷漩經一卷天王下作豬經一卷魔王入目犍蘭腹經一卷一名弊魔試摩目連經舊録云魔王入目連腹中經今有此經始造浴佛時經一卷十二賢者經一卷舊録云十二賢經佛併父弟調達經一卷安公云上下經出阿毗曇憂墮羅迦葉經一卷四部本文一卷安公云上二經出長阿鋡一本云出阿毗曇中阿含本文一卷一本云中阿含經六十卷七漏經一卷或云七漏鈔經讓德經一卷有賢者法經一卷摩訶厥彌難問經一卷或云大厥彌經大本藏經一卷説阿難持誡經一卷阿難問何因緣持誡見世間貧亦現道貧經一卷給孤獨四姓家問應受施經一卷曉所諍不解經者經一卷奇異道家難問住處經一卷奇異道家難問法本經一卷賢者手力經一卷八法行經一卷雜阿含三十章一卷自見自知為能盡結經一卷有四求經一卷佛本行經一卷河中大聚沫經一卷或云水沫所漂經或云聚沫譬經今有此經聞城譬經一卷舊録云聞城十二因緣經或云貝多樹下思惟十二因緣經今有此經便賢者坑經一卷坑字或作旃自守亦不自守經一卷舊録云不自守經或云不自守意經今有此經所非汝所經一卷兩比丘得割經一卷聽施比丘經一卷或云比丘聽施經今有此經善馬有三相經一卷舊録云馬三相經今有此經馬有八弊惡態經一卷或云馬有八態喻人經今有此經道德舍利日經一卷舍利日在王舍國經一卷獨居思惟自念止經一卷問所明種經一卷欲從本相有經一卷或云欲從本經獨坐思惟意中生念經一卷佛説如是有諸比丘經一卷比丘所求色經一卷佛説道有比丘經一卷色為非常念經一卷安公云自此上二十二經是阿含一卷色比丘念本起經一卷佛説善惡意經一卷比丘一法相經一卷有二力本經一卷有三力經一卷有四力經一卷人有五力經一卷不聞者類相聚經一卷舊録云類相聚經天上釋為故世在人中經一卷爪頭土經一卷身為無有反復經一卷師子畜生王經一卷阿須倫子披羅門經一卷披羅門子名不侵經一卷生聞披羅門經一卷舊録云生聞梵志經有𨻗竭經一卷署杜乘披羅門經一卷佛在拘薩國經一卷佛在優墮國經一卷是時自梵守經一卷有三方便經一卷舊録云三方便經披羅門不信重經一卷佛告舍日經一卷四意止經一卷舊録云四意止本行經説人自説人骨不知腐經一卷安公云上四十五經出雜阿含祐校此雜阿含唯有二十五經而注作四十五斯豈傳寫筆散故重畫致謬歟夫晉記之變三豕魯史之溫五門古賢其猶病諸況傭寫之人哉佛有五百比丘經一卷凡人有三事愚癡不足經一卷佛誡諸比丘言我以天眼視天下人生死好醜尊者卑者經一卷安公云此上三經出中阿鋡彌連經一卷舊録云彌蘭經或作彌蓮出六度集今有此經阿鳩留經一卷憂多羅經一卷栴檀調佛經一卷惡人經一卷羅貧壽經一卷舊録云羅彌壽或云那彌壽經栴檀樹經一卷今有此經難提和難經一卷或云難提和羅經四姓長者難經一卷舊録云四姓長者經析佛經一卷右九十二部凡九十二卷是古典經新集安公失譯經録第二祐校安公舊録其經有譯名則繼録上卷無譯名者則條目于下尋安録自修行本起訖於和達凡一百有三十四經莫詳其人又關涼二録並闕譯名今總而次列入失源之部安録誠佳頗恨太簡注目經名撮題兩字且不列卷數行間相接後人傳寫名部混糅且朱點為標朱滅則亂循空追求困於難了斯亦璵璠之一玷也且衆録雜經苞集逸異名多復重失相散紊今悉更刪整標定卷部使名實有分尋覽無惑焉修行本起經二卷安公言南方近出直益小本起耳舊録有宿行本起疑即此經菩薩道樹經一卷或云道樹三昧經二名異並同一本八念經一卷舊録云阿那律八念經禪行三十七品經一卷諸法本經一卷申日經一卷安公云出中阿含月光童子經一卷梵志孫陀耶致經一卷安公云出中阿含枯樹經一卷安公云出中阿含三十七品經一卷安公云出律經六淨經一卷安公云出律經法律三昧經一卷應行律一卷歡豫經一卷三十二相經一卷或云菩薩三十二相經八十種好經一卷演道俗經一卷舊録云演道俗業經黑氏梵志經一卷大愛道般泥洹經一卷頗多和多耆經一卷羅云母經一卷或云阿難多桓羅云母經五母子經一卷無垢賢經一卷或云無垢賢女經八關齋經一卷逝經一卷或云菩薩逝經生死變化經一卷或云生死變識經一名見正比丘經或云見正經普明王經一卷文陀竭王經一卷耶祇經一卷五福德經一卷末羅王經一卷分惒檀王經一卷長者音悅經一卷或云音悅經或云長者悅音不蘭迦葉經首達經一卷舊録云維先首達經梵皇經一卷或云梵摩皇經五百梵志經一卷僧大經一卷或云佛大僧大經法常住經一卷大小諫王經二卷今有諫王經一卷未詳大小波耶匿王經一卷或云波斯匿王經或云波斯匿王喪母經摩夷比丘經一卷或云摩夷經旃陀越國王經一卷迦葉戒經一卷或云迦葉禁戒經摩達王經一卷五恐怖世經一卷舊録云五恐怖經進學經一卷或云勸進學道經四飯法經一卷或云四飯法章梵摩難王經一卷師比丘經一卷或云比丘師經十二死經一卷五無反復經一卷等入法嚴經一卷或云菩薩等入法嚴經治身經一卷舊録云佛治身經餘録並同治意經一卷舊録云佛治意經餘録並同十善十惡經一卷安公云出阿毗曇阿難念彌經一卷安公云出中阿含兜調經一卷安公云出中阿含四虺喻經一卷安公云出中阿含舊録云四虺經或作四蛇經馬有八態經一卷與古異録馬八弊惡態經異本金色女經一卷安公云出阿毗曇大子須大拿經一卷十夢經一卷安公云出阿毗曇舊録云舍衛國王十夢經或云波斯匿王十夢經或云舍衛國王夢見十事經或云國王不黎先泥十夢經悉同一本長者辨意經一卷舊録云辨意長者經長者須達經一卷或云須達經孝子報恩經一卷一名孝子經孝子睒經一卷或云菩薩睒經或云睒經自愛不自愛經一卷舊録云自愛經長壽王經一卷薩和檀王經一卷出六度集未生怨經一卷須摩提女經一卷賢首夫人經一卷或云賢首經七婦經一卷玉耶女經一卷或云玉瑘經新歲經一卷阿難八夢經一卷舊録云阿難七夢經衆録並云夢是誤作八字也車匿本末經一卷或云車匿經九色鹿經一卷五苦章句經一卷一名淨除罪蓋娛樂佛法經或云五道章句經佛滅度後棺𣫍葬送經一卷婦遇對經一卷舊録云婦人遇辜經或云婦遇辜經羅藝忍辱經一卷阿難邠坻四時施經一卷舊録云阿難邠祁四時布施經蜜蜂王經一卷出六度集呵調阿那含經一卷舊録云訶雕阿那含經或作苛雕阿那含經戒德香經一卷鬼子母經一卷內外六波羅蜜經一卷安公云出方等部一本云內六波羅蜜經小五濁經一卷舊録云小五濁世經或云五濁世經或云五濁世本弗迦沙王經一卷一名萍沙王五願經安公云出中阿含伅真陀羅所問寶如來經二卷或云伅真陀羅所問寶如來三昧經或云伅真陀羅經迦旃偈一卷舊録云比丘迦旃説法沒偈經或云迦旃延説法沒盡偈百二十章右九十二部今並有其經七車經一卷彌勒經一卷安公云出長阿含阿拔經一卷安公云出長阿含或云阿拔摩納經墮藍經一卷安公云出中阿含七事經一卷安公云出中阿含海有八事經一卷堅心經一卷太子和休經一卷或云私休經分陀利經一卷舊録云薩藝芬陀利經或云是異出法花經無悕望經一卷或云無所希望經即是象步經之別名內藏大方等經一卷難等各第一經一卷舊録云阿難迦葉舍利弗説各第一經胎中女經一卷一名腹中女聽經或云阿羅呵公女腹中聽經小阿闍世經一卷普達王經一卷小須賴經一卷貧女人經一卷惟留王經一卷舊録云惟流王經目佉經一卷或安公云出方等部理家難經一卷迦留多王經一卷梵志闍孫經一卷古録云梵志闍遜經波達王經一卷抄寶積經一卷悲心悒悒經一卷趣度世道經一卷異了本生死經一卷長者威勢經一卷鹹水喻經一卷安公云出中阿含舊録云鹹水譬喻經薩和達王經一卷癡注經一卷彌勒當來生經一卷慧上菩薩經二卷慧上菩薩經即是大善權經調達經一卷睒本經一卷放鉢經一卷安公云出方等部賴吒謣羅經一卷安公云出中阿含馬王經一卷出六度集和達經一卷安公大録訖於此鉢呿沙經一卷法海經一卷失利越經一卷分身舍利經一卷以身施餓虎經一卷悉曇慕二卷吉法驗一卷口傳劫起盡一卷仕行送大品本末一卷律解一卷打犍稚法一卷從鉢呿沙經至打犍稚法凡一十一部先在安公注經録未尋其間出或是晚集所得今移附此録焉從七車經至打犍稚法凡五十部今並闕此經右一百四十二部凡一百四十七卷是失譯經新集安公涼土異經録第三大忍辱經十卷淨行經二卷金剛三昧經一卷瓶沙王經一卷有無經一卷五百偈一卷須耶越國貧人經一卷舊録云須耶越國貧人賃剔頭經浮木經一卷壞喻經一卷妖怪經一卷首至問十四章經一卷舊録云首至問佛十四意經或云首至問十四事今有此經阿般計泥洹經一卷一本作陶射計泥洹經四非常經一卷五失蓋經一卷大愛道受誡經二卷舊録云大愛道或云大愛道比丘尼今有此經要真經一卷本無經一卷勸德經一卷十五德經一卷父母因緣經一卷不退轉經四卷或云不退轉法輪經長者法志妻經一卷今有此經金輪王經一卷慧行經一卷七智經一卷作七知今有此經未生王經一卷內外無為經一卷道淨經一卷七事本末經一卷舊録云七事行本經難龍王經一卷或云難龍經今有此經阿陀三昧經一卷百寶三昧經一卷三乘經一卷耆域術經一卷舊録云耆域四術經五蓋離疑經一卷太子智止經一卷大五濁經一卷舊録云大五濁世經道德章一卷苦相經一卷須佛得度經一卷由經一卷須菩提品經七卷一本云法護出道行經同本異出也三慧經一卷菩薩等行經一卷分然洹國迦羅越經一卷四無畏經一卷五陰事經一卷今有此經義決法事經一卷權變經一卷舊録云文殊師利權變三昧經或云權變三昧經十傴惒經一卷賢劫五百佛一卷七言禪利經一卷舊録云傴惒七言禪利經菩薩十傴惒經一卷十思惟經一卷分別六情經一卷三失蓋經一卷佛寶三昧經一卷法志女經一卷文殊師利示現寶藏經二卷右五十九部凡七十九卷是涼土異經新集安公關中異經録第四阿難為蠱道呪經一卷舊録云阿難為蠱道所呪經墮落優披塞經一卷今有此經薩惒薩王經一卷菩薩本行經一卷藍達王經一卷一名目連因緣功德經或云目連功德經今有此經王舍城靈鷲山經一卷舊録云王舍城靈鷲山要直經阿多三昧經一卷思道經一卷人民求願經一卷今有此經大珍寶積惟日經一卷陀賢王經一卷佛在竹園經一卷法為人經一卷道意經一卷墮迦羅問菩薩經一卷今有此經阿夷比丘經一卷颰陀悔過經一卷太子辟羅經一卷舊録云太子壁羅經沙彌羅經一卷八德經一卷善德經一卷方等決經一卷摩訶揵陀惟衛羅盡信比丘等度經一卷舊録云盡信比丘經比丘三事經一卷右二十四部凡二十四卷是關中異經新集律分為五部記録第五出毗婆沙佛泥洹後大迦葉集諸羅漢於王舍城安居命優波離出律八萬法藏有八十誦初大迦葉任持第二阿難第三末田地第四舍那波提第五優波掘至百一十餘年傳授不異一百一十餘年後阿育王出世初大邪見毀壞佛法焚燒經書僧衆星散故八十誦灰滅後值羅漢更生信心懺悔除罪甚有神力為鐵輪王王閻浮提能役鬼神一日一夜壞舍利八塔造八萬四千塔還興顯佛法請諸羅漢誦出經律時有五大羅漢各領徒衆弘法見解不同或執開隨制共相傳習遂有五部出焉十六大國隨用並行競各進業皆獲道證自非聖道玄通孰能使之然乎後時五部異執紛然競起阿育王言皆誦佛語我今何以測其是非問僧佛法斷事云何諸僧皆言法應從多阿育王即集五部僧共行籌當爾時衆取婆麁富羅部籌多遂改此一部為摩訶僧祇摩訶僧祇者大衆名也若就今時此土行籌便此十誦律名摩訶僧祇也大集經佛記未來世當有此等律出世與今事相應六名不異也又有因緣經説佛在世時有一長者夢見一張白疊忽然自為五段驚詣佛所請問其故佛言此乃我滅度後律藏當分為五部新集律分為十八部記録第六佛滅度二百年後薩婆多部分出婆蹉部婆蹉部又分出三部一者法盛二者名賢三者六成彌沙塞部分出中間見迦葉維部分出二部一者僧伽提二者式摩一本三摩提摩訶僧祇部四百年時分出六部一者維迹二者多聞三者施設四者毗陀五者施羅六者上施羅又一本曇無德部此十八部見有同異文煩不復備寫新集律來漢地四部序録第七昔甘露初開經法是先因事結戒律教方盛及疊夢表其五分而彼毱多當其異部故知道運推移化緣不一矣至于中夏聞法亦先經而後律律藏稍廣始自晉末而迦葉維部猶未東被既總集五家故存其名録若乃梵文至止之歲胡漢宣譯之人大衆講集之處名德書翰之文並具舉遺事交相為證使覽者昭然究其始末云爾薩婆多部十誦律六十一卷薩婆多部者梁言一切有也所説諸法一切有相學內外典好破異道所集經書説無有我所受難能答以此為號昔大迦葉具持法藏次傳阿難至于第五師優波掘本有八十誦優波掘以後世鈍根不能具受故刪為十誦以誦為名謂法應誦持也自茲以下師資相傳五十餘人至秦弘始之中有罽賓沙門弗若多羅誦此十誦胡本來遊關右羅什法師於長安逍遙園三千僧中共譯出之始得二分餘未及竟而多羅亡俄而有外國沙門曇摩流支續至長安於是廬山遠法師慨律藏未備思在究竟聞其至止乃與流支書曰佛教之興先行上國自分流以來近四百年至於沙門德式所闕猶多頃西域道士弗若多羅者是罽賓持律其人諷十誦胡本有鳩摩耆婆者通才博見為之傳譯十誦之中始備其二多羅早喪中塗而廢不得究竟大業慨恨良深傳聞仁者齎此經自隨甚欣所遇冥運之來豈人事而已耶想弘道為物感時而動叩之有人必情無所吝若能為律學之衆留此經本開示梵行洗其耳目使始涉之流不失無上之津參懷勝業者日月彌朗此則惠深德厚人神同感矣幸望垂懷不孤往心一二悉諸道人所具不復多白曇摩流支得書方於關中共什出所餘律遂具一部凡五十八卷後有罽賓律師卑摩羅叉來遊長安羅什先在西域從其受律羅叉後自秦適晉住壽春石澗寺重校十誦律本名品遂正分為六十一卷至今相傳焉曇無德四分律四十卷或分四十五卷曇無德者梁言法鏡一音曇摩毱多如來涅槃後有諸弟子顛倒解義覆隱法藏以覆法故名曇摩毱多是為四分律蓋罽賓三藏法師佛陀耶舍所出也初耶舍於罽賓誦四分律不齎胡本而來遊長安秦司隸校尉姚爽欲請耶舍於中寺安居仍令出之姚主以無胡本難可證信衆僧多有不同故未之許也羅什法師勸曰耶舍甚有記功數聞誦習未曾脫誤於是姚主即以藥方一卷民藉一卷並可四十許紙令其誦之三日便集僧執文請試之乃至銖兩人數年紀不謬一字於是咸信伏遂令出焉故肇法師作長阿鋡序云秦弘始十二年歲上章掩茂右將軍司隸校尉姚爽於長安中寺集名德沙門五百人請罽賓三藏佛陀耶舍出律藏四分四十卷十四年訖十五年歲昭陽奮若出長阿含涼州沙門佛念為譯秦國道士道含筆受余以嘉運猥參聽次雖無翼善之功而預親承之末略記時事以示來賢又答江東隱士劉遺民書末云法師於大寺出新至諸經法藏淵曠日有異聞禪師於宮寺教習禪道門徒數百夙夜匪懈雍雍肅肅致可欣樂三藏法師於中寺出律本末精悉若覩初制毗婆沙於石羊寺出舍利弗阿毗曇胡本雖未及譯時問中事發言奇新貧道一生預參嘉會遇茲盛化自不覩釋迦祇洹之集餘復何恨而恨不得與道勝君子同斯法集耳故撮舉肇公書序以顯其證焉婆麁富羅律四十卷婆麁富羅者受持經典皆説有我不説空相猶如小兒故名為婆麁富羅此一名僧祇律律後記云中天竺昔時暫有惡王御世三藏比丘及諸沙門皆遠避四奔惡王既死善王更立還請沙門歸國供養時巴連弗邑有五百僧欲斷事既無律師又闕律文莫知承案即遣使到祇洹精舍寫此律文衆共奉行其後五部轉集諸律師執義不同各以相承為是爭論紛然于時阿育王言我今何以測其是非於是問僧佛法斷事云何皆言法應從多王言若爾當行籌知何衆多既而行籌婆麁富羅衆籌甚多以衆多故改名摩訶僧祇摩訶僧祇者言大衆也沙門釋法顯遊西域於摩竭提巴連弗邑阿育王塔天王精舍寫得胡本齎還京都以晉義熙十二年歲次壽星十一月共天竺禪師佛馱跋陀於道場寺譯出至十四年二月末乃訖彌沙塞律三十四卷彌沙塞者佛諸弟子受持十二部經不作地相水火風相虛空識相是故名為彌沙塞部此名為五分律比丘釋法顯於師子國所得者也法顯記云顯本求戒律而北天竺諸國皆師師口傳無本可寫是以遠涉乃至中天竺於摩訶乘僧伽藍得一部律是摩訶僧祇復得一部抄律可七千偈是薩婆多衆律即此秦地衆僧所行者也又得雜阿毗曇心可六千偈又得一部綖經二千五百偈又得一部方等泥洹經可五千偈又得摩訶僧祇阿毗曇法顯住三年學胡書胡語悉寫之於是還又至師子國二年更求得彌沙塞律胡本法顯以晉義熙二年還都歲在壽星衆經多譯唯彌沙塞一部未及譯出而亡到宋景平元年七月有罽賓律師佛大什來至京都其年冬十一月琅瑘王練比丘釋慧嚴竺道生於龍光寺請外國沙門佛大什出之時佛大什手執胡文于闐沙門智勝為譯至明年十二月都訖迦葉維律未知卷數迦葉維者一音迦葉毗佛諸弟子受持十二部經説無有我及以受者輕諸煩惱猶如死尸是故名為迦葉毗此一部律不來梁地昔先師獻正遠適西域誓尋斯文勝心所感多值靈瑞而蔥嶺險絶弗果茲典故知此律於梁土衆僧未有其緣也右五部其四部至中夏凡一百有八十卷部卷已入經録最限
