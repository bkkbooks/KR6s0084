body:
  text: 梁建初寺沙門釋僧祐撰中論序第一長安僧睿中論序第二曇影法師百論序第三僧肇法師十二門論序第四長安僧睿成實論記第五出論後記略成實論記第六新撰成實論抄序第七周顒訶梨跋摩傳序第八江陵玄暢作菩薩波羅提木叉後記第九未詳作者比丘尼戒本出本末序第十出戒前記比丘大戒序第十一出戒前記大比丘二百六十戒三部合異序第十二竺曇無蘭關中近出尼二種檀文夏坐雜十二事并雜事共卷前中後三記第十三摩得勒伽後記第十四出經後記善見律毗婆沙記第十五出律前記千佛名號序第十六出賢劫經竺曇無蘭中論序第一釋僧睿中論有五百偈龍樹菩薩之所造也以中為名者昭其實也以論為稱者盡其言也實非名不悟故寄中以宣之言非釋不盡故假論以明之其實既宣其言既明於菩薩之行道場之照朗然懸解矣夫滯惑生於倒見三界以之而淪溺偏悟起於厭智耿介以之而致乖故知大覺在乎曠照小智纏乎隘心照之不曠則不足以夷有無一道俗知之不盡則未可以涉中途泯二際道俗之不夷二際之不泯菩薩之憂也是以龍樹大士折之以中道使惑趣之徒望玄指而一變恬之以即化令玄悟之賓喪咨詢於朝徹蕩蕩焉真可謂理夷路於沖階敞玄門於宇內扇慧風於陳稿流甘露於枯悴者矣夫百梁之構興則鄙茅茨之側陋覩斯論之宏曠則知偏悟之鄙倍幸哉此區區赤縣忽得移靈鷲以作鎮險詖之邊情乃蒙流光之餘惠而今而後談道之賢始可與論實矣云天竺諸國敢豫學者之流無不玩味斯論以為喉襟其染翰申釋者甚亦不少所出者是天竺梵志名賓羅伽秦言青目之所釋也其人雖信解深法而辭不雅中其中乖闕煩重者法師皆裁而裨之於經通之理盡矣文或左右未盡善也百論治外以間邪斯文祛內以流滯大智釋論之淵博十二門觀之情詣尋斯四者真若日月入懷無不朗然鑒徹矣豫玩之味之不能釋手遂復忘其鄙拙託悟懷於一序并目品義題之於首豈期能釋耶蓋是欣自同之懷耳中論序第二影法師夫萬化非無宗而宗之者無相虛宗非無契而契之者無心故至人以無心之妙慧而契彼無相之虛宗內外並冥緣智俱寂豈容名數於其間哉但以悕玄之質趣必有由非名無以領數非數無以擬宗故遂設名而名之立數而辨之然則名數之生生於纍者可以造極而非其極苟曰非極復何常之有耶是故如來始逮真覺應物接麁啓之以有後為大乘乃説空法化適當時所悟不二流至末葉象教之中人根膚淺道識不明遂廢魚守筌存指忘月覩空教便謂罪福俱泯聞相説則謂之為真是使有無交興生滅迭爭斷常諸邊紛然競起時有大士厥號龍樹爰託海宮逮無生忍意在傍宗載隆遺教故作論以折中其立論意也則無言不窮無法不盡然統其要歸則會通二諦以真諦故無有俗諦故無無真故無有則雖無而有俗故無無則雖有而無雖有而無則不纍於有雖無而有則不滯於無不滯於無則斷滅見息不存於有則常等氷消寂此諸邊故名曰中問答析微所以為論是作者之大意也亦云中觀直以觀辨於心論宣於口耳羅什法師以秦弘始十一年於大寺出百論序第三釋僧肇百論者蓋是通聖心之津塗開真諦之要論也佛泥洹後八百餘年有出家大士厥名提婆玄心獨悟俊氣高朗道映當時神超世表故能闢三藏之重關坦十二之幽路擅步迦夷為法城塹于時外道紛然異端競起邪辨逼真殆亂正道乃仰慨聖教之陵遲俯悼群迷之縱惑將遠拯沈淪故作斯論所以防正間邪大明於宗極者矣是以正化以之而隆邪道以之而替非夫領括衆妙孰能若斯論有百偈故以百為名理致淵玄統群籍之要文義婉約窮制作之美然至趣幽簡鮮得其門有婆藪開士者明慧內融妙思奇拔遠契玄蹤為之訓釋使沈隱之義彰於徽翰諷味宣流被於來葉文藻煥然宗塗易曉其為論也言而無當破而無執儻然靡據而事不失真蕭焉無寄而理自玄會返本之道著乎茲矣有天竺沙門鳩摩羅什器量淵弘俊神超邈鑽仰纍年轉不可測常味詠斯論以為心要先雖親譯而方言未融致令思尋者躊躇於謬文標位者乖忤於歸致大秦司隸挍尉安城侯姚嵩風韻清舒沖心簡勝博涉內外理思兼通少好大道長而彌篤雖復形時務而法言不輟每撫茲文所慨良多以弘始六年歲次壽星集理味沙門與什考挍正本陶練覆疏務存論旨使質而不野簡而必詣宗致劃爾無間然矣論凡二十品品各五偈後十品其人以為無益此土故闕而不傳冀明識君子詳而覽焉十二門論序第四僧睿法師十二門論者蓋是實相之折中道場之要軌也十二門者總衆枝之大數也門者開通無滯之稱也論之者欲以窮其源盡其理也若一理之不盡則衆異紛然有惑趣之乖一源之不窮則衆塗扶疏有殊致之迹殊致之不夷乖趣之不泯大士之憂也是以龍樹菩薩開出者之由路作十二門以正之正之以十二則有無兼暢事無不盡事盡於有無則忘功於造化理極於虛位則喪我於二際然則喪我在乎落筌筌忘存乎遺寄筌我兼忘始可以幾乎實矣幾乎實矣則虛實兩冥得失無際冥而無際則能忘造次於兩玄泯顛沛於一致整歸駕於道場畢趣心於佛地恢恢焉真可謂運虛刃於無間奏希聲於宇內濟溺喪於玄津出有無於域外者矣遇哉後之學者夷路既坦幽塗既開真得振和鑾於北冥馳白牛以南回悟大覺於夢境即百化以安歸夫如是者焉復知曜靈之方盛玄陸之未希也哉睿以鄙倍之淺識猶敢明誠虛開希懷宗極庶日用之有宜冀歲計之能殖況才之美者乎不勝敬仰之至敢以鈍辭短思序而申之并目品義題之於首豈其能益也庶以此心開自進之路耳羅什法師以秦弘始十一年於大寺出之成實論記第五出論後大秦弘始十三年歲次豕韋九月八日尚書令姚顯請出此論至來年九月十五日訖外國法師拘摩羅耆婆手執胡本口自傳譯曇晷筆受略成實論記第六新撰成實論十六卷羅什法師於長安出之曇晷筆受曇影正寫影欲使文玄後自轉為五幡餘悉依舊本齊永明七年十月文宣王招集京師碩學名僧五百餘人請定林僧柔法師謝寺慧次法師於普弘寺迭講欲使研核幽微學通疑執即座仍請祐及安樂智稱法師更集尼衆二部名德七百餘人續講十誦律志念四衆淨業還白公每以大乘經淵深滿道之津涯正法之樞紐而近世陵廢莫或敦修棄本逐末喪功繁論故即於律座令柔次等諸論師抄比成實簡繁存要略為九卷使辭約理舉易以研尋八年正月二十三日解座設三業三品別施獎有功勸不及上者得三十餘件中者得二十許種下者數物而已即寫略論百部流通教使周顒作論序今録之于後抄成實論序第七周顒作尋夫數論之為作也雖製興於晚集非出乎一音然其所以開家命部莫不各有弘統皆足以該領名數隆替方等契闊顯益不可訾言至如成實論者總三乘之祕數窮心色之微闡摽因位果解惑相馳凡聖心樞罔不畢見乎其中矣又其設書之本位論為家抑揚含吐咸有憲則優柔窺探動關獎利自發聚之初首至道聚之末章其中二百二品鱗綵相綜莫不言出於奧典義溺於邪門故必曠引條繩碎陳規墨料同洗異峻植明塗裨濟之功實此為著者也既效宣於正經無染乎異學雖則近派小流實乃有變方教是以今之學衆皆云志存大典而發迹之日無不寄濟此塗乘津驚水本期長路其書言精理贍思味易耽頃遂赴蹈爭流重趼相躡又卷廣義繁致功難盡故敻往不旋終妨正務頃泥洹法華雖或時講維摩勝鬘頗參餘席至於大品精義師匠蓋疏十住淵弘世學將殄皆由寢處於論家求均于弱喪是使大典榛蕪義種行輟興言悵悼側寐忘安成實既有功於正篆事不可闕學者又遂流於所赴此患宜裁今欲內全成實之功外蠲學士之慮故銓引論才備詳切緩刊文在約降為九卷刪賒探要取效本根則方等之助無虧學者之煩半遣得使功歸至典其道彌傳波若諸經無墜於地矣業在心源庶無裁削之纍全典故全豈有妨於好學相得意於道心可不謀而隨喜也訶梨跋摩傳序第八江陵玄暢作余尋訶梨跋摩述論明經樞機義奧後進所馳荊州暢公製傳頗徵事迹故復兼録附之序末雖於類為乖而顯證是同焉訶梨跋摩者宋稱師子鎧佛泥洹後九百年出在中天竺婆羅門子也若人之生也固亦命世而誕幼則神期秀拔長則思周變通至若世典圍陀並是陰陽奇術提舍高論又亦外詰情辨皆經耳而究其幽遇心而盡其妙直以世訓承習弗為心要也遇見梵志導以真軌遂抽簪革服為薩婆多部達摩沙門究摩羅陀弟子其師既器而非凡即訓以名典迦旃延所造大阿毗曇乃有數千偈而授之曰此論蓋是衆經之統例三藏之要目也若能專精尋究則悟道不遠於是跋摩敬承鑽習功不踰月皆精其文義乃慨焉而歎曰吾聞佛旨虛寂非名相所議神澄妙絶罕常情攸測故為先達之所遵崇我亦注心歸仰如今之所稟唯見浮繁妨情支離害志經云名相竟無妙異若以為先聖應期適時之漸斯則教之流非化之源矣遂乃數載之中窮三藏之旨考九流之源方知五部創流蕩之基迦旃啓偏競之始紛綸遺蹤謀方百轍由使歸宗者昧其繁文尋教者惑其殊軌夫源同末異乃將衰之徵然頽綱不振亦弘道者之憂也遂抗言五異辨正衆師務遵洪範當而不讓至乃敏捷鋒起苞籠群達辨若懸河清對無滯于時衆師雷動相視闕如後以他日集而議曰此子恃明淩轢舊德據言有本末易可傾邁年值此運也如何或有論者曰豈唯此子才明過人抑亦吾等經論易窮耳意謂學無自足暗則咨明明昧之分已自可知何為苟守偏識不師廣見耶諸耆德曰相與誠復慕明情深而忝世宗仰于茲久矣當不能忽廢舊業問道少年明矣何者夫根同葉散像數自然五部之興有自來矣但當敦其素業祗而行之既生屬千載之末孰能遠軌正法之初哉且跋摩抽簪之始受道吾黨中參異學已自離群夫師祖不同所以五部不離黜異之制蓋先師舊典幸可述其獨見之明以免雷同之衆跋摩既宏才放達廣心遠度雖衆誚交喧傲然容豫深體忘懷明遊常趣神用間邃擇木改步時有僧祇部僧住巴連弗邑並遵奉大乘云是五部之本久聞跋摩才超群彥為衆師所忌相與慨然要以同止遂得研心方等鋭意九部採訪微言搜簡幽旨於是博引百家衆流之談以檢經奧通塞之辨澄汰五部商略異端考核迦旃延斥其偏謬除繁棄末慕存歸本造述明論厥號成實崇附三藏準列四真大明筌極為二百二品志在會宗光隆遺軌庶廢乖競共遵通濟斯論既宣淵懿嚮萃旬日之間傾震摩竭于時天竺有外道論師云是優樓佉弟子明鑒縱達每述譏正之辨歷國命酬莫能制者聞花氏王崇敬三寶將阻其信情又欲振名殊方遂杖策恆南直至摩竭王聞不悅即宣募境內有能辨屈之者當奉為國師闔境英豪皆憚其高名咸曰才非跋摩孰堪斯舉王聞甚悅即敕奉迎跋摩既至王便請升論堂令與外道決其兩正于時外道志氣干雲乃傲然而詠曰吾大宗樓迦偉藉世師繁文則六諦同貫簡旨則知異于神神為知主唯斷為宗敢有抗者斬首謝焉跋摩既宏才邈世覩之杪然神期陵霄容無改顏乃慨然對曰異哉子之談也子所以跨遊殊方將欲崇其神而長其知也又以斷為宗而自誣其旨子無知乎神可亡乎神既非知為神知知知神乎若神知知知神者誰知若知神知亦神乎外道乃退自疑曰理必若斷我無知矣知若知神神非宗矣於是沈惟謝屈心形俱伏王及臣民慶快非恆即與率土奉為國師王乃譴其舊衆昔忌名賢本衆相視懷愧闕然咸共追遜固請舊居王又曰夫制邪歸正其德弘矣但弘教之賢業尚殊背乖忤遺筌濁亂象軌請以檢一令謬昧欽明王即宣告號為像教大宗由使八方論士淵異之徒感思舊決朋契而萃跋摩以絶倫之才超群之辨每欲師聖附經籍同默異遂博舉三藏開塞之塗大杜五部乖競之路難其所執釋其所難明辨恢廓苞羅衆説理亂叩機神王若無於是群方名傑莫能異見咸廢殊謀受道真軌淳化以之而隆邪藹以之而騫非夫神契實津道參沖旨孰能蕩定群異令廢我求通者哉所以粗述始末垂諸好事云爾造諸數論大師傳並集在薩婆多部此師既不入彼傳故附於此菩薩波羅提木叉後記第九未詳作者夫窮像於玄原之無始萬行始於戒信之玄兆是故天竺鳩摩羅什法師心首持誦什言此戒出梵網經中而什法師少玩大方齊異學於迦夷淳風東扇故弘始三年秦王道契百王之業奉心大法於逍遙觀中三千學士與什參定大小乘經五十餘部唯菩薩十戒四十八輕最後誦出時融影三百人等一時受行修菩薩道豈唯當時之益乃有纍劫之津也故慧融書三千部流通於後代持誦相授屬諸後學好道之君子願來劫不絶共見千佛龍華同坐比丘尼戒本所出本末序第十出戒本前晉孝武帝世出拘夷國寺甚多修飾至麗王宮雕鏤立佛形像與寺無異有寺名達慕藍百七十僧北山寺名致隸藍五十僧劍慕王新藍六十僧溫宿王藍七十僧右四寺佛圖舌彌所統寺僧皆三月一易屋床座或易藍者未滿五臘一宿不得無依止王新僧伽藍九十僧有年少沙門字鳩摩羅才大高明大乘學與舌彌是師徒而舌彌阿含學者也阿麗藍百八十比丘尼輸若干藍五十比丘尼阿麗跋藍三十尼道右三寺比丘尼統依舌彌受法戒比丘尼外國法不得獨立也此三寺尼多是蔥嶺以東王侯婦女為道遠集斯寺用法自整大有檢制亦三月一易房或易寺出行非大尼三人不行多持五百戒亦無師一宿者輒彈之今所出比丘尼大戒本此寺常所用者也舌彌乃不肯令此戒來東僧純等求之至勤每嗟此後出法整唯之斯戒末乃得之其解色以息淫不在止冶容也不欲以止竊不在謹封藏也解色則無情於外形何計飾容與不飾乎不欲則無心於珠玉何須慢藏與緘縢乎所謂無關而不可開無約而不可解也內揵既爾外又毀容麁服進退中規非法不視非時不餐形如朽柱心若漯灰斯戒之謂也豈非聖人善救人故無棄人也哉然女人之心弱而多放佛達其微防之宜密是故立戒每倍於男也大法流此五百餘年比丘尼大戒了於其文以此推之外國道士亦難斯人也法汰頃年鄙當世為人師處一大域而坐視令無一部僧法推求出之竟不能具吾昔得大露精比丘尼戒而錯得其藥方一柙持之自隨二十餘年無人傳譯近欲參出殊非尼戒方知不相開通至於此也賴僧純於拘夷國來得此戒本令佛念曇摩持慧常傳始得具斯一部法矣然弘之由人不知斯人等能尊行之不耳此戒文與今戒往往不同尼衆學猶作尸叉吉利比丘大戒序第十一釋道安作世尊立教法有三焉一者戒律也二者禪定也三者智慧也斯三者至道之由戶泥洹之關要也戒者斷三惡之干將也禪者絶分散之利器也慧者齊藥病之妙醫也具此三者於取道乎何有也夫然用之有次在家出家莫不始戒以為基趾也何者雖檢形形乃百行舟輿也須臾不矜不莊則傷戒之心入矣傷戒之心入而後欲求不入三惡道未所前聞也故如來舉為三藏之首也外國重律每寺立持律月月相率説戒説戒之日終夜達曉諷乎切教以相維攝犯律必彈如鷹隼之逐鳥雀也大法東流其日未遠我之諸師始秦受戒又之譯人考挍者鮮先人所傳相承謂是至澄和上多所正焉余昔在鄴少習其事未及檢戒遂遇世亂每以怏怏不盡於此至歲在鶉火自襄陽至關右見外國道人曇摩侍諷阿毗曇於律持善遂令涼州沙門佛念寫其梵文道賢為譯慧常筆受經夏漸冬其文乃訖考前常行世戒其謬多矣或殊文旨或粗舉意昔從武遂法潛得一部戒其言煩直意常恨之而今侍戒規矩與同猶如合符出門應徹也然後乃知淡乎無味乃直道味也而慊其丁寧文多反復稱即命慧常令斤重去復常乃避席謂大不宜爾戒猶禮也禮執而不誦重先制也慎舉止也戒乃徑廣長舌相三達心制八輩聖士珍之寶之師師相付一言乖本有逐無赦外國持律其事實爾此土尚書及與河洛其文朴質無敢措手明祗先王之法言而順神命也何至佛戒聖賢所貴而可改之以從方言乎恐失四依不嚴之教也與其巧便寧守雅正譯胡為秦東教之士猶或非之願不刊削以從飾也衆咸稱善於是按梵文書唯有言倒時從順耳前出戒十三事起中室與檀越議三十事中至大姓家及綺紅錦繡衣及七因緣法如斯之比失旨多矣將來學者審欲求先聖雅言者宜詳覽焉諸出為秦言便約不煩者皆蒲陶酒之被水者也外國云戒有七篇而前出戒皆八篇今戒七悔過後曰尸叉罽賴尼尸叉罽賴尼有百七事明也如斯則七篇矣又傳尸叉罽賴尼有百一十事余慊其多侍曰我持律許口受十事一記無長也尋僧純在丘慈國佛陀舌彌許得比丘尼大戒來出之正與侍同百有一十爾乃知其審不多也然則比丘戒不止二百五十阿夷戒不止五百也比丘大戒本欲説戒維那出堂前唱不淨者出次曰庾跋門怒鉢羅鞞處可大沙門入三唱然後入唱行籌曰頞簸含陀寂靖阿素生也含羅遮麗史行籌布薩陀説戒心蜜栗楴一心婆㯓鞞度定也含羅姞隸怒把籌説戒者乃曰僧和集會未受大戒者出僧何等作為答説戒不來者囑授清淨説小住潔向説竟説已那春夏冬若干日已過去隨時計日僧盡共思惟一切生死過求於度世道若精進持戒同亦當歸死不精進持戒同亦當歸死寧持戒而死不犯戒而生譬如駃水流日月不常住人命疾於彼去者不復還自此偈以後有布薩羯磨及戒文不復具寫大比丘二百六十戒三部合異序第十二竺曇無蘭夫戒者人天所由生三乘所由成泥洹之關要也是以世尊授藥以戒為先焉戒者乃三藏之一也若不以戒自禁馳心於六境而欲望免於三惡道者其猶如無舟而求渡巨海乎亦如魚出于深淵鴻毛入于盛火希不死燋者未之有也行者以戒自嚴猛意五十八法者取道也何難哉蘭自染化務以戒律為意昔在於廬山中竺僧舒許得戒一部持之自隨近二十年每一尋省恨文質重會曇摩侍所出戒規矩與同然侍戒衆多施有百一十事爾為戒有二百六十也釋法師問侍侍言我從持律許口受一一記之莫知其故也尼戒衆多施亦爾百有一十三十事中第二十一二百五十者云長鉢過十日捨墮續言是比丘當持此鉢與比丘僧二十二二百六十者云鉢破綴齊五更未得新鉢故者當歸衆僧推其理旨宜如二百五十者在長鉢後事與破鉢并者為重長也余以長鉢後事注於破鉢下以子從母故也九十事中多參錯事不相對復徙就二百六十者令事類相對亦時有不相似者重飯食無餘因緣墮應對重飯不屬人言不足此除因緣事與別請并故以對別請此一戒在重飯一戒在別請亦為有餘緣則得重飯亦得越次受請也不舒手受食自恐怖教人恐怖此二戒無對將傳寫脫耶故本闕乎衆多施亦有不相對不相似者莫知所以也余因間暇為之三部合異粗斷起盡以二百六十戒為本二百五十者為子以前出常行戒全句繫之於事末而亦有永乖不相似者有以一為二者有以三為一者余復分合令事相從然此二戒或能分句失旨賢才聰睿若有攬者加思為定恕余不逮比丘僧祥後後從長安復持本來更得重挍時有損益最為定比丘大戒二百六十事三部合異二卷欲説戒維那出堂前唱不淨者出次曰庚跋門怒鉢羅鞞處然後入唱行籌説戒者乃曰僧和集會未受大戒者出僧何等作為衆僧和聚會悉受無戒於僧有何事答説戒僧答言布薩不來者囑授清淨説諸人者當説當來之淨答言説淨説已那春夏冬若干日已過去僧盡共思惟一切生死過求於度世道若精進持戒同亦當歸死不精進持戒同亦當歸死寧持戒而死不犯戒而生譬如駃水流日月不常住人命疾於彼去者不復還自此偈以後有布薩羯磨及戒文也此二百六十戒七佛偈與常行戒偈同子戒偈同子戒本無偈想亦同故不出也而此戒來至楊州汰法師嫌文質重有所刪削此是其本未措手向質重者也晉泰元六年歲在辛巳六月二十五日比丘竺曇無蘭在楊州丹陽郡建康縣堺謝鎮西寺合此三戒到七月十八日訖故記之關中近出尼二種壇文夏坐雜十二事并雜事共卷前中後三記第十三卷初記云太歲己卯鶉尾之歲十一月十一日在長安出此比丘尼大戒其月二十六日訖僧純於龜茲佛陀舌彌許戒本曇摩侍傳佛念執胡慧常筆受卷中間尼受大戒法後記云此土無大比丘尼戒文斯一部僧法久矣吳土雖有五百戒比丘尼而戒是覓歷所出尋之殊不似聖人所制法汱道林聲鼓而正之可謂匡法之棟梁也法汰去年亦令外國人出少許復不足慧常涼州得五百戒一卷直戒戒復之似人之所作其義淺近末乃僧純曇充拘夷國來從雲慕藍寺於高德沙門佛圖舌彌許得此比丘尼大戒及授戒法受坐已下至劍慕法遂令佛圖卑為譯曇摩侍傳之乃知真是如來所制也而不止五百數比丘戒有二百六十問侍所以言莫知其故也然以理推之二百五十及五百是舉全數耳又授比丘尼大戒文少將即用授大比丘法而出其異也八𤿺賴夷無二亦當依比丘足耳亦當略授十七僧迦衛尸沙一章也又授比丘尼大戒尼三師教授師更與七尼壇外問內法壇外問內法於事為重故外國師云壇外問當言正爾上場衆僧中當問汝汝當爾答壇上問則言今衆僧中問汝也正爾令曇充還拘夷訪授比丘尼大戒定法須報以為式也授六法文無乏也二師而已無教授師也上壇僧尼各多益善卷後又記云秦建元十五年十一月五日歲在鶉尾比丘僧純曇充從丘慈高德沙門佛圖舌彌許得此授大比丘尼戒儀及二歲戒儀從受坐至囑授諸雜事令曇摩侍出佛圖卑為譯慧常筆受凡此諸事是所施行之急者若為人師而不練此此無異於土牛後人也涼州道人竺道曼於丘慈因此異事來與燉煌道人此沙門各各所住祠或二百或三百人為一部僧比丘尼向三百人凡有五祠各各從所使僧祠依準為界內無共説戒法也常暮説戒説戒之日比丘尼差三人往白所依僧云今日當説戒僧即差二人往詣比丘尼僧知人數還白大僧云比丘尼凡有若干於某祠清淨説戒普共聞知如是三白比丘尼便自共行籌説戒如法僧事曇充云大齊説律六十日竟尼亦寄聽若遇説戒亦寄聽戒唯不與舍羅籌耳七月十五日各於所止處受歲如法遣三人詣所依僧承受界分齊耳其餘如僧法此與尼戒違將是不知也比丘尼當三受戒五百戒比丘尼滿十二歲乃中為師初受十戒時索二女師當使持律沙門授戒乃付女師令教道之次受二百五十戒年滿二十直使女三師授之耳威儀俯仰如男子受戒法無異也彌離尼受六法無三師沙彌亦無三師二師而已耳六法云二百五十謬傳之也受戒後周一年無誤失乃得受戒五百戒後受戒時三師十僧如中受時直使前持律師更授二百五十事合前為五百耳直授之不如中受時問威儀委曲也戒文如男子戒耳事事如之無他異也授戒立三尼師一持律比丘僧授戒場四住屋下此言十僧後授不委曲與授文反未詳所出也摩得勒伽記第十四出經後記宋元嘉十二年歲在乙亥楊州聚落丹陽郡陵縣平樂寺三藏與弟子共出此律從正月起至九月二十二日草成二十五日寫畢白衣優婆塞張道孫敬信執寫善見律毗婆沙記第十五出律前記齊永明十年歲次實沈三月十日禪林比丘尼淨秀聞僧伽跋陀羅法師於廣州共僧禕法師譯出梵本善見毗婆沙律一部十八卷京師未有渴仰欲見僧伽跋陀其年五月還南憑上寫來以十一年歲次大梁四月十日得律還都頂禮執讀敬寫流布仰惟世尊泥洹已來年載至七月十五日受歲竟於衆前謹下一點年年如此感慕心悲不覺流淚千佛名號序第十六出賢劫經沙門竺曇無蘭抄賢劫經説二千一百諸度無極竟喜王菩薩仍問今此會中寧有大士得此定竟入斯八千四百諸度無極及八萬四千度無極法入八萬四千諸三昧門乎佛答言有不但此諸開士也當來賢劫一千如來亦得入也除四正覺喜王白佛唯願世尊説諸佛名字姓號佛為喜王説諸佛號字號字一千數之有長而興立發意二品重説皆齊慧業而止以此二品檢之有以二字為名者三字名者有以他字足成音句非其名號亦時有字支異者相梵本一耳將是出經人轉其音辭令有左右也長而有者或當以四五六字為名號也興立發意不盡名自慧業以下難可詳也余今別其可了各為佛名意所不了則全舉之又以字異者注之於下然或能分合失所深見達士其有覺省可為改定恕余不逮
